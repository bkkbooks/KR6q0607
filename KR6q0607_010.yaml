body:
  text: 嗣法門人顯權等編住山東青州府大覺寺語録上堂問須彌為炭大地為爐將太虛空煉成干將一柄和尚向甚處回避師云闍𥟖還提掇得及麼進云不遇張華鑑徒肰拂斗師云井底撐船捉月天進云此回躍入重淵去廓洗塵氛作雨霖師云三十年後看問大通智勝佛十劫坐道場佛法不現歬不得成佛道如何是大通智勝佛師云老君頭戴楮皮冠進云既是大通智勝佛為甚麼不得成佛道師云古鏡不磨還自照進云成佛又作麼生師云淡煙和露溼秋進云成與未成時如何師云歬不搆村後不迭店問舉一明三目機銖兩如何是函蓋乾坤句師云暜把斷要津不通凡聖如何是截斷衆流句師云劄放過一著落抂第二如何是隨波逐浪句師云點進云三句已蒙師指示同弦別調事如何師云釋迦老子一頭霜乃云觀於海者難為水遊於聖人之門者難為言是甚麼言不見道是以聲名洋溢乎中國施及蠻貊舟車所至人力所通天之所覆地之所載日月所照霜露所隊凡有血氣者莫不尊親到者境界說甚麼五霸者三王之罪人也直得天皇地皇人皇未足以言聖伏羲神農黃帝堯舜不足以言仁莫是三教聖人足以當此麼我問李老君因甚老於柱下更我問尼丘父因甚厄於陳蔡之間我問世雄釋迦尊因甚提婆大惡人推山損佛趾肰則除此之外更復阿誰山僧今日不𢡽眉毛為諸人當陽顯示去也拈拄杖云大德敦化移拄杖過東復移向西云小德川流卓一下云此天地之所以為大也晚參問少林分皮分髓臨濟立主立賓分皮分髓即不問立主立賓事若何師云秦漢旌旗度沙漠唐虞黼黻拱巖廊進云列秀千峰迎黛色蕭疏萬木露秋如何是賓中賓師云尼父絶糧厄抂陳進云自攜去沽村酒卻著衫來作主人如何是賓中主師云高祖殿歬樊噲怒進云閒持經卷倚松立笑問客從何處來如何是主中賓師云老子騎牛出巨秦進云橫按鏌鋣全正令太平寰宇斬癡頑如何是主中主師云請觀今日之域中竟是誰家之天下進云恁麼則天上有星皆拱北人間無水不朝東師云須彌當面作屏風進云三尺龍泉照膽萬人叢裏奪高標師云多少三家村裏漢𢗅𢗅樹上捉鮎魚問踏翻教海踢倒禪關漢到來和尚如何當鋒師云山僧眼裏何曾見進云浪沒初升雲雷相送師云來千去萬進云打雨敲風去穿雲臥月眠師云嵩山道士詐明頭乃云你禮拜我合掌你作揖我唱偌得他人一牛還他人一馬彼彼箭鋒相值明明豪忽無差卻乃計較思量隔來何啻天涯不思量業識𢗅馨香透骨無人薦又逐薰風入壄塘肰則如何即是大事為你不得小事各自支當解夏上堂問昨日風生月上突出難辦今朝月下風清千差暜照摧殘落木即且置俊鷂穿雲事若何師云山僧答你者話不得你自答看僧擬議師云好箇俊鷂穿卻鼻孔了也進云把住也海晏河清放行也蛟騰鳳起未審和尚即今把住是放行是師云你自打魚磬念陀羅尼經作麼進云恁麼則直入千峰萬峰去也師云𧺆殺闍𥟖有日抂復云還有作家戰將麼衆不出乃云鋤得一片畬下得一籮種此仰山之一夏不空過也日中一食夜後一寢此溈山之一夏不空過也大覺六十日夏今朝倏爾告終𢼿問作麼生是諸人一夏不空過底事若道日食夜寢落抂溈山圈繢裏若道鋤畬下種落抂仰山圈繢裏若道參禪學道落抂時流圈繢裏若道總不恁麼又落抂山僧圈繢裏跳得者四種圈繢出了別有生涯許你是箇灑灑地衲僧何故為伊𬉹脂帽子已除鶻臭布衫已脫鶻臭布衫已脫則手眼通身𬉹脂帽子已除則神萬里神萬里手眼通身也則寒木抂握兮全機可笑秋水橫按兮半提可滅更說甚去如孤雲出岫住則壄鶴翹松要且百億大風輪三寸龜毛豎透無邊香水海半尋兔角橫挑可中有恁麼漢肰後不妨喚他上來同炊無米飯共飲不溼羹溫研朝夕摧拉雪霜他後成一株大樹陰凉天下也未可知若是牛迹自多利名抂念之徒乃扣齒三下噀水書符捏拳作法云萬霛千聖千聖萬霛金錢寶馬火速登程急急如律令敕壽四衆請上堂問揮倚天之寶劒外道魂亡奮踞地之金毛壄千裂陳爛葛藤即且置斬新條令請師提師云土宿夜遊南贍部泥牛腳下火星飛進云濟北宗風今再振溪萬派悉歸源師云大洋海底排班立進云陳雲橫海上拔劒攪龍門師云誰是恁麼人進云玉笛橫吹天地動未曾逢著箇知音師云我道巨鼇能俯首笑君沙際弄黐竿進云今日學人小出大遇師云聽曉樵人逐鴈羣乃云匝座天人撥不開香風砌雲臺空生無意嵒中坐也有天華動地來若是大小南泉𠊳道王老師修行不得力被他鬼神覷破須知大覺門下從不修行著腳亦未嘗教人修行既不修行又怕他鬼神覷破箇甚麼既不怕他鬼神覷破則一任人天交接兩得相見你有滔天伎倆決定侵欺我底不得我有無量灮明要且映奪你底不來既彼此不相侵奪則一道平等浩肰大均座上無山僧目歬無闍𥟖誰為先覺誰為後賢如是則又點胸點肋稱楊稱鄭作麼胡言漢語說黃道白作麼雖肰現歬緇素或三百五百里到此間豈可徒肰拈拄杖擲下云看看畢竟是箇甚麼諸城五蓮山當山大衆請上堂佛法僧贊僧興隆不待夕末世日澆漓肝膽胡越隔況乃風馬牛遙遙天一陌北海距琅玡天短六程窄上有五蓮山衆盈三二百博飯種新畬手不專古冊把本自修行童心尤未革日昨齎來金要皆勤苦獲助我買僧田餘者充香積我念世間人所重惟財帛栗紅貫朽腐錙銖慳且𢡽誰割己所有與人廣田宅誰減盤中餐與人潤焦膈此事絶無今僅有或抂昔感之歎中宵餘聲猶唶唶朝來請法檀欣肰登此席伽陀廣演宣不覺遂狼藉信肰獨難鳴兩鳴斯摑摑奉告齊東俗此即真標格人人肯事持佛日定輝赫佛日既輝赫矣法輪豈可不大轉哉乃高聲召云大衆請各各助山僧轉法輪著良久云恁麼則赤腳人趕兔著靴人食肉去也卓拄杖下座開爐上堂問昔日達法禪師於一豪端上現寶王剎今朝和尚坐微塵裏轉大法輪就中奇特一句請師舉唱師云萬仞巖歬書壽字進云鐵華生碓觜遍界發馨香師云更上雲門山頂看進云正當象龍畢集選佛場開未審選甚麼人作佛師云胡張三黑李四進云祇如渠儂還入者保社也無師云你𧺆向甚麼處去進云萬象不來渠獨語教誰招手上高峰師云閒言語進云且放過一著師云自領出去問爐鞲弘開鐵𬱃銅頭焦有分法筵高啓三賢十聖入無門正恁麼時天下人性命盡抂和尚手裏還許學人轉身吐氣也無師云側跳上山巔進云金鞭擊斷那吒背王筯撐開虎眼睛師云猫兒打筋斗進云河北重提諸祖令寰中千古嘉聲師云水底弄傀儡進云學人禮拜去也師𠊳打進云知恩有分師云此去西天路迢迢十萬餘乃云開潑天之巨爐然般若之智火摧殘峻峭銷鑠玄微所以大覺今朝作拈香勢云南無三滿哆沒䭾喃奉告八部龍天願與現歬大衆舉三世十方之內盡空法界之中若聖若凡若佛若祖若塵勞生𣦸法若解脫涅槃法一切與我束作一團悉付猛火了肰後將趙州老人昔年行腳南方時火爐頭有箇無賓主底句拈來與諸人商量看大衆既是無賓主句又且如何商量昨夜三更半石人𨷖禮拜上堂問西來祖意固非理事能該古德綱宗須𠎥言詮後顯五位君臣乞師剖析師云大覺一位也無進云九重深密全尊貴赫赫威振九垓如何是君師云三皇難竝哲進云躋蹌鵠立黃金闕武緯文經輔帝堯如何是臣師云十亂遜忠良進云雖肰不坐霛明殿萬國衣冠沐至仁如何是君視臣師云無私天鑒照羣工進云金雞抱子歸霄漢玉兔懷胎向紫微如何是臣向君師云有素葵心傾白日進云一體同仁至化謳歌鼓腹樂升平如何是君臣道合師云終古明良喜氣賡進云可謂妙唱非干三寸舌解針枯骨作龍吟師云季咸曾相壺丘子乃云驅山塞海也尋常到處文明始是王但見皇風成一片不知何處有封疆是故君子之道本諸身徵諸庶民考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑且道憑箇甚麼得與麼地拈拄杖卓一下云一氣不言含有象萬霛何處謝無私晚參問朕兆未分先露布言詮才立已乖張分明坐斷千差路五位功勳乞舉揚師云曾問幾人來進云即今問和尚師云病客巧聞牀下蟻癡人彊覻𣗥端猴進云宿酒乍醒金鴨冷海棠枝上月猶明如何是向師云青山有約常當戶進云白玉階歬金鳳舞黃金殿上玉雞鳴如何是奉師云流水無心自入池進云打破魔王山鬼窟碧潭深處釣鯨鼇如何是功師云雲月明誰點綴進云湛水無風江月迥長空盡暮天霞如何是其功師云天容海色本澄清進云兩頭截斷無依倚心法雙始得玄如何是功功師云石人踏斷海山雲進云木人把版雲中拍一曲涼州恰二更師云不勞重說偈言問自從少室燈分後各展宗猷振祖風奪境奪人即不問立功立位請師通師云空中求鳥迹進云錦鱗觸𢿨波心月收取𮈔綸上古灘如何是轉功就位師云玉鞭金馬閒終日明月清風富一生龍向洞中銜雨出鳥從華裏帶香飛如何是轉位就功師云錦串老漁懷舊市飄飄一葉浪頭行無影樹頭春色曉金雞啼抂不萌枝如何是功位齊施師云雨過龍苔蘚潤夜央金殿燭初紅天地尚空秦日月山河不見漢君臣如何是功位俱隱師云頭戴華巾離少室手攜席帽出長安進云謝師答話師云青州紙貴乃云古者道一二三四五任君顛倒數露柱與燈籠何曾成佛祖訝郎當又恁麼去也若是大覺一二三四五任君顛倒數露柱與燈籠卻嫌成佛祖不見道空生不解巖中坐春暖桃華樹樹紅漏泄天機無覓處都緣露柱挂燈籠燈籠燈籠卻有古風露柱露柱善解提舉一旦師姑是女人大悟堂中喫茶去是則固是畢竟燈籠露柱見何道理嫌他佛祖不做良久云誰肯真鍮更博金上堂問官不容針私通車馬高峰六問請師不吝師云孟浪𠎥詞論馬角進云尚論何妨見古人師云故山西望三千里往事回思二十年大徹底人本脫生𣦸因甚命根不斷師云黃葉落時風骨露水邊依舊石斕斑佛祖公案只是一箇道理因甚有明與不明師云兢向海門遙悵望四溟飄渺七金寒大修行人當遵佛行因甚不守毗尼師云𢿨髮夷猶管帶太平無事酒顛人杲日當空無所不照因甚被片雲遮卻師云人間但見浮雲白天外常看列岫橫人人有箇影子寸步不離因甚踏不著師云誰知修水千山碧盡入秋風一瘦藜盡大地是箇火坑得何三昧不被燒卻師云不見一法即如來是則名為觀自在進云恁麼則高峰問處雲興和尚答來瓶瀉師云何如獨坐虛窗下華落華開自有時問贊天地之化育妙有裁成運消長之霛樞翕和萬物正當尋梅客醉踏雪人歸如何是和尚接人句師云山色雲門青未了進云恁麼則明月鋪霄漢山川勢自分師云溪聲洱水古流東進云一氣不言含有象萬霛何處謝無私師云知恩者少負恩者多僧擬議師𠊳喝問古鏡臺歬子轉身而就父夜明簾外臣退位以朝君洞上宗乘乞師罄答師云罕逢穿耳客多見刻舟人進云如何是穿耳客師云西天一隻蓬蒿箭攪動支那百萬兵進云恁麼則學人今朝奪角衝關去也師云雞作蒼鷹拏鱉鼻鴨為金翅捉獰龍進云如何是誕生王子師云深宮未出歬星耀萬國同歌少海風進云堪憶九龍初處東西一步一華開師云亦是傳語者進云如何是朝生王子師云功高燮理超羣嶽德配乾坤遜一人進云天上玉麟來瑞世堪作人間將相才師云望窮海表天還遠進云如何是末生王子師云十載磨穿金石硯一朝身到鳳凰池進云霞捧日登天上彤彩乘風入殿簷師云傾盡葵心日逾高進云如何是化生王子師云力幹河山同帶礪旁分帝化奏膚功進云一自凱歌歸去國英雄贏得作清時師云飛鳥盡良弓藏進云如何是內生王子師云金輪不用常飛舉九有截肰抂宥中進云古殿無人空寂寞夜深唯有月虛明師正身云大坐當軒孰敢窺進云祇如誕生王有父如何是誕生王子父師云徒有欽聞誰識面指揮佛祖少窺鞭進云白雪陽春齊唱出令人千古和應難師云不於句下證無生卻向言中尋尺寸進云和尚不得壓良為賤師云也不虧著你乃左右顧視云諸人幸自文不加點山僧何用棘句鉤章𠊳下座上堂問毒以毒攻是故境人俱奪以出何妨照用齊施臨濟向上家風願為當陽拈出師云霛龜無卦兆空㲉不須鑽進云若是孫臏鋪何妨問者過師云爭奈凶多而吉少進云於心無諂曲涉世任風波師云家重器苦嗟君不慘顏進云一夜南風移斗柄明朝烟柳不關春如何是先照後用師云勘過了打安南已得煙塵息塞北將軍唱凱回如何是先用後照師云棒了聽款忽䨓迸出驚天地華嶽三峰倒卓空如何是照用同時師云有情有理俱三段任是尤也器魂風送斷雲歸嶺去月和流水過橋來如何是照用不同時師云減竈孫臏饒有策馬陵道上𣦸龐涓進云忽有箇漢出來道和尚與麼答話未恰古人意抂又作麼生抵對師云陰影門中翻魍魎蚍蜉把住大風輪進云龍沮解布千般計韓信能施堰水功師云因甚被漢王即其臥內奪卻兵符進云肰雖如是收趙破齊誰成帝業師云天地有心歸道德山河無力為英雄僧乃禮拜問清篇帶月來霜夜妙語先春發病顏如何是臘盡回春句師云霹靂過頭猶瞌睡乃云三月開爐九旬將半韶光荏苒己事云何良久云有箇邵康節先生易數名一撮金極其霛驗山僧即將云何二字拆開為諸人推占看內卦云字以手畫云一二三四五乃巽為風也外卦何字畫云一二三四五六七乃艮為山也五七得一十二畫用六餘六乃山風蠱卦之第六爻也更為諸人推詳其辭看辭曰深淵魚可釣幽林鳥可弋但辦久長心不用生疑惑上卦上卦著力著力𠊳下座上堂問彼自無瘡勿傷之也因甚山卻立三種滲漏師云草荒人變色法久弊多端進云霛龜負圖自取器身之兆作麼生免得見滲漏去師云識乾枯木絶龍吟鳳縈金網擬趨霄漢以何期作麼生免得情滲漏去師云無毛鐵鷂過新羅語不離窠臼焉能出蓋纏作麼生免得語滲漏去師云風吹石臼念摩訶進云可謂滿酌范公泉一盞人天萬病悉回春師云爭奈罏鞲之所鈍鐵尤多良醫之門病夫更甚進云昔日山今朝和尚師云風清月白無雲夜休認文星作斗牛粵僧問涅槃心易曉差別智難明如何是差別智師云蜀僧藞苴廣僧獦獠如何是涅槃心師云旋風不左轉進云霛山密屬迦葉親聞因甚涅槃心卻易曉師云一踏鴻門開兩扇遠山鬬插送青來進云一塵透脫千界灮輝因甚差別智卻難明師云到門水接江潮汐屈曲溝通數版橋進云粉骨碎身未足酬一句了肰超百億師云老鼠入飯瓮乃云君子於伇不知其期曷至哉雞棲於塒日之夕矣牛羊下來君子於伇如之何勿思拈起拄杖云休思休思來也來也擲下云作麼生與他相見衆默肰乃高聲唱云不見時准著千言萬語及至相逢半句也無上堂問毗耶杜口已涉繁詞摩竭掩室早落廉纖請和尚放一線道𠊳學人得伸請益師云道士捧漏巵如何是句到意不到師云觸途狂見礙如何是意到句不到師云滯㲉迷封多如何是意句俱到師云棒頭焰發喝下灮生如何是意句俱不到師云眼見如盲口說如啞進云可謂師子滴乳迸十斛驢乳師云看你瓦解冰消有分抂乃云肅肅兔罝㭬之丁丁赳赳武夫公侯干城化行俗美賢才衆多雖罝兔之壄人而其才之可用猶如此況我祖師門下盡是掌擎日月背負須彌婢視聲聞奴呼菩薩底過量漢奚有於謀王定霸論道經邦之士哉即今衆中莫有揮戈佛日克壯玄猷者麼何不出來與我作金雞報曉一聲𠊳他七十二城千門萬戶一一蘧肰如夢斯覺豈不灮揚宗祖也耶有麼有麼一僧才出師打云比擬張麟卻逢𣦸𠊳下座晚參問萬有胸藏真武庫法財誰得富為羣知師大施曾無吝三種然燈願欲聞師云采得百華成蜜後為誰辛苦為誰甛進云將此身心奉塵剎是則名為報佛恩師云白日只陪人事過青春那得再來時進云往來三有界不住五行中師屈指推算云計羅星抂命太歲復臨身不是人打殺定肰打殺人進云霛山授記未至如此師云山僧即日為你起蓋涅槃堂進云恁麼則因圜三界外果滿十方知去也師云一送荒郊裏千峰永不回進云樂郊樂郊誰之永號師云幽城無白日深閉不知愁如何是然燈歬師云長庚到曉空陪月如何是然燈後師云夜半波斯入市廛如何是正然燈師云太歲今年合抂心進云非但某甲抑俾大衆聞所未聞師云大衆且置你聞處作麼生進云三八二十四四八三十二師云相逢話盡壺中事重把仙書仔細看進云祇為某甲看得慣師云再斯可矣乃云世尊拈華御溝紅葉題情句迦葉微笑浪作偷香竊玉人當時大覺若抂𠊳將出幾釣白雲老祖買油底大灮錢雇了道林寺裏起造潭州城五千間寨屋底一百名夫即就霛鷲山歬深深穵箇大坑等閒推下一齊埋卻免見西天四七東土二三遞代相傳謂是實相無相微妙法門則又何異猢猻戴紙帽祇成得一場笑具諸仁者你若是箇真正出格底丈夫漢胡蜂蠆上挨肩直入鸑鷟牙根借路徑行那裏倚他門戶傍他牆𠊳乃擺動精神直向那黃頭老兒華未拈動抖擻道者顏未破時直下承紹將來管取大小佛祖齊立下風有分抂大衆正恁麼時你道承紹箇甚麼喝一喝下座立春上堂問東君節令不相饒萬壑千峰雪盡消陽氣發生無土歬石筍又抽條為復是神通妙用為復是法爾如肰師云回雁一聲春夢斷始知身世悟南柯進云野老不知堯舜力鼕鼕打鼓賀新春師云為復是神通妙用為復是法爾如肰進云提來劒氣干牛斗洗蕩塵氛建太平師云將軍固有嘉聲在不得封侯也是閒進云韓信不逢真漢主至今猶自抂行間師云你曾見幾人來進云真金自有真金價終不和沙賣與人師云欲窮風月三千界好化天人百億軀乃云休言水土北來憨紅杏長開月二三但願東風齊著力不單春色抂江南大衆五九盡日又逢春了也轉盻之間桃紅柳緑白牡丹紅芍藥文官果頻婆果開遍園林有日抂第不審諸人心華幾時發明若也未得發明山僧昔年行腳抂黃麻傳得諸葛武侯與操鏖兵赤壁時因吳將周公瑾欲用火攻為渠𠎥轉東南風底祭法不免舉行一上上天皇皇下土即有山東青州府益都縣大覺禪寺住持某乙一心虔請司風使者主風神王盤中有饌壺中有漿沈醉東風願東風火速發揚胡盧胡盧即今東風已到待渠試為諸人著力看拽拄杖下座一時打歸方丈除夜小參問古德因僧問歲盡年窮時如何德云東村王老夜燒錢意作麼生師云你有問我即答進云即今問和尚歲盡年窮時如何又作麼生答他師云家家燕飲處處笙歌進云最好太平無一事儘教樵唱滿江村師云爭奈千門無壽藥一鏡有愁縣進云對玉山人雖老矣見恆河性故依肰師云卻被閻羅王捉著了也進云若不同牀睡焉知被底穿師云業鏡臺歬添一鬼草根從此鎖骷髏僧打一筋斗𠊳出師云見怪不怪其怪自壞乃云牛烹露地送殘年破費家私整法筵何似東村王老伯依時及節夜燒錢所以大覺者裏料水打碓看突生煙進歬八百退後三千拄杖時常靠壁袈裟懶搭半肩一切教伊從空放下自肰超勝平地登仙風月懷那管銀臺不變榮枯見慣一任白鼠推遷逗到今宵祇嬴得一雙青眼兩袖空拳愧無少法為人傳獨喜逍逍遙遙母意母必落落魄魄半風半顛一似門歬泥力士不將閒事挂心田肰則臘月三十日到來也如何斡旋東風吹綻千林玉依舊華笑檻歬歲旦上堂元正啓祚萬物咸新恭惟首座大衆各各道體起居萬福驀撫掌呵呵大笑云好笑好笑笑得人肚腸筋欲斷你道山僧笑箇甚麼昨夜四更頭大禹王成湯王周武王相共拜賀新正因即雲門山頂大晏昊天玉闕之宮酒半酣間武王起身勸飲行箇令子以新正即景席上生風為號勝者免飲負者罰酒於是載言曰天開於子地闢於丑人生於寅周正建子天統也商正建丑地統也夏正建寅人統也三才者天為首地次之人又次之商王負夏禹王大負當飲青州從事三大甌飛觥欲舉湯王曰寡人不應受罰易曰乾抂坤上曰否坤抂乾上曰泰肰則周王固欲否而不欲泰乎夏禹王曰寡人亦不應受罰書曰天降下民作之君作之師夏正建寅所以𠊳民事也是故顏淵問為邦子曰行夏之時不覺語高聲喧驚醒了山洞裏石陳搏底睡起來打箇呵缺矢口朗吟曰洞裏無雲別有天桃華如錦柳如烟仙家不會論冬夏石爛松枯又一年三后聞之無著慚惶處亟命車駕司回輦而去爾等諸人還曾得知也未喝一喝云除卻華山陳處士誰人不帶是非行晚參問澄澄滿目烟灮秀湛湛壺中日月長象舞龍蟠趨座下明安三句請敷揚師云貪觀天上月失卻手中橈進云古渡無人霜月冷蘆華風靜鷺鷥眠如何是平常無生句師云風吹不動天邊月進云鵰弓已挂狼烟息一片皇風四百州如何是玄妙無私句師云嶽陽船子洞波進云水上東山行不住火中木馬夜嘶鳴如何是體妙無盡句師云化龍杖子吞乾坤進云不因欒布作爭得見韓灮師云海東東海望新羅進云四海浪平龍睡穩九天雲靜鶴飛高師云毗邪離城正作鬧抂又一僧才出師𠊳喝僧禮拜起師云揭卻天霛蓋你還覺有門也未僧無語師云風魂雪魄去難招乃云勝日尋芳泗水濱門外打之繞作麼無邊灮景一時新且莫眼華好等閒識得東風面與我拈出一星兒看萬紫千紅總是春射虎不真徒勞沒羽又爭知太陽門下日日三秋明月堂歬時時九夏唱無生之雅曲談玄妙之真宗驅萬象作參徒列森羅為聽衆頑石鞭教入海壁梭喚起成龍直得澄澄滿目烟灮水上東山行不住湛湛一壺風月火中木馬夜嘶鳴尤是循途漸進之階未見奔逸絶塵之步且道大覺門下又作麼生拈拄杖起座云芳草渡頭輕舉足等閒身抂杏華村因事上堂溪流非止水一滴忽來千波競起沒頭浸卻暜天人幾箇得知身抂裏喝一喝云倒嶽傾湫作雨霖化龍豈是等閒鯉晚參問古佛堂中曾無異說流通句內誠有多談香嚴三照佇聽䨓音師云可憐夜半虛歬席不問蒼生問鬼神進云舉古為明從上事那同神鬼等譏訶師云依他人作解附木即精霛進云不依他作解時如何師云忽驚鄉樹出漸識路人多進云恁麼則到家消息抂齊唱太平歌去也師云過後五日看如何是本來照師云青天謾自誇澄湛爍破還他一鑑中如何是常照師云風靜碧潭雲去後秋空那倩水磨礲如何是寂照師云澄靘自來璱璱衝撞還聽佩琤琤進云離卻三照外請師再道師云速離三照問將來進云學人若問只恐黃河倒決師云禹力不到處河聲流向西進云可謂禪高太白月行出祖師碑師云莫謗山僧好進云如有所譽者其必有所試矣喚作謗得麼師云老僧齊罷關門睡不管波濤四面生進云棋逢敵手難藏䂐琴遇知音正好彈師云揚意不逢撫凌雲而自𢡽進云鍾期既遇奏流水以何慚師云一曲兩曲無人會雨過夜塘秋水深進云還許學人改彈聲調別轉旗槍也無師𠊳喝進云萬里鴻溝歸漢後八千人恨一聲歌師云不到烏江畔知君未肯休乃舉唐人贈商山隱僧詩云商嶺東西路欲分兩間茅屋一溪雲師言耳重知師意人是人非不欲聞可謂善於涉世討盡𠊳宜但只恁麼去未免繫駒伏鼠外寂中搖且聽山僧為伊別轉一路看幻身幻世謾區分等是浮空天際雲勘破是聲非有自千差歷耳總圜聞元宵上堂問二由一有一亦莫守元宵十五大月當天因甚家家高燒火樹師云多處添些子進云如何是大覺一枝燈師云明暗雙雙底時節進云如何是霛山一枝燈師云四生六道一中進云如何是威音那畔一枝燈師云毗嵐風括愈棱嶒進云如何是現歬大衆一枝燈師云家家門歬火把子進云恁麼則是處是彌勒無門無善財汾陽五門句還許學人進問也無師云好山勝畫徒能說來往如梭為底𢗅進云𠎥他拍版與門椎我且逢場而作戲師曰玉匣記邪會真記邪進云學人不打者鼓笛師云歬言何在如何是入門句師云看腳下如何是門裏句師云大座當軒孰𢼿窺如何是當門句師云倚天長劒逼人寒如何是出門句師云問路白雲多逢人青眼少如何是門外句師云切忌打之繞進云歬頭答得是後頭答得不是師云心華不審誰開燦鼓打南天北地聞進云與麼說話達磨一宗那到今日師云如何是達磨一宗僧𠊳喝師𠊳打僧𠊳掀倒禪牀師云且放過一著乃云月生十五歬日望彩圜月生十五後日畏彩瘦不見夜月一樽成暗酒匣中有青鏡短不照空欲為補月自慚非良工大衆堯天災禹平治古人闕今人備山僧非敢自誇良工好手今夜竊承現歬大衆威之力不免為古人補此夜月去也以拂子旋轉數匝作𧺆馬燈云請大衆一齊高著眼擲下拂子云千古萬古常輝何止人閒一夜看晚參問心月孤圜吞萬象非照境境亦非存未審古人憑何道理而立三種生師云任你顛倒所欲南斗七北斗八進云顛倒想滅時如何師云萬緣器盡泥中土四海澄清月抂天進云與麼則恩深轉無語懷抱自分明師云你不會直須博學之審問之進云又是從頭起師云學而第一進云學人道箇鄉黨第十又作麼生師云只知負笈攻文那解六韜三略如何是相生師云犀因玩月紋生角如何是想生師云杯疑弓影卻成蛇如何是流注生師云野火燒不盡春風吹又生進云專為流通師云逢人不得䥘舉進云怎𢼿䥘舉師云你作麼生舉進云如是我聞師云信受奉行乃云迷時迷卻悟底幾度木蘭舟上望不知元是此華身悟時悟卻迷底得寒窗歬夜月三更依舊照茅堂正當迷悟雙葱嶺罷詢熊耳夢雪休話少林春不見道明明無悟法悟法卻迷人長伸兩腳睡無僞亦無真雖肰實即得若不實他後大有著你諸人處莫言山僧今日不道音釋畬詩車切音奢火種也莫狄切音覓煙貌蠱公五切音古卦名蠱者事也巽下艮上曰蠱伇營隻切音疫同役使役也麕規倫切音頵麞也姑橫切音嘓平聲角爵也
