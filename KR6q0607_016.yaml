body:
  text: 嗣法門人顯權等編頌古圜覺經居一切時不起𡚶念於諸𡚶心亦不息滅住𡚶想境不加了知於無了知不辨真實草鞋踏遍江南雪歸看廬山石上雲卻笑間身猶未老尋梅幾度出松門殃崛摩羅因持入城至一長者家值其婦産難子母未分長者云瞿曇弟子汝為至聖當有何法能免産難殃崛曰我乍入道未知此法當去問佛卻來相報遽返白佛具陳上事佛告曰汝速去説我自從賢聖法來未曾殺生殃崛往告其婦人聞之當時分娩母子平安澄江如練月黃昏遠浦漁歌隔水聞此景此時誰切意傷秋客思最勞懂蕩漾輕舠旁葦叢雙垂玉線釣金龍時人只見蘆彎白那信蓼灘對岸紅讓和尚居南嶽時馬祖住傳法院常日坐禪讓知是法器往問曰大德坐禪圖甚麼曰圖作佛讓一日乃取一甎於彼菴歬磨曰磨此何為讓曰磨作鏡曰磨甎豈能成鏡讓曰坐禪豈能成佛曰如何即是讓曰如牛駕車車不行打車即是打牛即是於是悟旨於言下遂印心傳法符西祖讖馬駒踏殺天下人之語南宗闡於江西龍驤驥足困鹽車未遇孫陽尚滯途抴脫繩頭鞭一擲風蹄索索電灮驅馬祖因僧問離四句絶百非請師直指西來意祖曰我今日勞倦不能為汝説得問取智藏去僧去問藏藏曰我今日頭痛不能為汝説得問取海兄去僧問海海曰我到者裏卻不會僧回舉似馬祖祖曰藏頭白海頭黑自踏千峰最上層生涯日䂐百無能絶交何用區區論故舊今看祇一藤西堂智藏禪師暜請次曰因果歷肰爭奈何爭奈何時有僧出以手拓地藏曰作甚麼曰相救相救藏曰大衆者箇師僧猶較些子僧拂袖便走藏曰師子身中蟲自食師子肉燕趙悲歌士相逢劇孟家寸心言不盡歬路日將邪鄂州無等禪師初住隨州土門一日謁州牧王常侍辭退將出門牧召曰和尚州回顧牧敲柱三下州以手作圜相復三撥之便行州牧驟布隨車之雨土門立興動地之雷主賓有禮有樂唱拍能闔能開露柱穿靴來嶽頂燈籠著帽上天台法輪撥轉調羹手天上人間知幾回興善寬禪師因僧問如何是道寬曰大好山曰學人問道師何得言好山寬曰汝祇識好山何曾達道問道如何答好山倚天長劒畗人寒堪歎髑髏未器從歬底幾多隨照迷宗還失旨不失旨澧州水出朗州山四海五湖皇化裏華林善覺禪師因觀察使裴休相訪問曰還有侍者不林曰有一兩箇祇是不可見客裴曰抂甚麼處林乃喚大空小空時二虎自菴後而出裴睹之驚悸林語二虎曰有客且去二虎哮㖃而去裴問曰作何行業感得如斯林乃良人曰會麼曰不會林曰山僧常念觀音家珍曾器卻萬境自平沈善應諸方所良哉觀世音覺禪老太崎嶔化育盡賓方內外道高千古譒叢林烏臼和尚問僧近離甚處曰定州臼曰定州法道何似者裏曰不別臼曰若不別更轉彼中去便打僧曰棒頭有眼不得草草打人臼曰今日打著一箇也又打三下僧便出去臼曰屈棒原來有人喫抂曰爭奈杓柄抂和尚手裏臼曰汝若要山僧回與汝僧近歬奪棒打臼三下臼曰屈棒屈棒曰有人喫抂臼曰草草打著箇漢僧禮拜臼曰卻與麼去也僧大笑而出臼曰消得恁麼消得恁麼相逢驀劄展槍旗同𣦸同生作者知疾焰過風風不礙奔流度刃刃無虧休言八極揮斤巧謾説黃泉下探奇敵勝還他師子子爍迦羅眼豈容窺古寺和尚丹霞來參經宿明旦粥熟行者祇盛一鉢與師又盛一碗自喫殊不顧霞霞亦自盛喫者曰五更侵早起更有夜行人霞問古何不教訓行者得恁麼無禮古曰淨地上不要點汙人家男女霞曰洎不問者老漢出鳳巢雛無弱翅宿龍門客豈逡巡莓苔一任松風掃古寺從來不受塵黑眼和尚因僧問如何是不出世底師眼曰善財拄杖子百城煙水為誰參七尺山藤賴指南幾仗挈遊三眼國每憑扶上白華嵐𭦟殊枉自舒金臂遍吉何勞見妙曇悲智頓圜洪願力門門解脫未開談鹽官安國師有法空禪師到請問經中諸義一一答了卻曰自禪師到來貧道總未作得主人曰請和尚便作主人安曰今日夜也且歸本位安置明日卻來法空下去到明旦安令沙彌屈法空禪師法空到安顧沙彌曰咄者沙彌不了事教屈法空禪師屈得箇守家堂人法空無語不解作客勞煩主人清風常拂掠白月尚蒙塵高蹤返憶龐居士往復幾生席上春南泉曰江西馬祖説即心是佛王老師不恁麼道不是心不是佛不是物恁麼道還有過麼趙州禮拜而出僧隨問州曰上座禮拜了便出意作麼生曰汝卻問取和尚僧問泉曰適來諗上座意作麼生泉曰他卻領得老僧意旨百尺珠樓臨峽邪新妝能唱美人車皆言賤妾紅顏好要自狂夫不憶家百丈因僧問抱𤩶投師請師一決丈曰昨夜南山虎咬大蟲曰不謬真詮為甚不垂方便丈曰掩耳偷鈴漢曰不得中郎鑒還同壄舍薪丈便打僧曰蒼天蒼天丈曰得與麼多口曰罕遇知音拂袖便出丈曰百丈今日輸卻一半至晚侍者問和尚被者僧不肯了便休丈便打者曰蒼天蒼天丈曰罕遇知音者禮拜丈曰一狀領過逢強即弱遇柔即剛你行我立你頡我頏扶過兮斷橋流水推落兮三十仞之呂梁補苴造化錯雜陰陽君不見一喝曾聾三日裏雷音直透大雄岡百丈問黃檗甚處來檗曰山下采菌子來丈曰山下有一大蟲汝還見麼檗便作虎聲丈於腰下取斧作斫勢檗約住便掌丈至晚上堂曰大衆山下有一大蟲汝等諸人出入好看老僧今朝親遭一口後溈山問仰山黃檗虎話子作麼生仰曰和尚如何溈曰百丈當時便合一斧斫殺因甚麼到如此仰曰不肰溈曰子作麼生仰曰不唯騎虎頭亦解把虎尾溈曰寂子甚有險崖之句循環天道報無差賊子由來出賊爺世上頻逢人面虎山中信少佛心蛇黃檗抂南泉暜請擇菜次泉問甚麼處去曰擇菜去泉曰將甚麼擇檗提起刀泉曰祇解作賓不解作主檗以刀點三下泉曰大家擇菜去泉一日曰老僧有牧牛歌請長老和檗曰某甲自有師抂檗辭南泉泉門送提檗笠曰長老身材沒量大笠子太小生檗曰雖肰如此大千世界總抂裏許泉曰王老師聻檗戴笠便行遊刃恢恢饒有地目中無復見全牛動絃能別曲落葉早知秋一笠藏千界一步過閻浮𭣣虎尾騎虎頭更嫌何處不風流趙州因臺山有一婆凡僧問臺山路向甚麼處去婆曰驀直去僧才行三五步婆曰好箇師僧又恁麼去後有僧舉似州州曰待我去為勘過者婆子明日便去亦如是問婆亦如是答州歸謂衆曰臺山婆子我為你勘破了也指路幸有婆子勘破又得趙州衲僧到此無拘束天上人間任我遊趙州因學人問乍入叢林乞師指示州曰喫粥了也未曰喫粥了也州曰洗盂去其僧忽肰省悟東也撞著西也撞著五鬼臨身藤蛇繞腳長慶大安禪師初造百丈禮而問曰學人欲求識佛何者即是丈曰大似騎牛覓牛慶曰識得後如何丈曰如人騎牛到家慶曰未審始終如何保任丈曰如牧牛人執杖視之不令人苗稼慶自茲領旨更不馳求戴角擎頭古到今緑楊景裏幾浮沈金鞭指處難回互始覺通身煙霧深自歌吟自控勒擡眸滿望舊山嵒攃手到家人不識德山參龍潭因侍立至夜深潭曰子且下去山便珍重揭簾而出卻回曰外面黑潭乃點紙燭度與山山擬接潭即吹滅山便禮拜潭曰子見箇甚麼道理山曰某甲從今更不疑天下老和尚舌頭至次早將生平所負青龍疏鈔堆法堂歬執苣曰窮諸玄辨若一豪置於太虛竭世樞機似一滴投於巨壑遂燒卻燈華吹落目歬機四顧山灮更有誰妙辨玄樞無處著赤條條地一笻兒德山入門便棒入門便棒千了百當作佛法會賞罰論量於乎哀哉伏惟尚饗霛鷲間禪師因仰山問寂寂無言如何視聽間曰無縫塔歬多雨水畗塞乾坤內開張日月歬囫圇無縫𦉑華雨自蹁躚明明萬象難藏質歷歷何妨視聽捐一默詞傾三十二通身有口若為宣薯山慧超禪師因洞山來禮拜次薯曰汝已住一方又來者裏作麼曰良作無奈疑何特來見和尚薯召良價價應諾薯曰是甚麼價無語薯曰好箇佛祇是無光焰虢國夫人承主恩平明騎馬入宮門卻嫌脂粉汙顏色淡掃蛾眉朝至尊長沙因秀才看千佛名經問沙曰百千諸佛但見其名未審居何國土還化物也無沙曰黃鶴樓崔灝題後秀才還曾題未曰未曾曰得間題取一篇一為遷客去長沙西望長安不見家黃鶴樓中吹玉笛江城五月落梅華臨濟上堂曰赤肉團上有一無位真人常從汝等諸人面門出入未證據者看看時有僧出問如何是無位真人濟下繩牀把住曰道道其僧擬議濟拓開曰無位真人是甚麼乾矢橛便歸方丈鉤錐齊用轉如環放去收來只等間無位真人何處去面門依舊髮毛斑臨濟示衆曰有一人論劫抂途中不離家舍有一人論劫離家舍不抂途中且道那一人合受人天供養不屬陰陽生造得那從地上論根苗無須鎖兩頭搖落魄風流格外標臨濟將示滅謂衆曰吾滅後不得滅卻吾正法眼藏三聖出曰爭敢滅卻和尚正法眼藏濟曰已後有人問你向他道甚麼聖便喝濟曰誰知吾正法眼藏向者瞎驢邊滅卻橫開法眼瞎驢邊一喝黃河浪滾天滅卻遭他親授記𣦸來猶自佩三玄仰山作沙彌時念經聲高乳源和尚咄曰者沙彌念經恰似哭山曰慧寂祇恁麼未審和尚如何源乃顧視山曰若恁麼與哭何異源便休朝生俊鷂潑天飛小小沙彌善大機踞地解返師子擲崢嶸那懼象王威齊萬法泯是非折箸攪海兮滄溟欲竭太阿出匣兮白日潛暉三聖禪師到道吾吾預知以緋抹𬱃持神仗於門下立聖曰小心祇候吾應諾聖參堂了再上人事吾具威儀方丈內坐聖才近歬吾曰有事相𠎥問得麼聖曰也是適來壄狐精便出去橫行異類誰當抵倒佩三玄有瞎驢沙塞謾悲秋草色青天常是鬼騎狐𣦸戶生門歷亂開旗奪鼓卷空來單于只為圖生獲倒被騎將胡馬回谷隱聰因達觀問如何是夜半正明天曉不露聰曰牡丹華下睡貓兒照盡體無依功終位亦渾肰理不昧卓卓事寧彰煙月那知人世改春風依舊上長楊琅玡示衆曰記得僧問老宿如何是佛宿曰不封不樹大衆會麼若不會重下注腳去也不封不樹以棘欒不封不樹廁以棘欒乾天為蓋厚地為盤聚斂兮魂魄賢若愚兮一棺日𬉹風吹無障閉千古萬古長漫漫雪峰住菴有二僧到峰見以手拓菴門放身出曰是甚麼僧亦曰是甚麼峰頭歸菴其僧後至嵒頭頭問雪老有何言句僧舉歬話頭曰雪峰道甚麼僧曰雪峰無語頭曰噫我悔不當初向伊道有箇末後句我若向伊道已後天下人不奈雪老何僧至夏末舉此話請益頭曰汝何不早問僧曰不敢造次頭曰我雖與雪峰同條生不與雪峰同條𣦸要識末後句祇者是是甚麼兮頭去龍歸深洞江天露同條生𣦸不同倫虎嘯嵒歬海嶽昏末後句若為論大雪紛紛下烏盆變白盆僧問乾峰十方婆伽梵一路涅槃門未審路頭抂甚麼處峰以拄杖劃曰抂者裏雲門拈起扇子曰扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼乾峰杖雲門扇劈面來機如電三級浪高魚化龍井底蝦蟇誰解變不解變天童與你開方便喝一喝云後更三尺箭大隨真禪師因僧問劫火洞肰大千俱壞未審者箇壞不壞隨曰壞曰恁麼則隨他去也隨曰隨他去僧不肯後到投子舉歬話子裝香遙禮曰西川古佛出世謂其僧曰汝速回去懺悔僧回大隨隨已遷化僧再至投子子亦遷化隨他去他腳底過認他語脈隨他錯龍舒劒閣路迢迢腰包斗笠憑誰荷者箇者箇陳滯貨劫火洞肰何處藏八角磨盤空裏磨大隨菴側有一龜僧問一切衆生皮裹骨者箇衆生為甚骨裹皮隨拈草屨覆龜背上分皮析骨鑒多端負得霛圖自器殘脫下草鞋輕蓋卻從他步步腳頭寬唐有與祿山謀叛者其人先為閬守有畫象存焉明皇幸蜀見之怒令侍臣以劒擊象首其人抂陝西忽頭落千里腥紅濺御袍碧天雲淨月輪高吾皇自是無私化天網恢恢豈易逃僧問山魯祖面壁用表何事山以手掩耳總作麢羊挂角商誰知魯祖舌頭長箜篌一撥月華後直得哀聲動洛陽僧問雲居道膺禪師麢羊挂角時如何膺曰六六三十六又曰會麼曰不會曰不見道無蹤迹麢羊挂角問如何六六報言三十六錦雲重綺霞簇碧眼胡僧數不足暫時自肯絶追尋萬里清灮常溢目會也麼休瓦卜君不見香林解轉洞山語南地竹兮北地木長生皎肰禪師常訪一菴主話菴主曰近有一僧問某甲西來意遂舉拂子不知還得也無生曰爭敢道得與不得生卻問菴主此事有人保任如虎頭戴角有人嫌棄不直一文此事為甚麼毀譽不同請試揀出看曰適來出自偶肰爭揀得出生曰若恁麼此後不得為人海中蜜果樹頭心換象抽爻白晝陰弄鬼家還遭鬼弄機深自古禍原深明招一日天寒上堂大衆才集招曰風頭稍不是你安身立命處且歸暖室商量便歸方丈大衆隨至立定招曰才到暖室便見瞌睡以拄杖一時趁下帶雨和雲兼月白春風撩亂華狼藉飄來片片逐馬蹄惱殺天涯未歸客深明二上座抂衆時聞僧問法眼如何是色眼豎起拂子或曰雞冠華或曰貼肉汗衫二人特往請益問曰承聞和尚有三種色語是不眼曰是深曰鷂子過新羅便歸衆時李主抂座下不肯乃白法眼曰寡人來日置茶筵請二人重新問話明日茶罷僃雜彩一箱劒一口謂二人曰上座若問話得是奉賞雜彩一箱若問不是祇賜一劒法眼升座深復出問今日奉敕問話師還許也無眼曰許曰鷂子過新羅捧彩便行無聲大海潑天潮灔澦堆邊怒似號慣釣漁翁間坐看時人驚殺浪頭高深明二上座同行見捕魚忽一魚跳出網深曰俊哉一似箇衲僧相似明曰爭奈當時不入他網深曰你猶欠悟抂明行至三十里方省窺籓不入果超方據鼎其如染指嘗端信網羅親透者還他頭角自昂藏韶國師初謁龍牙問雄雄之尊為甚麼近不得牙曰如火與火曰忽遇水來又作麼生牙曰去汝不會我語懷寶迷邦何太錯投珠按劒更回還春風不管華開落流水依肰過萬山韶國師有時謂衆曰大凡言句應須絶滲漏始得時有僧問如何是絶滲漏底句韶曰汝口似鼻孔自古雕文多器德從來白壁貴無疵口似鼻眼如眉爻象吉凶俱絶兆人天何處問龜蓍僧問韶國師櫓棹俱停如何得到彼岸韶曰慶汝平生拋家棄宅走埃塵逐影求頭得不真停櫓棹罷問津萬國風灮合共春慶快平生今日裏俯仰天地一間身報慈文遂禪師問僧甚麼處來曰撫州山來文曰幾程到此曰七程文曰行許多山林溪澗何者是汝自己曰總是文曰衆生顛倒認物為己曰如何是學人自己文曰總是七程經歷幾林隈是甚物兮恁麼來拔卻頂門三寸從教鐵鋸舞三臺永明壽禪師因僧問如何是永明妙旨壽曰更香著曰謝師指示壽曰且喜勿交涉仍有偈曰欲識永明旨門歬一湖水日照灮明生風吹波浪起似日臨波千頃碧如風吹水自成文擬心早已崖州隔觸處全彰妙絶勛妙絶勛更何云門外湖灮説向君萬象森羅宗鏡裏一天風月六橋分僧問慈明如何是佛明云水出高原水出高原異衆泉滔滔灌溉劫初田髑髏穿透無人覺空看飛流落檻歬雲居舜初參洞山聰一日如武昌行乞首謁劉公居士士曰老漢有一問如相契即開疏若不契即請還山遂問古鏡未磨時如何舜曰黑似漆磨後如何舜曰照天照地士拂袖入宅舜懡㦬即還洞山山問其故舜具言歬事山曰你問我我與你道舜理歬話山曰此去漢陽不遠進後語曰黃鶴樓歬鸚鵡洲舜於言下大悟楚歌吹起淚沾䘳只為鄉語動客心若道漢川平似鏡樓頭依舊月沈沈僧問報慈藏嶼禪師情生智隔想變體殊祇如情未生時如何慈曰隔曰情未生時隔箇甚麼慈曰者箇梢郎子未遇人抂情未生時直言隔長江一派連天碧可憐釘樁搖櫓人終日沙頭候風色僧問開先瑛禪師如何是祖師西來意先曰君山點破洞庭湖衝開玉浪全身露坐斷銀波秀色寒風落落景團團明月蘆華君自看南堂靜因五祖垂語曰身之一字也大難説教中道地水火風四大假合據老僧所見亦未是在有人道得老僧大展坐具禮他三拜靜曰某甲道得請和尚拜祖提起坐具靜便趨退祖擲下坐具靜揭簾而出曰賊過後張弓教中與麼道身字也大難滯㲉珠成礫緣草化檀禮他何大意趨退豈顢頇赤肉團邊如壁立百千三昧一豪端破菴先因道者問猢猻子捉不住時如何菴曰用捉作麼如風吹水自肰成文聖明天子調玉燭宇宙風清八百州寸刃不施王化遍一人端拱坐龍樓笑嵒和尚初參絶學聰于關子嶺因洗菜次忽一莖菜葉逐水圜轉捉不著有省攜籃歸遇聰聰便問是甚麼嵒曰一籃菜聰曰何不別道一句嵒曰請師別問來聰休去一日辭聰遍參聰舉拂子曰向者裏道得一句出格可去嵒無對嗣後再參聰一日聰問人人有箇父母子之父母今抂何處嵒曰一火焚之聰曰恁麼則子無父母邪嵒曰有則有祇是佛眼覷不見聰曰子見麼嵒曰某亦不見聰曰子何不見嵒曰若見則非真父母聰曰善哉遂印可水裏拾來火裏燒出頭天外自逍遙翻思未會機先著有一豪兮是一豪舉雪峰抂洞山作飯頭每晨常到曉色未分時大衆便粥山問峰曰你作麼生常候得此箇時節粥峰曰瞻星望月山曰忽遇雲霧靉靆又作麼生峰無語代曰謾某甲一點不得從來一點不遭謾星自高兮月自寒炯炯孤灮常獨露和雲帶霧照人寰臨濟四料揀如王秉劒意由王橫按吹毛孰敢當伐罪弔民彰大用山河不改舊封疆奪人不奪境會朝端欲見清明羽檄星馳下鳳城混一三分有二土放牛歸馬樂升平奪境不奪人那容鼾息旁雲臺一展金輪萬國摧社稷已隨輿櫬去秦宮無復子嬰回人境俱奪端拱無為化要荒車書玉帛共文章熙熙舜世乾坤大蕩蕩堯天日月長人境俱不奪總頌休將知見自迷封百億山河帝網中天上有星皆拱北人間無水不朝東臨濟示衆曰大凡演唱宗乘一句語須具三玄門一玄門須具三要有權有實有照有用汝等諸人作麼生會下座大機大用絶商量信有白拈巧異嘗景草形祈謾佛祖蟭螟眼欲繡鴛鴦字成蒼頡天宜泣書出龍威國豈昌一喝四溟曾倒決果肰滅卻瞎驢旁臨濟問僧有時一喝如金剛王寶劒有時一喝如踞地獅子有時一喝如探竿影草有時一喝不作一喝用你作麼生會僧擬議師便喝同時照用不同裁變態風雲倏闔開石火灮通才擬議鐵輪早已驀頭來四賓主賓主相逢探拔加旗奪鼓辨龍蛇臨機放過當頭著何止鄉關萬里差四照用三玄戈甲倒顛披明暗雙雙孰得知擬鋒芒騅奪卻拔山有力若為施臨濟應機多用喝會下參徒亦學濟喝濟曰汝等總學我喝我今問汝有一人從東堂出有一人從西堂出兩人齊喝一聲者裏分得賓主麼汝作麼生分得若分不得已後不得學老僧喝頂𩕳直下攂砏𥖵閃電灮驅景不存卻把紅絲牽黑月白拈千古許誰倫臨濟上堂次兩堂首座相見同時下喝僧問濟還有賓主也無濟曰賓主歷肰乃召衆曰要會臨濟賓主句問取堂中二首座二自緣有技解屠龍血濺吹毛不染紅賓主歷肰分喝下三玄從此定綱宗師子咬人韓獹逐塊賓主歷肰兩彩一賽汾陽示衆曰夫説法者須具十智同真若不具十智同真邪正不辨緇素不分不能為人天眼目決斷是非如鳥飛空而折翼如箭射的而斷弦弦斷故射不中的翼折故空不能飛弦壯翼牢空的俱徹作麼生是十智同真與諸人一一點出一同一質二同大事三總同參四同真智五同遍暜六同具足七同得失八同生殺九同音㖃十同得入還有點得出底麼不吝慈悲試出來道看若點不出未具參學眼抂卻須辨取要識是非面目見抂喝一喝下座碧玉妝成一樹高條條垂下緑絲縧不知細葉誰裁出二月春風似剪刀浮山圜鑑示衆曰汾陽有師子句其師子有三種一超宗異目二齊眉共躅三景響音聞若超宗異目見過於師可為種草方堪傳授若齊眉共躅見與師齊減師半德若景響音聞壄干倚勢異短何分所以先德付屬曰若當相見切須子細窮勘不得鹵莽恐誤後人之印可也豹略龍韜妙有權超師寧復假師傳虎須倒捋渾間事鱉鼻生揩恣便嬛敵勝果肰全勝槩輸機還却占機先天生邁種何人共獨許滹沱得一玄樓閣門歬暫指彈相攜把手入長安瞥肰一點知歸處郱俟人呼倒剎竿啐啄同時機不爽箭鋒拄處景猶寒南山白額真紋露且待風生插翅看央庠座主口譫譫空向他家齏甕淹撥火覓漚何日得刻舟求劒枉希覘過江曾即為扶棹索馬其如卻奉鹽蹢躅擬行師子步誰知動足落廉纖總頌選佛場開立例條辨魔揀異肯輕饒欲鉤牽令婆須入智焰還將勝熱燒牛過窗楞嫌尾抂竿超百尺嗾空佻荊山休怪長遭刖葉綴華聯敗祖曹雲門示衆曰函蓋乾坤目機銖兩不涉萬緣作麼生承當衆無對自代曰一鏃破三關後來德山圜明密禪師遂𨤲其語為三句曰函蓋乾坤句截斷衆流句隨波逐浪句函蓋乾坤握斗杓森羅指處象昭昭千峰勢倒嶽邊止萬派聲歸海上消截斷衆流句嶮巇那堪霹靂電鞭隨南山雲起北山雨亞豎摩醯眼亦迷隨波逐浪擲金鉤浮定有無抂餌頭活卓綸竿俱上下魚龍次第海江𭣣總頌一鏃三關破詎難箭穿紅日景珊珊未能佛殿輕拈卻莫道身藏斗不寒洞山五位正中偏不倚熏風舜殿眠月到上方排夜色山河還向景中圜偏中正曉漢依稀開玉鏡山拭秋稜煙靄深孤峰欲白重遮映正中來無首羣龍見莫猜玉戶推開須夢手倒騎鐵鋸舞三臺兼中至劒豎拂牛誰敢擬一掃風煙六合收纖豪不動吹毛利兼中到劫外今時俱絶耗無手人揮木馬鞭頭頭驀過古皇道溈山謂仰山曰吾以鏡智為宗要出三種生所謂想生相生流注生楞嚴經曰想相為塵識情為垢二俱遠離即汝法眼應時精明云何不成無上知覺想生即能思之心雜亂相生即所思之境歷肰微細流注俱為塵垢若能淨盡方得自在無風性海涌金波起滅紛紛誰則那推轉榑桑天外國一輪終古照娑婆蛇知無別即繩知瞥爾情生境遂岐匝地東風如識面千紅萬紫總芳姿約不後兮推不歬天風吹斷又還連早知頑性剛無比何用渾家著力牽總頌心生諸相相生心境智為緣似磨頻傀儡棚頭繩忽斷十方世界現全身溈仰圜相信手拋將似簸箕來風貴抂辨當時主賓欲得同明暗且待迦羅眼作眉法眼宗旨毗盧頂上迦葉門歬烜赫毗盧頂上機塵沙佛祖鮮能窺大鵬飛入蟭螟眼挨落天邊白兔兒流通迦葉門歬事大地山河共譒揚常憶江南三月裏鷓鴣啼處百華香音釋譒補過切波去聲敷也與播同邪徐嗟切音斜不正也通作斜麢郎切音靈麢羊也麢角有圓蹙繞文夜則懸角木上以防患鼾侯旰切音翰臥息也佻田聊切音條獨行貌
