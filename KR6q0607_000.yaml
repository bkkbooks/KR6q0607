front:
  text: 弘覺禪師語録序中一雲棲弟子大周金之俊撰禪至今日而語録之弊極矣少林西來原無文字溪南邁乃著壇經漸有語言總非色相厥後宗師代出接引隨機或傳心要於單文或顯尼珠於隻字提關啓鑰演無本之家門抉髓敲筋施不方之醫藥天風鼓籟雖則成音短𥴦無腔何嘗有曲語録之傳是亦後人之刻舟求劒學者之𠎥指觀月耳奈何偶落塵詮遂成習尚説法者以為非録弗貴聽法者以為無録非師梨棗成林豪毛盡禿甚至魔民登座必標叩擊之機緣狐子白椎𥁞號支那之撰述淺則虎皮羊質畫依樣之葫蘆深則馬角龜毛駕脫空之鬼魅向枯椿而尋兔指岐路以覓驢杜撰雷同支離影響忝宗門之話柄壞初祖之家風以斯為禪何如無語以是為語何如無録不有真師一㖃孰遏野狐亂鳴此弘覺禪師之語録所以不可已也禪師栽松宿世折竹今生早服儒冠窺孔顏之樂處中咨心要洞佛祖之禪源紹法天童密雲重布揚容古路法雨遍施提令正而萬國從風當機圓而諸天俯首我世祖先皇帝金輪御世慧日中天訪道覺民不惜崆洞之拜求人善世寧惟功德之咨特屏萬機親發十問如針入芥似乳投酥覺寶山開徽文電耀馬駒騰高足每承龍象褒揚猊座顯真王迥異澤犴威德是以綱維三界震動十方臨濟中興徑山再世棒頭有眼爍開障日之翳雲口角藏鋒截斷迷津之網鏡妖而窮蕅孔衛道而罔避棘叢三要三玄指歸有在五宗五葉滙合斯真夫以言止言則妄言者廢以録正録斯僭録者銷茲帙之刻非沃沸之氷泉息喧之毒鼓哉某染指大乘係心宗鏡慨正法之衰濫仰振起之得人目擊道存意消言下趙閲道偶然撞彩遇佛慧而開頂門裴居士當下知音禮運師而空心蘊平陽箭過始覺鋒寒良馬鞭垂方知影痛須識千機萬句不是吾師脣吻邊事便疑家書戶刻未免世間門面中語矣斯録具在天何言哉天童弘覺忞禪師語録序昔有客問張安道孔孟以後誰為命世聖賢安道歷舉南嶽馬祖諸師謂儒門淡泊收拾不住無𥁞居士聞之撫几擊節歎為達人高論余嘗逆溯嵩少自華分五葉以來若牛頭融若丹霞肰若風穴之魁奇慈明之雋拔更若佛果之有覺華嚴妙喜之有西禪需皆以書生問道方外舍縫掖而方袍棄選官而選佛其初既已樹儒林幟折羣彥後乃痛念生死慷慨落𩭄遍參哲匠紹續祖燈安道之語斯焉益信夫宣聖以菩薩地為世間師內祕外見隱實施權故所示言教微開其端引而不發至大雄法道廣被真丹乃畼厥本懷初祖泛海而來的示心宗更復𥁞底掀翻直説直用而如來出世大事因緣始無遺憾故當世精奇特達之士罔不歸宿於此如水投巨壑萬派聲消而我儒宗末流習為訓詁漢宋諸賢各守師説粗者徒箋象數精者復耽理解先聖深意泯闕不傳沿及近世則弄詞華竟為貿易青紫之具此高人傑士所以鄙棄而不欲道也山翁大師以嶺嶠英儒頓世網最初發心已超肰有將相不為之概而討論章句纏綿理解之習亦已破其籓壁而棄其筌蹄矣金鱗躍漢天馬追風信非儒門所能收拾者是以一出而剃染開先服勤太白洎入廛垂手接物利生沛爾言滿天下道江湖盛德高行人稱黃巖古佛即遊戲翰墨亦一代宗工直與明教寂音並驅爭先至於據本分一著號令人天指麾佛祖如茲録之豹露一斑者有時韻出青霄有時鼓撾塗毒有時山窮水𥁞別轉旗槍有時電卷風馳斬新日月師王哮㖃香象失威到此若佛若儒總是崖州萬里説禪説道並須到退三千就便黃面老子碧眼胡僧尚且收拾不住何獨儒門云爾哉冰菴道人與麼塗污亦是平地骨堆無風起浪老漢痛棒有分諸方鐵𬱃銅頭更當別具眼始得鹿城門弟子張立廉拜題天童弘覺忞禪師語録序駿佳初閲禪籍見從上諸祖每以法器為重默識而預期之竊疑曰此事阿誰無分奚問器為及觀諸大老如丹霞以應舉選官大洪以垂髫上第正覺以進士馳聲而山慈明晦堂佛果皆以書生擅名當世又如汾陽圓通白雲華嚴霛源佛印或童稚神智或博極羣籍或翰墨精妙是皆能立談取卿相者而寶絡雖美象王弗顧金籠誠艷鵬翅弗貪此其器固有超越於卿相之上者矣所以入此宗門氣吞佛祖漚視大千曾區區之毀譽得失利養名聞足以稍嬰其念乎古人法器之説肰後信其不誣矣駿佳於近代得山翁大師焉師髫年譽望俯矚公輔乃年踰志學即棄掌中之富貴室家完美頓斷千劫之愛纏此非所謂器越卿相之上與丹霞諸公把臂於九天之際者乎是以嚴霜震雷如黃檗師登其堂吞佛殺祖如天童師入其室駿久遊天童老人門下每從衆中一望見輒神聳意肅曰古所謂法器者非斯人歟殆老人化去師繼其席宗風大振衲子奔湊一時叢林公論謂事事追蹤古人真足師範人天而雅量厚德不可殫述焉法器之足重不於此益徵哉佛果有云吾禪如大海必以大海受之正此意也雖肰駿更有進焉今之以池沼受海水者不足道矣苟以江河受海水者是僅得師説之一二而不能具體者也即以大海受大海者猶是智與師齊減師半德者也惟更有廣於大海者以受之乃謂之智過於師方堪傳受蓋必授受之際恆有餘地存焉乃能通權達變善繼善述以成克家之子如其不肰洞山所謂全肯則孤負先師去矣駿佳觀老人直截貞實斬𥁞支葉師固得其旨矣肰古人綿密之機用玄奧之綱宗又不啻如寶鏡當臺胡漢俱見也老人氣宇如王上下獨尊師固繼其道矣肰虛懷推潛德之同參坦衷掃濟洞之町畦又不啻如惠風披拂遍界皆春也老人不辭筆削之勞以衛道不避好辨之迹以荷法門師固已擔其任矣肰謗書絶不寓目筆舌化於無諍又不啻如水天一碧浪靜風恬也是正所謂善繼也善述也為天童克家之子也苟非其器寬有餘地則𣦸守師説不知變猶之飽餐珍味不能化孰知珍味之能殺人哉具參方眼者請讀大師語録則自知之誠無俟駿之贅也平原傭祁駿佳拜題詔書皇帝敕諭朕惟善政導民期適蕩平之路仁風扇物統歸化育之中仰千聖之徽猷遡百王之遺軌理無分於三教道豈外於一心故佛演法門立闡揚之大旨祖標禪理示默契之真宗皆所以迥脫疑情頓開覺性惟溪之一脈儼雞足之上乘暨臨濟之三玄允象王之法乳慧雨暜施於一切宗風常勝於五燈緣衍法之獨隆斯傳衣之最衆朕撫臨寰宇心切牖民期與四海蒼生共臻覺路必便明心而見性方能易惡而至中時覽經文間常參究續圜頓交融之旨必行解相應之人聞爾禪僧道忞臨濟正傳宗門法器戒行清峻不染六欲之塵道眼圓明能空四諦之妄風規早著解脫有年憫結習之牽纏揭單傳之要渺是用特遣僧籙司右闡教淨行禪僧法璽齎敕歬往召爾來京欲闡玄風佇聞高論爾其洗就道持錫遄征無耽深隱之清用慰遠延之切於戲弘宣大道復淳古之休風廣度迷情躋含生於壽域欽承朕命式賁爾宗欽哉故諭順治十六年閏三月日敕書皇帝敕諭朕惟佛會拈華妙心傳於迦葉禪行面壁宗旨付於神光六葉既敷千華競秀蔭法雲於真際火宅晨涼耀慧日於康衢重昏夜曉以至瞚目揚眉擎拳舉指類皆合宗門之妙諦得教外之霛機誠非他學可知亦豈意生所及眷言道行冀覿高蹤實悟真如必先玄覺咨爾禪僧道忞嗣法天童傳宗臨濟克證無生之旨機自圓明允通向上之關悟稱諦當朕爰稽載籍祈會性真間覽玄文深嘉妙義故時於聽政之暇詢爾以法道之微乃名言之不繁克隨機而得解玄關幽鍵感即能通遙源濬波酌之不竭傳一燈於種智了萬法於真空廣量出於凡心元明踰於宿學引之於有高謝四流推之於無俯弘六度信乎凡之可以證聖洵哉惟覺所以悟迷非同測海窺天固以登堂入室堪主法門之席允稱禪衆之尊是用封爾為弘覺禪師錫之敕印於戲慈周萬有大身遍於十方利濟四生本覺超乎三世俾舉代咸登仁壽之域抂隨方而啓般若之門其益懋爾勤修庶弘開夫正梵式承嘉命丕闡宗風欽哉故諭順治十七年四月日贊憶自黃巖嗣席天童踞先覺堂卓卓孤峰以出毒以毒攻蛇吞鱉鼻虎咬大蟲正合全提孰敢嬰鋒出語成詠百折不窮佛果衙官大慧附庸粳秕之導往來愚衷國難以來蹤迹西東兄遊天外余戲圜中世出世間皆大英雄不負先師舊衲蒙茸眉毛結共鼻孔氣通溪正脈臨濟真宗是木上座亦號山翁法弟通表黃育祺頓首贊天童開堂疏恭惟天童堂頭山翁大和尚出身東粵異曹溪之目不識丁奮迹儒衣勝丹霞之語猶帶腐俯從人望嗣主天童點末後灮明照地照天千丈法幢高豎了見成公案打風打雨一條拄杖橫拈時屆仲春月維望日向者娑羅雙樹俄成古佛儼肰示見雙趺茲焉太白孤峰聿布新條豈曰浪鳴孤掌敬拂寶華王座佇聆塗毒鼓聲績等曷勝翹跂之至崇禎十六年二月十五日兵部職方司郎中孫嘉績右率寧紹蘇常四郡護法士紳等七十三人同疏同門疏伏以嶺南無佛性三十五葉衣盂恰值乎其人濟北𪭺虎須七百餘年戈甲重新於此日先和尚坐通玄峰頂密雲彌布大千新堂頭入太白院中一雨暜滋羣品破沙盆赤手扶起奚啻密菴傑之繼應菴華木上座劈面提持不數東嵒日之承西嵒慧祺衣裳異色根本同條雖難比三聖瞎驢撩寶壽之瞋點破鎮州人眼猶庶幾郭家俗漢酬白雲之乳敬拈五祖爐香所願恆順輿情不虗來請法王登法座寰中奉斬新之敕寧假五帝三王師子踞師牀天外㖃無畏之音盡掃千妖百怪頂門著掀翻先覺堂從上古錐後加鎚烹煅震旦國見前英物謹疏崇禎十六年二月十五日毗陵江上黃育祺疏大能仁開堂疏伏以嵩山並秀於鷲嶺五葉敷一乘之華濟流逆遡於曹源一喝破三玄之奧宗風爰來於漠北大法尤振於嶺南後五百而重逢實千載之希遘恭惟山翁大和尚迹踵庾嶺乳滴溪德灮耀舍那之身戒香馥毗盧之頂飽黃檗之藥味殺活同時秉太白之金鋒外魔器膽唯此能仁古剎首稱於越名藍四水䘳環百畝圭尊臥龍北拱吐戒珠而呈祥文雉南翔投寶林以獻瑞茲當久廢而復建須仗大人之宏規幸霛錫飛出天台快慈航俯臨越水從此烹煉凡聖洗陽焰之青黃號令人天加蜃樓以梁棟倚天慧劒野狐莫吹毛匝地紅輪陰霾立消見睍電灮中主賓互換龍象未免迷津鋒刃上照用同施佛祖亦須乞命元寵等碑慚白字道愧青松敢分香芋之齋冀醒牡丹之夢真儀有象呼來壁上高僧法句驚人喚出瓶中鵝子則麈尾揮魯陽之戟明返崦嵫而師音㖃奮地之雷春回沙界矣順治六年十月十五日越州魯元寵等疏道場山開堂疏伏以虎窟山深歲久腥風猶觸鼻龍池澤遠春三雷雨恰當頭剷腐爛葛藤鐘抂縣而扣隨大小提斬新正令眉挂劒而血濺梵天山霛攝戒皈心祖席整開生面恭惟山翁大和尚猊座下嶺南佛種濟北宗風脫樊籠謝八股六經丈夫事匪將相能為趨上乘度四生九類老婆心為含生徹困授法印於密雲之室人驚師㖃攃珍珠於布水之臺戶頌迦音固已合霛蠢以能仁遍遐邇而廣潤何止金水流其異味涼風襲於摩提而已哉眷茲南麓實古道場天荒石破於唐年薪𥁞火傳於歷代星移物換鼓寂鐘沈翠微嵒石空遺聽法之蹤瑤席清波猶記坐禪之景今則地萌芝草天命羚羊兆大法之中興佇真人之至止烷等暖姝末學款啓凡夫情逐境而成緣徘徊火宅事與理而俱障逼仄迷方雖窺天之管間依稀灮景之中肰坎井之終望洋涯涘之外詎曲士不可語於道在先生將善移我情伏願江海無擇細流樓閣頓還舊觀千年暗室生一炬之紅一夜春風香散千林之錦彩雲景裏休將羅扇頻遮多子塔歬再見金襴圍繞布髮掩泥慶際優曇之瑞揚眉瞚目快吞栗𣗥之蓬異口同音引領合掌謹啓順治八年二月草一日吳興費景烷等疏天童弘覺忞禪師語録目録序三詔書敕書贊開堂疏四第一卷住明州太白山天童禪寺語録第二卷住明州太白山天童禪寺語録第三卷住明州太白山天童禪寺語録第四卷住慈溪五磊山霛峰禪寺語録住越州雲門寺語録第五卷住台州廣潤禪寺語録第六卷住台州廣潤禪寺語録第七卷住越州大能仁寺語録第八卷住湖州道場山護聖萬壽禪寺語録第九卷住青州大覺禪寺語録第十卷住青州大覺禪寺語録第十一卷再住明州天童山弘法禪寺語録第十二卷廣録法語第十三卷示衆垂代因事垂代第十四卷舉古垂代第十五卷對衆機緣第十六卷頌古第十七卷贊第十八卷偈第十九卷佛事小佛事第二十卷小佛事雜著御札
