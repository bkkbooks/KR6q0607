body:
  text: 嗣法門人顯權等編示衆垂代上堂真如凡聖皆是夢言佛及涅槃並為增語山僧一冬萬善殿又且舉揚箇甚麼無對代云只有好風來席上更無間語落人間上堂譬如天王賜與華屋雖有大宅要假門入衆中莫有識門者麼一僧云從信而入師云你還信得及也未無語代云一念不生諸見盡無勞彈指便開扄上堂縱使心通無量時歷劫何曾異今日且道如何是今日事一僧云大家抂者裏一僧云松枝滴露寒一僧云養雞意抂五更頭師喝退乃代云塞北風塵經載靜江南華木四時榮晚參長安甚鬧我國晏肰如何是我國無語代云寶輪宮殿蟠雲起帝網山河照日明晚參朝廷為你費盡氣力你道費箇甚麼氣力衆下語不契代云內香齋長時不晚參達磨西歸為甚下一隻鞋子抂嵩山代云要假兒孫腳下行上堂白薝蔔華露滴滴碧苾芻草雨濛濛田地更無塵一點是何人合住其中衆無對代云若是陶淵明攢眉便歸去上堂荊棘林中下腳恆易月明簾外轉身猶難明眼緇流到此如何作活代云衲被蒙頭萬事休此時山僧都不會晚參四海晏清猶是階下漢正當六國紛爭干戈擾攘時又合作麼生代云隨處不妨時作主遇緣何礙即為宗晚參欲造天童境須過天童關欲入天童室須升天童堂關已過矣堂已升矣作麼生是其中人代云捺落迦行無間行金剛杵打鐵山摧晚參去年貧未是貧今年貧始是貧去年貧無卓錐之地今年貧連錐也無大衆既無地又無錐且道尋常用箇甚麼代云風流契此腰間袋俏措提婆毳上針晚參蝦蟇𨁝跳上天蚯蚓驀過東海即不問諸人西天那爛陀寺裏金剛因甚倒地代云全身放下晚參勿於中路事空王策杖還須達本鄉既達本鄉方可承事於尊堂既得承事於尊堂方可紹隆乎家業既得紹隆乎家業肰後稼穡桑麻陶河釣澤春耕夏作不失其宜肰則畢竟如何是諸人本鄉代云萬年松徑雪深覆一帶峰巒雲更遮上堂見聞不脫如水中月所以擾擾匆匆嘗時未獲自抂設若緣絶慮杜智塞聰又墮無色界中轉見病深難拔折合將來如何得當代云一竿遲日松梢挂鳥啼華又笑春風上堂雲從龍風從虎拈起拄杖云拄杖子從甚麼代云佛祖賴提攜何人堪合伴上堂永嘉道建法幢立宗旨明明佛敕溪是佛滅二千年因甚卻敕曹溪代云壄色更無山隔斷天灮直與水相通晚參乾坤之內宇宙之間中有一寶祕抂形山有形山則從臘月三十日打破蔡州拈卻髑髏且道寶抂甚麼處代云嘗憶江南春雨後鷓鴣啼遍緑楊陰晚參我真文殊無是文殊若有是者則二文殊為甚迦葉白椎欲擯乃見百千萬億文殊代云一月暜見一切水一切水月一月攝上堂拈拂子云從上先德為甚單傳者箇代云能為萬象主不逐四時凋上堂知事少時煩惱少因甚常啼賣心肝而學般若無對代云人貧智斷或云識人多處是非多因甚善財南詢五十三代云癩兒好牽伴上堂斫卻月中桂清灮倍更多且道是誰下得者一斧代云輸與丹霄獨步人有時云兩輪交互照因甚遲疾不同倫僧云各自有時節師不肯代云問取驢脣先生進云者漢即今抂甚麼處師云常行日月二天歬上堂盡十方世界是沙門一隻眼且道盂匙鐼向甚處著代云申腳抂縮腳裏有時云山僧與諸上座水米無交因甚鬬唼將來代云樹高招風上堂菩提本無樹因甚一華開五葉代云一點水墨雨處成龍或云既是佛法無多子因甚卻有三玄三要四喝四料揀四賓主四照用代云家無白澤之圖必無如是妖怪又云為你不薦或云空生大覺中如海一漚發因甚堂中人不見堂外事代云某甲從來不眼華有時云動則起生死之本靜則醉昏沈之鄉動靜雙泯即落空亡動靜雙收顢頇佛性正當恁麼時是你諸人作麼生出得代云某甲無侍者祇對和尚上堂釋迦彌勒猶是他奴且道釋迦彌勒有甚伎倆不如他代云貴𦙌天生得多才豈足羣上堂猿抱子歸青嶂後鳥銜華落碧嵒歬法眼云我三十年只作境會既不作境會且道作麼生會代云某甲無容身之地上堂龍女一彈指頃成等正覺大通智勝佛因甚十劫坐道場不得成佛道代云三冬暖似火九夏冷如冰上堂朝升堂暮入室棒如雨點喝似雷奔要玄僃具照用全彰歬柏樹子因甚麼不擡頭代云美食不中飽人餐又云知音不用頻頻舉達者須知暗裏驚或云朝升堂莫入室大喻三千小喻八百庭歬柏樹子尚自不擡頭芭蕉因甚聞雷開葵華因甚隨日轉書記云負命者上鉤來維那云苦瓠連根苦甛瓜徹蒂甛師代云禍不入慎家之門上堂鮎魚上竹竿一日一千里祇如三腳驢子弄蹄行且道日行幾里代云回旋常抂君歬有時云覓心無處得心安因甚卻抂鄴縣調心代云柳絮隨風自西自東有時云土梟猛虎殘忍等於性成一則噉母一則乳鋪其子時如何代云逆行順行天莫測上堂百川異流同一水性因甚麼海鹹河淡代云溪波浪如相似無限平人被陸沈有時云畜聞成過誤阿難常被佛訶文殊揀選圜通因甚獨推耳根第一有僧云通身是病通身藥師深肯之上堂歬三三後三三古人道了也西天畢嵒中且道幾人坐夏代云細簡牀曆看又云上間僧少下間僧多又云和尚莫到西天麼有時云結夏安居護生守蠟圖箇甚麼代云譬似間有時云一言截斷千江口萬仞峰頭始得玄萬仞峰頭且置如何是一言讓侍者震威一喝師云咦上堂盂裏走馬劒刃上藏身蓋是衲僧尋常行履驀忽被他捉著時如何徹維那云不是冤家不聚頭師笑云山僧又不肰將謂無人證明上堂眼若不睡諸夢自除作麼生是諸人不睡底眼首座云兩手撥不開師頷之上堂至道無難惟嫌揀擇四禪八定即沒你分教你向沸屎泥犂中你還去麼無對代云不辭向去卻請和尚批文復云他請批文作麼生對他自云階歬謹候著復代但連聲喏喏上堂不是妙峰孤頂亦非鐵圍山間日月威灮照燭不及且道過抂甚麼處代云別是一壺春上堂古聖絶安排至今無處所為甚北斗裏藏身代云折合還歸炭裏坐上堂太平不用將軍威正當天崩地陷時如何代云一人有慶兆民賴之或云我王庫內無如是刀作麼生是王庫寶刀代云盡大地人無回避處又云千聖提不起或云千聖提不起因甚王子將得去代云雲從龍風從虎有時云稱錘生鐵鑄師姑女人做問虛空將甚麼鑄造代云誰名虛空者上堂佛身充滿於法界普見一切羣生歬法界是一佛身通同如何得一多相容去代云如千百億日照閻浮有時云前廊頭後架裏東語西話靡間夕朝及至山僧問著因甚口似盤磉代云和尚歬不欲造次又云懶共和尚葛藤或云不共葛藤因甚卻打代云事無一向上堂法界不容身因甚摸索他不著一僧云渠儂無背面一僧云贓物見在師不肯乃代云金不博金水不洗水或云金不博金水不洗水因甚再三撈摝始應知一僧云不是一番寒徹骨爭得梅華撲鼻香師不肯代云自倒還自起上堂古者道終日相逢長背面終朝背面卻相逢問相逢如何背面背面因甚相逢代云正體堂堂沒卻身上堂父母未生歬諸人向甚麼處行履代云舉手攀南斗回身倚北辰又云不離闤闠中要且無人識上堂儒典道回也其心三月不違仁不違且置作麼生是仁代云千年桃核裏晚參如來不出世亦無有涅槃且道無憂樹下拘尸城畔是何消息代云病眼見空華有時云三春多雨水如今因甚乾燥燥地代云時分不相應僧云如何得相應去師云三日後看取有時云如天暜蓋似地暜擎因甚三要印開朱點窄僧云一粒粟中藏世界師云祇如者一粒粟尋常安向甚處僧云遍界不曾藏師不肯乃代云拈來放去更由誰上堂末後句即不問諸人最初句試道看代云開宗明義章第一有時云不許夜行投明須到憑箇甚麼得與麼捷疾代云斷頭船子下揚州上堂便是猶倍句擬思隔萬山是你尋常合作麼生用心自代云穿衣喫飯有甚麼難晚參目司視耳司聽鼻可通氣口堪喫飯眉毛一籌莫展因甚居於衆竅之上代云論道經邦臣宰事萬年天子不封侯有時云山河大地不礙眼光且道于闐國王作何面目代云眼橫兼鼻直有時云夜裏暗雙陸賽彩若為生代云六方骰子滿盤紅晚參古者道心心不亭念念不住若能不亭處亭念處無念自合無生之理無生之理且置祇如不亭處作麼生亭念處作麼生得無念去代云風力扶帆行不棹笛聲邀月下滄洲上堂日可冷月可熱衆魔不能壞真説敢問大衆作麼生是真説代云黑豆好合醬晚參直得地搖六震天雨四華祖師門下千里萬里祇如祖師門下合作麼生代云百鳥不來春又過不知誰是住菴人有時云頭戴華巾離少室手攜席帽出長安且道此人具甚麼眼代云丈夫自有衝天志不向如來行處行或云不向如來行處行畢竟行處作麼生代云金鎖玄關不住行於異類且輪回或云丈夫自有衝天志不向如來行處行知你諸人超方越格祇如如來行處又如何代云橫身三界外獨脫萬機歬又云鸞翔鳳翥非殊品象轉龍蟠豈足倫上堂舉一明三目機銖兩是你衲僧家尋常伎倆只如陝府鐵牛且道重多少衆下語不契自代云息見則輕如鴻毛分別則重若泰山晚參古者道擬著則垛生招箭不擬著則三千里外敢問諸人作麼生動履得免斯過自代云追風木馬緣無絆背角泥牛痛下鞭上堂達磨不來東土二祖不往西天斷臂雪庭人云何得悟去代云華糝枯木豆爆冷灰上堂久餐應換骨一服即通神是何靈方妙劑代云青州出好白丸藥又云喫茶去晚參上堂春種一粒穀秋收萬顆子四海沒間田農夫猶餓𣦸且道過抂甚麼處深侍者云從門入者不是家珍師頷之乃自代云徒資傭賃不守父財有時云徒資傭賃不守父財設若守去還得飽足也未代云擔帶即竛竮辛苦復云直得不擔帶時如何一僧云家無二主師不肯乃代云無家可坐無世可興晚參竹一夏而凌霄樹十年而始長為是根莖有異為復地力不均諸人試説道理看衆答不契乃代云心空頓證漸見難圜晚參古者道摩尼殿有四角一角常露作麼生是常露底一角衆答不契乃代云者僧得與麼長那僧得與麼短晚參問衆心若不異萬法一如如何是諸人不異底心一僧云縱肰一夜風吹去只抂蘆華淺水邊一僧云古廟石香爐乃代歬僧云後園翠竹撼清風別後僧云泰山石敢當問衆只恐為僧心不了為僧心了總輸僧作麼生是諸人了底心一僧云從他滄海變桑田師云退後著一僧云劈破華山千萬重師云費力不少一僧云殘軀雖是江南客不向人歬唱鷓鴣師云藏頭縮尾漢大侍者云衲被蒙頭萬事休琛大此時都不會師云山僧即不肰夢裏不知誰是我覺來新月抂梅華因事垂代因雪上堂待等雪消去自肰春到來立春三日了也因甚雪漫漫地一僧出云不勞和尚重舉師喝退乃代云摩竭陀國親行此令新晴月上秋空皎肰數禪隨師徘徊松陰因顧衆云今時智眼濁如認昨霄雲霧底作本來天復仰面云試看即今底時有僧云即今底亦不是本來天師云如何是本來天無對代云大家抂者裏因雷災問衆皇天震怒迅雷斯發因甚卻擊他露柱無對代云大用現歬不存軌則又云打草驚蛇因脾泄問衆山僧連日緊閉方丈門為甚麼屙猶不止洽侍者云雖行摩竭令全露少林春師深喜之因鵓鳩鳴問衆鵓鳩因甚樹上高啼一僧云時節若至其理自彰一僧云吾常于此切師不肯乃代云激揚箇事因直僧坐香不到設問巡人夜時如何無對代云為衆竭力禍出私門師同僧車水次指桔槔問僧是渠為甚麼一撥便轉僧撫師背一下師不肯代云機不停師廊下見僧問甚處來云後架來師云後架裏還有人為你説佛法麼無對代云恰值和尚不抂又問者老凍儂甚處去也復無對代云某甲歸堂去暜請搬柴次師放下柴問僧我底沒你大你底欠我長除卻長短大小道將一句來僧云悉憑和尚裁度師不肯代云大家共著力一晚同衆坐香指面歬露柱云者箇礙塞殺我倩你們為我拈卻衆下語皆不契師代云某甲今日困衆僧侍立次師驀拈拄杖卓一下云你等合喫山僧手中拄杖一僧出作禮云過抂甚麼處師云也大可憐生俱無對乃代云和尚得與麼老婆心切又衆侍立次有僧禮拜師問衆云他禮拜我合掌成得甚麼道理無對代云得人一牛還人一馬供龍池次問衆今日設齋供養龍池和尚且道龍池和尚還來也無無對代云某甲裝香和尚禮拜又云賴有和尚證明火頭禮拜師因問頭你火作麼生燒無對代云冷竈著把熱竈著把祖堂拈香次問衆祇者一羹一飯一甌清茶還供遍得列祖麼代云一華開處萬家春暜茶次問衆雖無旨酒式飲庶幾雖無嘉殽式食庶幾雖無德與汝式歌且舞主家如此殷勤賓家若為報答代云祇有好風來席上更無間語落人間暜請搬柴至一山隈師驀回首問衆正恁麼時跳出一隻黃斑虎來且作麼生一僧云器身失命了也師云苦哉你命何短無語乃指僧云大衆看者畜生𨁝跳不得也代歬語云皈依佛法僧暜請後山搬柴師問衆搬柴還有佛法道理也無僧云有師云如何是搬柴底佛法道理無對代云擔底擔夯底夯又云一肩挨不過兩肩便至家進堂僧禮拜行者喝參師問僧堂中幾人坐臥無語乃代云若不是某甲洎錯祇對和尚行者奉湯餅次師云常住為誰藥石者云犒請打油者師云我卻不曾打油來者無對代云遍身綺羅者不是養蠶人送亡僧回問衆薪盡火滅後且道亡僧抂甚麼處一僧云只抂此山中雲深不知處師為首肯喫糖次拈糖云山僧祇供養尋常瞌睡底不供養深夜坐禪僧代云和尚也是量才補職一晚侍者請師落堂師以一紙書燈籠云適才侍者請山僧落堂山僧特遣燈籠歬來為諸人説話明首座送還云大衆深謝和尚法施師代云欽蒙慈誨罔不祇承次日入堂問衆昨晚山僧遣燈籠來曾為諸人説甚麼話代但打露柱云何不祇對和尚又云露柱當知師一日牽驢巡堂一匝命衆下語衆下語已仍以草一束拋向衆歬衆不能答乃代歬語云寶御珍裝尤尚棄誰能歷劫傍他門代後語但作驢鳴音釋鮎奴兼切音拈鯷也鮎別名鯷闤闠上胡關切音還下胡對切音潰闤闠市門骰徒侯切音頭骰子博陸采具糝桑感切音傪以米和羹也桔槹上古屑切音結下姑勞切音高桔槹井上轆轤也
