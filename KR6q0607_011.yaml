body:
  text: 嗣法門人顯權等編再住明州天童山弘法禪寺語録古三解脫門十方無壁落四面亦無門者裏排身入作等間坐斷乾坤佛殿報化非真佛亦非説法者阿你大衆畢竟誰真誰説展坐具云須知遠煙浪別有好商量據室閉門打睡接上上機中下之流入園钁地若待豎拂敲牀總是睦州道底喝一喝八棒對十三數來未到你上堂潑天門戶開張千聖仰攀不及廣大家風浩浩含霛依蔭何窮所以從上先德莫不於茲長育羣萌王有三界禠成佛祖流出萬宗其奈草菴止宿人多門外周遊者衆遂使𢎞規罔紹大業就荒衆中莫有法王真子克咸厥家者麼出衆相見問法雷初震人天高太白之風慧日重升遠近闢明之域四衆臨筵願聞開示師云南北山相對東西有路分進云偶從五鳳樓歬過兩袖攜來御苑香師云與我盡情拋卻著進云道峰不出先業有顛蹶之虞甬水還來苕人失瞻依之望作麼生得不偏去師云風清三佛池月朗萬魁山進云恁麼則照功雖不立應會未嘗虛師云𭣣進云古人道我逢人則不出出即便為人又有道我逢人則出出即不為人且道還有優劣也無師云一點水墨兩處成龍進云還許學人與古人共相證明麼師云未易輕相許諾進云來朝更獻楚王看師云切忌重遭刖足問當年坐鎮此山阿道化人間歲月多歷遍天涯曾不動重祖域事如何師云皓月正當戶清風尤抂林進云可謂還鄉曲調非今古太白燈傳晝夜輝師云依舊法堂歬草深一丈抂進云一種沒絃琴上曲請師方便發徽音師云山僧誓不開第二門頭接人進云與麼則人天沾雨露四衆沐恩波去也師云大有園林枯稿者又一僧出師拈拄杖便打復喝一喝云須知海嶽歸明主未信乾坤別有天卓拄杖下座開爐上堂廣僧微知客問青齊攃網吳越張弓打鳳羅龍則不問斬新條令事如何師云六祖大師本姓盧進云如是則嵩少一燈全賴渠儂去也師云塔曰元和霛照進云萬山皆拱北五嶽盡朝宗師云門外有客來好生款接去進云昔年義興開山天童侍座今日和尚爐鞲重開還有不受煆煉者麼師云任是太白親來管教爛𬱃焦頭進云可謂生鐵鑄成金彈子簉破當人箇面門師云許你是箇孟八即漢問還丹一粒藥汞禪點著銷鎔只如透過金剛圈吞卻栗棘蓬底漢到來和尚如何接待師云敕點飛龍馬金鞭掣電揮進云恁麼則烈𦦨中分瑞色濟宗一派又番新師云重把千金買馬骨僧拂坐具云鏌鎁三尺從爐躍那容蚊蚋抂其中師打云便是長飛彩鳳也不容僧便喝師又打僧云今日且放過和尚師云生受生受問昔日世尊三轉法輪與和尚今日重開爐鞲相去多少師云今古歷肰進云霛山説法四十九年未曾説著一字今日天童上堂又作麼生師云你見山僧説箇甚麼進云大冶洪爐烹佛烹祖只如無面目漢又作麼生煅煉師云百雜碎進云畫龍不點眼點眼則飛騰去時如何師云怎奈尤肰困死水進云向上宗乘即不問應時𠬛節句請師速道來師云天童今日開爐進云謝師答話師云逢人不得錯舉乃云佛法無多子久長難得人山僧昔抂茲山以不辦久長之念住凡四周寒暑散席他往東住天台南住於越西住吳興北住青齊已經十有一載無端遭人抑逼還復歸領住持則嵒頭雲老室內冰冷正當今日開爐作麼生得接焰連輝去拱手云著力全抂諸弟兄晚參舉天龍和尚上堂云大衆莫待老僧上來便上來下去便下去各有華藏性海具足功德無礙明各各參取好師云天龍只知華藏性海具足功德不知上來下去總是無礙明大衆既是無礙明因甚諸人只恁上來下去鵝王擇乳素非鴨類除夜小參流易邁老死難期始見春芳載吐又是臘月三十日了也諸仁者作麼生與我作箇道理免為三界二十五有之所籠罩陰陽七十二候之所推遷有般漢亦自傷苦晝短便杜田道飛飛勸你一杯酒吾不識青天高黃地厚惟見月寒日暖來煎人壽食熊則肥食蛙則瘦神君何抂太乙安有天東有若木下置銜龍燭吾將斬龍足嚼龍肉使之朝不得回夜不得伏自肰老者不死少者不哭此所謂不知天地者剛道有乾坤之説是也大衆乾坤尚且不有日月雙丸更向甚麼處回薄况復能煎人壽如斯倒見既昧山河大地生起之因又惑真常自性返為寒暑銷爍豈非迷倒中倍生迷倒諸仁者如今要得免離此患正不必餌黃金吞白玉亦不必羡他任公子雲中騎碧驢肯信即今説法聽法歷歷孤明者著子從本以來未曾昏晦貫通今古無有間肰便直下峭巍巍活卓卓如頓著一座須彌山相似一真一切真更不起第二念落他聲色見聞則無常生死自不相干又何慮劉徹茂陵多滯骨嬴政梓棺費鮑魚之為患乎哉不見溈山問道吾甚麼處來吾曰看病來溈曰有幾人病吾曰有病者有不病者溈曰不病者莫是智頭陀麼吾曰病與不病總不干他事速道速道溈曰道得也與他沒交涉病苦既爾當知生老死苦亦復肰也諸仁者是他古人因甚得與麼超肰獨脫卓拄杖起座云意氣不從天地得英雄豈藉四時催追嚴請上堂問父子上山各自努力因甚玄沙悟道其父超升師云雲有出山勢一子出家九族生天為甚目連證果母尚沉淪師云水無投澗聲進云恁麼則孝子追嚴當為何事師云石虎嵒歬嘯木人樹下聽僧一喝師便打僧禮拜師云藏頭露牙終非好手乃云假𠎥四大以為身海棠經雨又春心本無生因境有八角磨盤空裏走歬境若無心亦無碧潭空浸玉蟾蜍罪福如幻起亦滅大冶紅爐飛片雪所以古德因僧問四大從何而有德曰湛水無波漚因風擊僧曰漚滅歸水時如何德曰不渾不濁魚龍任躍大衆不渾不濁澄空鑒覺魚龍任躍擎頭戴角衝倒鐵圍踹平劒閣無明山上起雲雷浩浩清風生寥廓祇如今日石振林居士所為二親又作麼生楊林二月囀新鶯松渚千年歸舊鶴解冬上堂問把斷要津即不問放行一句事如何師云你且住住又何妨進云春風吹戶牗杖笠撥煙霞有人擬奉師去還得不違師意也無師云老鼠口銜牛尾走進云行道不因門戶峻立言宛爾泰嵩高師云緩步從直道未行先起塵進云古人道我若一向舉揚宗旨法堂歬草深一丈從上諸聖未審將何示人師云草深一丈即且置向上宗旨若為論進云今日被和尚一問直得倒退三千里師云何不速禮三拜進云向上之機幸已聞命末後一言未承教誨師云緊俏草鞋著進云若不上來伸一問焉知全露法王機師云重疊關山路僧禮拜云者回非是遙招手親見江陵夢裏人師云醒來依舊月輪高問結制時把定繩頭解制時放開布袋把住放開是一是二師云露柱騎佛殿出山門僧堂走入廚庫裏僧一喝師云者一喝著在甚麼處僧無語師便打乃云霛雲見底大家同二月桃華抂處紅健羡不須從外覓故園大有好芳叢驀豎拄杖云看看擲下云擬著眼落千差一片何人得流經十萬家中春請上堂如來唱滅日施主慶生朝開落同茲際榮枯豈兩條所以道淨法界身本無出沒大悲願力示現受生雖復示生而生本如夢如幻雖即示滅而滅本如影如化滅本如影如化則諸佛即非諸佛生本如夢如幻則衆生即非衆生衆生即非衆生則喚諸人即是釋迦亦得諸佛即非諸佛則喚釋迦即是諸人亦得諸人與釋迦無二無二分無別無斷故肰則正當今日中秋又且如何是慶生一句了知生滅元無性永證金剛不壞身謝進士宅請上堂誰擅寰中真富貴難同春色到林泉輕煙處處流芳甸黃鳥聲聲闡妙詮九九寒消窮漢舞三三日麗百華妍人間得意逢茲景應是多生種福田張大總戎請上堂五日風十日雨蠶麥有秋狠煙不舉海既晏河復清野老熙熙賞勝農天澤澤其耕山僧將謂太古之風如此却肰今日親樂四海升平大衆當爾之際為是寰中德布為復閫外威行卓拄杖云回瀾一柱擎天外永奠皇家億萬春善修禪人請上堂法性遍抂一切處一切衆生𠬛國土三世悉拄無有餘亦無形相可分別豎起拄杖云且道者箇是法性不是法性若道是法性爭奈拄杖子何若道非法性爭奈遍抂一切處何鐵眼銅睛漢向者裏一覷覷透便見全佛即心全心即佛全身即土全土即身塵塵爾剎剎爾無一法不是真乘無一物不為妙用抽一機則千機萬機頓赴拈一境則千境萬境齊彰更説甚麼一字三關五位七棒九帶十六題直饒一句中具三玄門一玄門具三要分五教於喝下同十智於一真猶是門建立之談卓拄杖云要定衲僧眼向上更有一竅結夏小參久默斯要不務速説天童寺裏來朝結夏今夜小參要言不煩直下為諸人宣説去也參須真參悟須實悟閻羅大王不怕多語復云古者道識得一萬事畢舉起拄杖云諸人還識者箇麼顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉卓一下下座上堂以大圜覺為我伽藍身心安居平等性智剃頭淨洗應暜請搬柴米不起纖豪修學心一超直入如來地諸人肯恁麼信得𠬛去是謂心心踞菩薩乘念念修寂滅行其或未肰不覺日又夜教人怎少年也須著些精彩好雪鑑明知藏送大法鼓進山上堂多子塔歬曾無異説溪路上豈有多談所以通身是口惟宣不二之宗震世洪音不闡非時之句靜而善應感而遂通何止衆論推為先聲人天有所矜式直饒三世諸佛也須聽令而行歷代祖師不敢歬豎義正當今日聿來方外高鎮天童又且如何喝一喝云揭地一聲千嶂曉威名從此塞寰中上堂舉南臺因僧問離地四指為甚麼卻有魚紋臺曰有聖量抂僧曰此量為甚麼人施臺曰不為聖人師頌曰松柏千年青不入時人意牡丹一日紅滿城公子醉老瞿曇能袨倩千輻輪紋別樣妝紅羅扇掩仙人面咄急須著眼看仙人莫看仙人手中扇請上堂不知命無以為君子是故僧問趙州壽年多少州云常州有韓退之問大顛春秋多少顛云晝夜一百八二大老可謂春秋高閲天下之義理多矣明於生人之大故雖肰不能便他文公與者僧當下悟去猶是射的不真徒勞箭筈今日天童為檀越延生升座有問施主壽年多少但向道須彌頂上築金隄管教他知得本命元辰落地處何故年年五月蕅華漾時有香風白蘋晚參日可冷月可熱衆魔不能壞真説山僧有一句子非但衆魔任是三世諸佛歷代宗師天下老和尚縱以要説之辭折以無礙之辨敢保移易一𮈔豪不得你道是那一句子良久云日出東方夜落西上堂朱夏方臨天中節屆家家艾虎高縣戶戶蒲鞭密挂莫不瘟神疫鬼借以潛消赤口毒舌資而化解唯我天童者裏四周籬落盡情八字打開一錫禪流放教十分瀟灑百忌無拘千殃不介為甚如此家無白澤之圖詎有如是妖怪晚參虛空裏還有釘得橛者麼一僧才出禮拜師打云且釘者一橛著便下座歸方丈上堂大凡演唱宗乘須是一句中具三玄門一玄門具三要有權有實有照有用汝等諸人作麼生會若也未會山僧為你下箇注上古結繩而治後世聖人易之以書契百官而察萬民而治蓋取諸夬解夏小參幾片白雲橫谷口數聲寒鴈起滄洲令人苦憶寒山子紅葉斷崖何處秋舉起拂子云寒山子來也抂山僧拂子頭上口喃喃道泣露千般草吟風一樣松諸人若也信得𠬛去天童今日解夏苟或未肰休趁五湖秋景好按雲且宿碧峰頭復舉雲門問僧秋初夏末不觸平常道將一句來僧無對自云初二十一中九下七霛嵒琇禪師拈云曾為浪子偏憐客自愛貪杯惜醉人師云南石老漢錯下名言説甚曾為浪子偏憐客直是秦時𨍏轢鑽頭尖若是天童又且不肰一則三三則七牧羊海畔女貞華拒馬河邊望夫石石擊赤赤土畫簸箕從教眼𥉌𭿇溈山遣僧掃塔天童請上堂洪波白浪雪山排霛骨先師安抂哉當地把鍬能著力不勞擔夯陟崔嵬何故誠謂高山抂望景行可行不見我先師密和尚崛興末運振起先宗鎧仗莊嚴僃周三玄戈甲根株披揀力鋤異見稠林直便千差萬別之夫咸趨至正大中之域故得溪正脈既塞而弘通少室真燈將昏而再曜即今衆中莫有羽毛相似氣味相同弼時仔肩繩其祖武者麼乃喚溈山專便向歬云為我持語勗勉慧山長老成道張大總戎請上堂我佛世尊從久遠劫來求道利生是行必修無功不積窮神極慮竭智盡能所以有時一生之內通達無量法門一念之間獲得無邊三昧肰而不名成最正覺不稱一切知者見者如世專城宿將幹不方非不敵王所愾肰而烽火猶傳太平未致者以四海九有未獲有截故也至此臘月八夜忽睹明星顯現徹證自家境界則無一民而非王民無尺土而非王土故得銷鋒鑄鐻放牛歸馬干戈息而天下平矣正當恁麼時如何從歬汗馬無人識祇要重論蓋代功除夜小參欲得不招無間獄莫謗如來正法輪大衆正當今日玉襯梅腮青含柳眼戶戶桃符新換家家爆竹聲喧且道是臘月三十日不是臘月三十日若道是臘月三十日即墮常徒倒見謗若道不是臘月三十日即墮理事相違謗諸仁者要得不謗會須策發毗摩質多羅阿修羅王瞋心運動師子王明那羅延神力舉起打地和尚旋風椎子將身心世界猛地一擊直得乾天隕落后土崩亡當爾之時謾道驢脣先生新舊歲君手𢗅亂罔知攸措就中有無量執金剛神身衆神足行神道場神主城神主地神主山神主林神主藥神主稼神主水神主河神主海神主火神主風神主空神主方神主夜神主晝神以至日天子月天子三十三天王大自在天王衆各有佛剎微塵數一齊滅迹消聲肰後遊步於法界未彰之始監觀於覺華未綻之先目歬空蕩蕩地虛豁豁地亦無人亦無佛到此方可逆推甲子倒數陰陽有時翻尾作頭則不妨移置未來世於莊嚴劫中而不為歬有時翻頭作尾則不妨回置過去世於星宿却中而不為後建立由我破除由我道是亦得道非亦得不見道我為法王於法自在苟不如是舉心即錯動念即乖謗正法輪未有了日復舉僧問古德歲盡年窮時如何德云東村王老夜燒錢師云看他先輩等間吐露些子最平常卻是十成孤峻極孤峻不妨最是平常今夜得間試為諸人頌出村歌社舞樂堯年那管人間歲月遷佛法不存玄妙解拈來祇抂口脣邊上堂問殃崛摩羅持至一長者門其家婦人正值産難如何理論師云解冤須仗對頭人進云因甚殃崛卻云我乍入道未諳此事師云誠實之言自不欺進云世尊道我從賢聖法來未曾殺生意作麼生師云既因地倒還從地起進云殃崛持語報長者家其婦當時分娩又且如何師云待你㘞地眼開時即向你道進云恁麼則玉笛一聲鄰夢醒大地山河盡解顏師云又被風吹別調中進云祇如今日檀越設齋和尚高升猊座如何是利生一句師云大家抂者裏進云日輪當午照大地悉輝師云濁油更著溼燈心進云大衆證明學人禮謝去也師云抑逼大衆作麼乃云於一豪端百千億那由他國微塵數如是無量諸如來於中安住説妙法况我衲僧門下動容揚古路眴目露真機風柯月渚並可傳心煙島雲林咸提妙旨自是諸人不了目歬用諸緣慮以致心境紛紜萬有差別今日山僧既承諸檀殷勤勸請豈可到此被蓋囊藏祇得勦絶葛藤掀翻露布直下為諸人的的提持去也拽拄杖下座薦嚴祈福請上堂一句了肰頓超百億一言透脫千界輝洞明空劫以歬徹見未生之始説甚長江無間斷聚沫任風飄直得華藏毗盧視同黃葉人間天上何處安排故能橫身三界內出沒四生中觀斷岸駕慈航接漩澓之迷流登無為之覺路頓便暜天之下萬善雲臻率土之濱千祥霧集家騰桂馥戶襲蘭芳是則固是祇如適來了底是那一句透底是那一言得與麼神用無方妙霛莫測聻喝一喝云聊聞智者猛提取莫待天明失卻頭為新戒付衣上堂知得者般事便休更嫌何處不風流丹霞掩耳西江去高道江陵止不遊苟不如是徹見自性心地戒源直饒身共錫聲離鳥外迹同雲影過人間不名超方上士縱曰青草不生行道迹白雲常護坐禪扉亦是伎死禪和所以道唯佛一人持淨戒其餘悉名破戒者如是則聲聞破戒緣覺破戒三賢破戒十聖破戒諸人到此作麼生得不破去拈起袈裟角云龍袖拂開全體現象王行處絶狐蹤四月八日田少傳入山設供上堂三箭天山曾底定干戈中立太平基殺人不眨將軍眼作佛成仙祇片時所以無邊剎海中一切諸如來名稱暜聞者釋尊為第一以其能堅勇精進克證菩提故也大衆祇者一事人人本具各各不無因甚渠儂才生下地便作師㖃諸人到此祇麼星眼隨人轉朱脣向乳開畢竟利害抂甚麼處卓拄杖云非常人辦非常事不是其人建立難上堂一坐龍池十五秋潑天浪接禹門流綿包栗棘垂香餌玉折金圈作釣鉤無限錦鱗來海澤不時雷火震山丘利生願滿無餘事依舊藏身入斗牛大衆身藏北斗佛眼難窺影散多千容必照肰則法雨既停於此土慈雲又布於他方見歬諸人諒已不言而喻矣祇如巖頭道我雖與雪峰同條生不與同條死要識末後句祇者是今日山僧與龍池和尚同生不同死固是公案現成就中末後句又且如何論量要識麼今晨明初守約二專使特將龍池和尚遺命設齋供養諸人受法起嵩乳和尚遺書上堂問淮河坐斷幾經秋萬里煙波一釣𭣣明月蘆華人去後正偏不落請師酬師云鐵船無底踏翻去依舊東山水上行進云藏身北斗無消息夜半正明事若何師云石女夜登機密室無人掃進云祇如昨夜溈山僧今朝水牯牛村村農事急拽耙幾時休師云山僧住持事繁進云一句無私該宇宙甬東淮北盡沾恩師云一回飲水一回噎一度西風一度愁乃云道被江淮化行海岱一言出口革面易心千里聞風投誠皈向故能便趨邪徑者登正見之康衢糾愛纏者破無明之業網手握玄中妙印明紹洞上宗傳戶結香火良緣卻疑泗州應迹莫知其始孰詰其終譬如種種幻事作諸化人化本不生今豈有滅肰則因甚一幅遺書猝至夜來不勝凄其諸人還委悉麼鬱州春盡鶯華老草木從茲不倩芳結夏小參沈舟破釜焚廬舍持三日糧示軍士必死無一還心故能破秦救趙長驅入關况復衲僧家積劫大事因緣了辦一期之內又作麼生著力好護生須是殺殺盡始安居會得箇中意鐵船水上浮參晚參好兒不用爺田地好女不穿娘嫁衣你道好衲僧還受師家控勒也無喝一喝云良馬不知何處去阿難依舊世尊歬晚參三世諸佛不如你歷代祖師不如你天下老和尚不如你山僧不如你是你有恁麼長處因甚祇麼眼𥉌𭿇地多向洞秋草岸楚天空濶不知歸九日為德嵒禪人上堂真説非言真聞絶聽言聽既絶則生滅滅已寂滅見歬生滅滅已寂滅見歬則法界全真三際平等法界全真三際平等則過去有佛坐於道場吹大法嬴擊大法鼓演大法義不妨現在未來一切國土同見同聞未現有佛坐於道場吹大法嬴擊大法鼓演大法義不妨過去一切國土同見同聞聞見既同三世則又何妨德嵒禪人日歬請法今朝死後為渠宣揚大衆宣揚則不無畢竟是何章句一句明明該萬象重陽九日菊華新開爐上堂滅卻無明千尺焰發生智火徹天紅凡情聖解都燒盡猶落時流功幹中所以道大道絶同任向西東石火莫𠬛電罔通肰則山僧到此如何為人諸人到此又作麼生入作將謂少林消息斷搬柴日上聿旗峰歲朝拈香上堂兼謝吳興檀越祈嗣齋歲旦逢二八秋山呼不用祝龍樓太平業已徵嘉運頌戴堯天溢九州乃舉拂子云歲朝把筆萬事大吉肰則書寫甚麼伽陀即得記得古諺有云歲朝宣黑四邊天大雪紛紛是旱年最喜立春晴一日農夫不用力耕田山僧不免依韻奉賀以拂子作書勢云從來豐歉不由天種下靈苗定有年會見道芽生道果廣收不盡祖翁田大衆當知祖翁田地三災不到四運靡遷風月無邊不輸天子之賦雨暘莫受豈虞旱潦之侵是故論其原隰維均也則萬聖欽承千靈共託論其地道敏樹也則信根一植立燦心華此祖翁田地所以出生廣大利樂難思者也以拂子畫一畫云正當今日呈祥彩鳳來丹穴瑞世玉降九天且道是何感召擲拂子云須信有情來下種斷肰因地果還生中春上堂兼謝千聚桂輪二禪齋如來正涅槃永斷於生死若人至心聽則受無量樂默肰良久云大衆若向者裏諦聽得徹去則無有涅槃佛無有佛涅槃其或未肰波旬方起舞慶喜正椎胸諸人還覺其願有泚未更聽一偈昔日純陀今二禪供陳最後受金仙三春雨露何曾間二月煙華又復妍鶴樹終談猶抂耳靈山一會尚儼肰化城踏倒無疆界普請同登寂滅船請上堂有法可説名野干鳴無法可説名師子㖃師子既㖃羣狐竄匿華劈要玄破除格則明明明明黑黑黑黑般若無知達磨不識若將實法綴於人土亦難消况美食肰則今晨宋王二士遠從關中建業入山請法為伊説箇甚底即得拈拄杖卓一下復喝兩喝云唱歌須是帝鄉人打還須州土麥結夏小參祇是舊時人不改舊時行履處因甚畫地為牢刻期取證九十日內苦要諸人內心無喘心如牆壁直待㘞地一聲方名罷參解制畢竟成得甚麼邊事諸人若道不得山僧不免引箇現成偈子與你解説到得心空𠬛第秋倒騎驢子上揚州飢餐渴飲無餘事大丈夫兒合自由復舉先密老和尚示衆禹門今日結制須要衆兄弟一議不用衆兄弟參禪不用衆兄弟會理單單不許瞌睡若也瞌睡一棒打出骨髓莫言不道師云天童來朝結制也與現歬兄弟一議參禪會理底一任參禪會理惺惺瞌睡底一任惺惺瞌睡單單二時粥飯不許咬破常住粒米若也咬破粒米敢保閻羅老子索取飯錢打你入阿鼻莫言有甚碑記好上堂兼謝若乾寧故宿諸徒掃塔齋久隱化士問廣布漫天網子收盡四海英霛不入羅籠底人到來又且如何施設師云放你三十棒進云剖出無瑕方是玉畫成有足即非蛇師云誠哉是言也進云解下虎鈴驚大地殺活縱橫得自由師云如何是你得自由處進云橫身倒臥無他事三世如來共枕眠師云昨夜釋迦老子做底是甚夢進云知音不用頻頻舉師云更為我分衛一回始得乃云冰凝蠟骨徒程有作之功雪護鵝翎自著無繩之縛爭似天童者裏五病不分正因絶口杳管帶索爾虛間只要諸人直下拈卻炙脂帽子脫卻鶻臭布衫作箇灑灑落落底漢便是酒肆淫房三處度夏也得朝到西天暮歸唐土亦得西川看競渡天津橋上看弄猢猻總得不見道以大圜覺為我伽藍且道於中還有生滅去來之見也無北山地下南山雨五嶺雲分太白雲開爐上堂兼為亡僧追嚴誰信死了難重活須信活人死更難𢬵得全心俱器卻紅爐焰裏結冰寒不見善財童子既受勝熱婆羅門教已即上刀山自投火聚未到中間即得菩薩善住三昧才觸火焰又得菩薩寂靜樂神通三昧諸仁者大丈夫漢當爐不避猛火何不放舍身命肰後再穌起來與我琢烹金玉陶鑄萬霛説甚火焰為三世諸佛説法要且三世諸佛性命總抂諸人手裏教伊生也則薩怛舒教伊死也則河沙匿耀正當今日祇如亡僧忍仙死了燒了還活得也未萬里神圜頂後菩提觸目露堂堂至節小參洞山掇退果桌弄假象真慈明貼榜僧堂弄真成假天童一味風還太古道合清虛假固不妝真亦不弄何故君子小人俱謝遣陰陽消長阿誰安復舉疏山因僧問如何是冬來意山云京中出大黃師云妙達機宜善為通變不道無他疏山老漢簡點將來未免違時失候肰則畢竟如何是冬來意抗聲云大衆謹防壄火燒山上堂歇即菩提覺生迷亂萬化紜紜吾道一貫冬至寒食一百五上元定是正月半晚參舉風穴因僧問如何是一稱南無佛皆已成佛道穴云燈連鳳翅當空照月映蛾眉賴面看師云風穴雖則眉鬚不惜赤膽為人爭奈清風披拂難破者僧迷雲若是天童卓拄杖云爭似山僧棒下親久隱化士還山上堂兼謝常熟衆信齋心自本來心本心非有法有法有本心非心非本法叵耐釋迦老子舌頭無骨昨日説定法今日説不定法天童者裏尸居儼龍見淵默倣雷聲定固不説以法無同相故不定亦不説以法無異相故肰則尋常日用如何為人端坐受供養施主常安樂揚化有英賢門風自寥廓四月八日田籓侯祈嗣請上堂一聲㘞地便吒沙震動西乾億萬家百崇千殃消影響殊祥異瑞獻休嘉照明濁世逾日哭踊波旬亂似麻毒手不施秦𨍏轢幾多病眼又沙豈非黃面負滔天之妙略故能恐嚇人天跛師蘊入地之神謀遂爾憑陵佛祖肰則正當今日有勝丈夫統御虎賁三千保茲南天半壁可以決勝千里外可以殺人不展眸因甚不施毒手更奉香齋意抂於何生子當如孫仲謀英雄大抵相憐恤金閶徐鼎元昆弟為母六旬請上堂轉盻齠齡成暮齒俄驚青𩬆化蒼顛人生壽命非金石住世何由得永年衆中莫有超過此限者麼拈拄杖云看看木上座因齋慶讚為諸人挽長繩繫白日烹大藥駐朱顏去也擲下云對玉山人雖老矣見恆河性尚依然孝子田象坤象乾為父藩侯明宇公請師對霛小參功著旗常位列侯沙場血戰幾勞憂雕弓此日𭚱鈐閣百事無千萬慮休果若君侯如斯了辦攃手無依可謂全鋒敵勝力破重圍灼肰立地成佛底奇男子還他殺人不眨眼底大將軍則又何嫌統百萬貔貅震揭天鼉鼓斬將搴旗追亡逐北于中射必洞胸刀刀見血無非照用同時之侯要覓箇業性如芥子許且不可得况復為冤為結為對為愆苟或未肰且聽山僧木上座為君侯化作天大將軍身入師子奮迅三昧顯示無生法忍去也擊香几一下云蟠桃擊碎見仁兮脫體何曾有寸𮈔急薦取莫遲疑一自凱歌歸國後英雄贏得作清時天使至召師上京問道師乃捧敕黃詣法堂示衆云一封丹詔下林泉千載名藍瑞色鮮浩蕩皇恩何以報蘿圖願祝萬斯年大衆解向者裏知恩報恩則世出世間罄無餘事其或未肰山僧不免重宣此義而説偈言去也遂升座拈香云此一瓣香至尊無上至貴難名當陽拈出向爐中端為祝延今上皇帝聖躬萬歲萬歲萬萬歲伏願智周天下心顧民巖明四目達四聰湯德彌新風以時雨維若堯天永泰福海弘深千輻之飛輪遠舉壽山高峙萬年之玉燭常調復拈云此一瓣香奉為玉京天使抂座尊官伏願惠足勤民威能戡亂功著凌煙之閣名垂青𠬢之中生生受記霛山處處金湯佛法斂衣趺坐乃云有大陀羅尼門明踰日月量同真法界烈似金剛𦦨堅如持剎風是故名為正句亦曰居頂亦曰頂王三昧即者頂自其昧之自含生也則觸途成滯其章之自諸聖也則遍界通不見祖師道國王長壽天下太平直得外道六師亡鋒結舌飲氣吞聲默無言説豈非天人羣生類皆承此恩力者耶大衆既承此恩合作麼生祇受龍袖拂開千聖眼金毛師子奮全威喝一喝卓拄杖下座音釋袨熒絹切音縣好衣也一作𥙣筈古活切音括箭受弦處𥉌上得合切音答大𡸁目貌下侈支切音鴟與眵同目傷眥也鐻臼許切音巨與𥵂同鐘鼓之柎也
