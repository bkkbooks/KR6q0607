body:
  text: 嗣法門人顯權等編住台州府寧海縣廣潤禪寺語録山門五九四十五太陽來入戶風雲從萬物覩烈焰爐中彩鳳飛華針眼裏金鵬度佛殿不著佛求不著法求不著僧求用禮作麼木人夜織石女拋梭伽藍我提綱君挈目帝座當年尚感通護持何用山僧屬祖堂八萬四千非鳳毛三十三人入虎穴到山僧復何為據虎頭收虎尾據室開潑天門戶接四海玄徒未論騎虎豐干便是寒山拾得燒火底與他燒火掃地底與他掃地必若據令而行銀地菩薩金地佛方廣五百應真大士總是門外漢拶折腳脛有分在何故金烏吸盡天邊露玉兔敲殘海上霜小參僧問五磊峰頭獨觀霄漢雙梅溪上重整家風正當龍象交參扶豎綱宗一句請師垂示師云黃河清出聖人進云三頓烏藤黃檗要旨因甚臨濟入門用喝師云倒接無根樹進云一條紙燭信老真機因甚德山入門用棒師云橫挑海底燈進云祇如千棒打不著萬喝施不到底又如何分付師云砧基道者田厙奴兒進云不因今日問錯過目前機師云只今也不少僧喝師便打進云碧海濤聲千古振瑞雲山色萬年青師云間言語乃云去年始脫天童耙今日重牽廣潤犂分應業緣須報償敢辭帶水又拖泥大衆衲僧家羅籠不肯住呼喚不回頭孤迥迥尋常氣宇如王峭巍巍一等面皮似鐵因甚到此被人牽抴得上高落低不見道順是菩提復舉大慧杲初住徑山開堂於明慶寺下座次少卿馮公楫問曰和尚常言不作者蟲豸因甚今日敗闕慧曰盡大地是箇杲上座你作麼生見馮擬議慧便掌師云馮濟川可謂運斤有法其奈斫堊無功若是山僧盡大地是箇杲上座你作麼生見但云恁麼則世界總被和尚占卻待他動靜隨後便喝豈不增色寀僚正當今日有問山僧又對他甚麼即得雲綻家家月春來樹樹華施主請上堂舉龍牙云天下名山到因腳辛苦年深與襪著而今老大不能行手裏把柄破木杓東山演祖云白雲即不然腳也不能著草鞋手也不能把木杓端坐受供養施主常安樂師云慙愧山僧又復不然到遍名山天盡角無端老被住持縛院門倒塌應重修著卻草鞋仍把杓且道與麼時還有報答施主底道理也無滄海耕翻定有秋鐵餕餡煮黃金鑊皆然化士請上堂兼為檀越薦室道本無橫徑入者必從緣塵塵盡三昧法法總皆然普化常時搖鐸盤山一向行廛不離豬肉案頭能使泥牛通身換骨只在器車幕下頓令石女平地登仙推倒嘉州大象放出文殊普賢一亙晴空萬古千波兢涌嵒前落華莫謂難重上破鏡休驚不再圜獵獵風蒲朱夏節鴛鴦還睡緑池蓮宗僧統率諸山請上堂七金五嶽仰須彌以為宗萬𣲖千流趨溟渤而至止釋梵為諸天之所敬金輪尊八極以無傾祇如山河大地日月星辰四聖六凡三宗百氏之學又統承箇甚麼豎拂子云於此明得則機機頓赴何難捏聚浮幢輕擲大千於方外法法圜融不徒放開芥子間納華藏於孔中要且三世諸佛歷代祖師天下老和尚喝一喝云不消一喝瓦解冰消於此不明擲下云真人十八界元空三十一人同姓呂分散遊山各占山三十一人又同處城東法安霛峰諸山請上堂常啼賤賣心肝因般若以東請善財劬勞煙水為知識而南詢雖皆重法輕生其奈忘家失業殊不知光吞萬象人人有衣裏明珠貴踰娑婆各各韞懷中至寶千霛一致何用穿通萬古常如非從人得所以達磨不來東土曹溪白浪滔天二祖不往流沙少室清風匝地大衆祇如恁麼會即從畢竟列葉分燈是誰聯芳續𦦨良久云假饒千載聞名不如一回見面卓拄杖下座念孩曹居士請上堂問古寺建三門千載一人成事業敢問事業如何成師云天無私覆進云霛峰環勝地先朝後代濟蒼生畢竟蒼生如何濟師云地無私載進云拈卻成除卻濟還許學人直入也無師云你須知恩始得進云不登絶頂爭見天空師云可惜許進云過在甚麼處師云未知恩在進云作家宗師天然猶在師云莫亂搽糊乃云止止不須説我法妙難思釋迦老子太殺抑人揚己無以穢食置於寶器維摩大士未免屈己扶人簡點將來二俱不了何故不見道夫説法者當如法説法無有我離我垢故法無衆生離衆生垢故離衆生垢故故目前無闍𥠖離我垢故故座上無山僧座上無山僧故心行處滅目前無闍𥠖故言語道斷言語道斷故咳唾掉臂無非祖意西來心行處滅故治世語言資生業等皆與實相不相違背如是則攪長河為酥酪不動腕頭變大地作黃金豈勞施設一一胸䘳流出與我蓋天蓋地塵塵普見色身物物全彰大用正恁麼時如何空生無意嵒中坐不禁天華動地來晚參擬心時被擬心魔縛非擬心時被非擬心魔縛非非擬心時被非非擬心魔縛敢問大衆作麼生得不縛去莫是極妙窮玄置心一處得麼莫是一回入草去驀鼻抴將回得麼莫是家親作祟識得不為冤得麼莫是析旃檀片片皆香全身坐斷佛魔頭得麼莫是休去歇去冷啾啾地去古廟香爐去一條白練去得麼莫是是句亦剗非句亦剗譬如擲劒揮空莫論及之與不及得麼莫是飢來喫飯困來打眠隨緣消舊業且莫造新殃得麼莫是衲被蒙頭萬事休此時山僧都不會得麼莫是轉轆轆地才恁麼便不恁麼得麼上來做處不出作止任滅四病全在三縛之中除此別有便請道看若道得始有語話分若道不得大事為你不得小事各自支當珍重晚參舉七祖南嶽讓入室弟子六人各印可曰汝等六人同證吾身各契其一一人得吾眉善威儀一人得吾眼善顧盻一人得吾耳善聽理一人得吾鼻善知氣一人得吾舌善談説一人得吾心善古今師云者老和尚寱語不少當時山僧若在便與他掀倒禪牀抴下腳來爛捶一頓了然後問他六人你者一隊漢皮下還有血也無是你以前還曾欠少眼眉耳鼻舌心也無因甚卻從人得今既得了他人底自己底又安向甚處亦與他爛捶一頓豈不風清一世免得遞代相沿將箇東瓜印子印破他人面門大衆前來老漢總不唧𠺕你等合知向皆卻來者裏覓箇甚麼山僧今夜若不據令而行亦未免遭人貶剝拈拄杖下座一時打散晚參由根有利鈍故證有疾徐從上根器總作四種斷一頓中頓如霛山會上廣𬱃屠兒放下屠刀云我是千佛一數又黃檗和尚因百丈舉再參因緣便明得馬祖大機之用者是也臨濟云山僧往日曾向毗尼中留心亦曾於教乘中尋討後來知是救世藥方表顯之説遂乃一時拋卻即訪道參禪後遇大善知識方乃道眼分明始識得天下老和尚辦其邪正非是娘生下便會還是體究磨鍊一朝自省則漸中頓也溈山云如今初心雖從緣得一念頓悟自理猶有無始曠劫習氣未能頓淨須教渠淨除見業流識即是修也不可別有法教渠修行趣向則頓中漸也所謂漸中漸者即緣覺聲聞及權乘菩薩皆從三無數劫修六度萬行方得成佛者是也更有一人不涉頓不涉漸你道作何面目良久云歸堂喫茶晚參真如凡聖皆是夢言佛及衆生並為增語或有人出來問盤山老聻但向伊道不因紫陌華開早爭得黃鶯下柳條五祖云更有問四面老聻自云諾惺惺著師云更有問廣潤老聻劈脊與他便棒又云少神作麼入新僧堂上堂問廣潤寺裏新建禪堂入之者箇箇眉毛廝結出之者人人鼻孔遼天更有一人也不出也不入勞煩和尚重拈出師云淮南道士著真紅進云千江有水千江月萬里無雲萬里天師云塞北佳人巧畫眉進云人平不語水平不流師云咭嘹舌頭三千里進云恁麼則擺手出長安去也師云不出不入話作麼生進云也知和尚師云你知箇甚麼僧歸衆師云腳跟下猶少一頓問望州烏石與僧堂未到相逢已舉揚廣潤僧堂今日就堂中箇事可商量如何是堂中事師云獨掌不浪鳴兩掌鳴摑摑進云如是則人人頭上放光箇箇腳跟露彩師云青蘿緣嶽頂不與白雲齊進云頭頭垂示處仔細好生觀師云高著眼僧喝師云好一喝僧擬議師便喝僧連喝兩喝師復喝云再聻僧掩耳師云了乃云浪鳴非孤掌兩掌鳴有之青蘿緣嶽頂終遜白雲齊一斧斫成象骨槽三文娶得奯公妻囉囉哩哩囉哩新神更著師婆賽古廟重遭措大題且恁朝弋清風莫釣雲霓嬴得華溪松徑上扶笻間聽野猿啼爭奈山門頭兩箇大漢努目牚眉卻道百丈大智以前嵒居穴處人人自律百丈大智以後高堂廣廈人人自廢東廂下白鶴大帝與元弼真君默默地商量諸方善知識解垂萬里鈎善布縵天網安似我者裏堂頭一似米揚粳底簸箕三四瑞雲路相次絶也説甚麼麟鳳諧諧魚龍緝緝山僧被他搔著癢處不覺手之舞之足之蹈之呵呵大笑笑到明朝後日又後日乃左右顧視云此衆無支葉唯有諸貞實密老和尚諱日上堂問長庚曉景絶躋攀出死入生了不干展布家風師再矣為誰舉棹別波瀾師云金雞解銜一粒粟供養十方羅漢僧進云恁麼則可謂雲從龍風從虎師云你還知南嶽讓和尚降誕白氣應於玄象在安康之野麼進云真風直得來無已千古傳持信有由師云杓卜聽虛聲進云親見和尚去也師云見即瞎僧便喝師云驢鳴頭伏地馬叫口朝天僧以手點胸云者聻師云情知你亂做進云不得壓良為賤師云輕饒送出三門外乃云太白霛峰兼廣潤三方六度為燒香不因淡嚼家風久誰信菜根滋味長雖然也是山東人棗子福州人嗜荔枝各自説好處若論者老子道充寰宇德被天人幾微而振達磨直指之宗自隱而章臨濟欲湮之旨起關嶺垂秋之門祚譬如大龍宮殿水出倍前而潮汐為之不失其候發同學未耀之光華尤彼日天子照明世間而七金五嶽因之高顯而殊出然則此日今時燒楓香餅香黃熟香兜樓婆畢力迦旃檀沈水之香而修設伊蒲塞供者殆將極江南窮塞北則又何止嘗千嘗萬而與之較豐論嗇邪然而卻有并渠列下自謂不如我道真者豈寸有所長尺有所短乎抑智有所不知識有所未逮乎慢山峻乎見刺深乎殊不知者老子頑如陝府鐵牛嚚似嘉州大象贊固不動毀又何傷所可恨者不審銅棺著跌是甚魔境見前卻哀赤肉團上人人壁立千仞乃隱於陰入之坑覆自蔀葑之下由是心憤憤口悱悱直欲拳倒涅槃城躍翻三眼國上與佛祖結生冤家下共波旬作死頭對那在泰山使者馬面牛頭就是閻羅王聞之害怕鬼子母見説攢眉帝釋搖頭修羅膽戰大衆是渠恁麼召災惹禍所獲罪愆還有赦放時日也無不到虛空撲落地也須滄海化為塵晚參舉雲門到灌溪有僧舉灌溪語云十方無壁落四面亦無門淨嬴嬴赤灑灑沒可把問雲門作麼生門云與麼道即易也大難出僧云上座不肯和尚與麼道那門云你適來恁麼舉那僧云是門云你驢年夢見灌溪僧云某甲話在門云十方無壁落四面亦無門你道大梵天王與帝釋商量箇甚麼事僧云豈干他事門喝云逐隊飯漢師云大凡舉話須知話之起倒者僧既不是弄潮手空將鼻孔與人扭捏作麼廣潤見處也要與諸人共知拈拄杖云看看望海鑯動也𨁝跳上瑞雲峰頂壓著諸人頂門是你還解回避也無良久云十方無壁落四面亦無門淨嬴嬴赤灑灑沒可把甚處去也抴拄杖一時打散晚參舉雲蓋智禪師云大衆昨日登山看釣魚步行騎馬失卻驢有人拾得駱駝去重賞千金一也無若向者裏薦得不著還草鞋錢師云據山僧看來草鞋錢即不著還尚有寒暑遷流在欲得不為寒暑之所遷流更聽山僧一偈少年上樹日幾回老大傷嗟氣力穨烏臼采經三五日腿酸不覺步難擡上堂涉水登山造瑞雲孜孜為法意何勤誰知廣潤元無法只麼朝曦又夕曛有箇多知漢從旁不甘抗聲出來道然則晝但晝夜但夜僧但僧俗但俗香臺但香臺拂子但拂子玄關既爾罔闢迷子何以知歸豈不孤他諸上善人來意山僧卻有箇推託處乃往古過極無央世有佛出見號釋迦牟尼時今釋迦老子為廣熾陶師於其法中始發無上道心從此以後得值七萬五千諸佛承事供養乃至經歷二大阿僧祇劫所供養承事諸佛無有量已過量皆不與授阿耨多羅三藐三菩提記至最後然燈如來始與授記爾於來世當得作佛號釋迦牟尼何故以悟無所有法故大衆既無有法且道釋迦老子據箇甚麼道理便道天上天下唯我獨尊驀拈拄杖云孤根自有擎天勢不比尋常曲彔支卓一卓下座開爐上堂地爐無火客囊空雪似楊華落歲窮拾得斷麻穿壞衲不知身在寂寥中古人雖則與麼滴水滴凍簡點將來猶落今時爭似廣潤者裏黑漆爐開正法眼真燈般若火相須霛薪不斷從來𦦨無位真人樂有餘是則固是祇如初三十一中九下七七九六十三九九八十一朝往西天暮歸唐土一馬生三寅石牛攔古路又作麼生商量若商量不下更須冷灰裏與我爆出黃金豆來始得上堂舉梁山道南來者與你三十棒北來者與你三十棒然雖與麼未當宗乘後來琅玡和尚道梁山好一片真金將作頑鐵賣卻琅玡即不然南來者與你三十棒北來者與你三十棒從教天下貶剝師云琅玡雖不將金作鐵賣其奈自不説價要人還錢廣潤又則不然南來者與你三十棒北來者與你三十棒棒頭有眼明如日要識真金火裏看晚參舉汾陽拈拄杖示衆曰三世諸佛在者裏為汝諸人無孔竅遂走向山僧拄杖裏去強生節目淨因成曰汾陽與麼示徒大似擔雪填井旁若無人山僧今日為汝諸人出氣拈起拄杖曰三世諸佛不敢強生節目卻向山僧拄杖裏走出向諸人道我不敢輕於汝等汝等皆當作佛師云呼來遣去許他二老死蛇活弄然雖如是向上一竅未曾動著山僧今日為諸人提掇去也拈起拄杖曰若識得者箇三世諸佛被諸人穿卻鼻孔若也未識諸人鼻孔被三世諸佛穿卻擲下拄杖云是箇甚麼晚參舉無用全拈長沙示衆云百尺竿頭坐底人雖然得入未為真百尺竿頭須進步十方世界見全身大慧先師道要見長沙麼更進一步保寧則不然要識長沙麼更退一步畢竟如何換骨洗腸重整頓通身是眼更須參師云二大老一腳前一腳後簡點將來未得歇在大衆要識長沙麼直須倒卻竿子始得為甚如此打破淨無一事杜鵑啼在落華支晚參此事不可有心求銅砂鑼裏滿盛油不可無心得波斯彎弓面轉黑不可語言造流蘇帳曉春雞報不可寂默通石人打鼓韻鼕鼕然則畢竟作麼生得與此事相應去免得胡猜亂猜乃云前露柱久懷胎生下孩兒頗俊哉未解語言先作賦一操直取狀元來祈嗣請上堂問聞風自遠特趨來兆叶熊羆法爾開一句了然超百億瓜綿何用弗高禖龍吟霧起天垂蓋虎嘯風生瑞應槐父子不傳真妙訣請師點出畼人懷師云但願闍黎行好事自有天公降吉祥進云恁麼則人人沾恩去也師云他後不得孤負山僧僧一喝師云稚子敲針作釣鈎僧擬進語師便喝乃云嘉州大象慣放癡憨陝府鐵牛長眠霜月日靣佛月面佛徒看王貌如華曹家女嵒頭妻不解生男育女拈拄杖云惟有者條拄杖子先天為心祖見在作津梁臨濟蒿支點著蔭森大地嵩山業竈敲來佩響天人長育盡羣萌誕生皆貴𦙌其奈年代深遠拄杖子偶然失照被般杜撰巡官將去江外打壄榸便見兔縱狐橫鳳衰遠如今要得雞足蘭孫再茂少林桂子重芳震威一喝云七星邪映風生處四海還歸舊主人復高聲喚云主人公惺惺著卓拄杖下座音釋堊遏各切音惡色土也寀此宰切音採寀寮官也穨徒回切音魋通作頽又與隤同病也曦虛宜切音曦日色也鼕徒冬切音彤鼕鼕鼓聲也榸樁皆切音𪘜枯木根出
