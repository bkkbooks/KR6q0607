body:
  text: 嗣法門人顯權等編佛事師抂匡山黃嵒寺先和尚赴音至縣真展哀舉真云有緣佛出世無緣佛涅槃今朝又見法山崩坼法海枯乾去也衆中莫有扶持得起者麼山僧不免當陽展示也要大家覿面同觀遂展真云還見麼一把柳絲收不得和煙搭抂玉闌干百丈忌拈香興禮樂定禪叢煥乎其有文章顯大機施大用偉哉諸宗首出肰則刓方為圜不如𢿨華為檏所以壄鴨未飛騰山雲嘗自抂大雄獨踞坐海月沸如潮由是棒喝交加白拈遍界直得音天之下鼠肝蟲臂悉化為劒盾刀槍率土之濱草衣木食悉變為尊爼玉帛毒流一世殃及兒孫今日山僧爐熏上爇薀薻陳思還出得他範圍也未炷香云金雞飛上玉闌干自有嘉聲繼賢哲百丈忌八角車輪飛上天高山千古仰時賢無生曲子年年唱流水悲風動莫絃大衆還聞麼遂燒香展拜密老和尚諱日拈香巴陵下三轉語三家者以雍徹楊岐作女人拜季氏八佾舞於庭新天童者裏即不肰不蹈先德故常亦不循他諸方舊例何故報德幸無禪五味酬恩那枉一爐香密老和尚忌鶴鳴抂陰其子和之師翁唱先師和先師唱山僧和唱既彌高和者益寡所以抂先師當日對師翁則曰若據某甲扶佛法任他都來總與三十棒莫道分明為賞罰雖肰極力扶持爭奈令行一半若也盡令直饒先師師翁未免鼻孔齊穿卻投向爐熏一炷燒顧大衆云肰則供養什麼人即得炷香云將此深心奉塵剎是則名為報佛恩密老和尚忌一年一度燒香日歲歲今朝七夕同幾見彩雲翻白雨誰覘銀漢變秋虹碧梧瑟瑟金風裏丹嶂棱棱莫靄中打破髑髏歬見解乾坤畐塞老天童密老和尚忌半肯半不肯劒挂眉間灮炯炯焉敢違背他分明眼裏又沙一炷心香一盞茶貴圖此話行天下若謂佛法道德難白晝青天且莫閉眼作夜密老和尚忌以大地為爐熏拈白雲為沈速列山為饌錯海為肴事上有餘爭奈理上不足奉金牛飯獻趙州茶䞋下楊岐金剛圈食進東山鐵酸餡理上有餘爭奈事上不足左申五指爪掌以右手拓呈高聲作梵韻唱云不如吽字涌出妙香華燈塗果天母供養我師大和尚斂手云何故不見道鄭州梨青州棗萬物無過出處好密老和尚忌盡空法界入圜輪誰識吾師此日身擬向寂灮常土覓己同門外泛遊人爍迦羅覷難容眼障蔽魔伺枉費神八爇爐香知甚據霛山無手掩空生密老和尚忌通玄昔日元非去苕水今朝豈是來不去不來誰薦的一爐香𢿨古嵒臺密老和尚忌去秋燭剪邗溝月今歲茶烹老范泉太白峰高常抂望歸真誰道十三年大衆還信得及麼若信不及時𩖼𩖼栴檀爐內爇披襟試驗髑髏歬密老和尚忌向上一路千聖不傳迦葉三昧不自霛山得來所以釋迦三昧飲灮不知阿難三昧不自雞足傳來所以飲灮三昧慶喜不知乃至山僧三昧不自天童得來所以先師三昧山僧不知既彼彼不相知各各不相到舉香云且道者瓣香燒來一十五秋端為何事插下云香嚴道底香嚴道底密老和尚忌悟得𣍘溪本來無一物臨濟離相離名之旨𠊳爾佛來也打祖來也打一味天空地空人空我空碎盡有為之窟宅隱蔽邪慢之魔宮所以魔梵修羅嫉若眼中毒刺恨如夙世冤家即不肖忞到此亦公道難泯也則半肯半不肯抂何故肯則肯伊克紹先宗力爭祖命不肯則為伊乏大人之相多好辨之稱舉香云肰則者一瓣香因甚為渠拈出插下云選佛若無如是眼假饒千載亦奚為大覺開山達法訣禪師忌出無佛之境土當大法之中衰一緉𦬆鞋撩盡百城煙水半尋竹杖敲開幾處雲扉窺玲瓏之半竅見吾道之玄微神欽其德虎伏其威號呼則天人協贊指顧而金碧交輝龍門萬仞承開鑿坐令金鱗掠漢飛面目儼肰叢社裏昔人那道此時非大衆既無今非昔是之分則無生滅去來之相既無生滅去來之相又作者場特地作麼飲泉水貴地脈百世今秋永為規則金粟石車乘和尚忌道起禪叢口衆歌先師公案了還多衝霄鶴自雲歸後徒見嵒松長薜蘿舉香云肰則者一瓣香今日為誰拈出寶鐸搖空春晝永功高千載應難磨𠊳燒掃北都笑嵒寶祖塔黃金骨鎖玉玲瓏鐵棘門栽不計重佛眼難窺吾祖意兒孫若𢼿妄流通拈香云即此用離此用蟭螟眼裏繡鴛鴦烈焰爐中飛彩鳳𠊳燒掃禹門幻有傳祖塔高縣一笠覆乾坤手決滹沱漲禹門寶篆音天終古爇起家輩輩有兒孫肰則不肖道忞到此重拈一瓣為是仁義道中為復一場特地萬派千流無別潤貴從地脈見真源掃海會天隱修和尚塔金車錫卓千山震石磬聲騰百怪藏穴産霛雛皆鸑鷟霧披玄豹變文章風規素著真師叔宇宙名喧愧姪行三拜塔頭酬夙志不須把火照雲堂肰雖如是吾叔道德高崇豈某贊揚可盡祇如八華毬上今日更繡紅旗者要與天下有眼底衲僧敦其本委其源正其知廓其見信有我家大法紀綱抂咦豈是無端閒話會典刑僃具一爐香掃萬如微和尚塔先師善繼人之志吾兄善述人之事坐建東南大法幢寶輪宮殿盤雲起四衆同欽天龍共喜日午當空塔影圜景仰千載何窮已奠積翠唯一潤禪師紫電晃眉間之耀青蓮𢿨毛孔之香氣陵一世眼蓋諸方只為探頭太過幾回頓躓龍驤懷干將以莫試鳴長鋏而歎傷休歎傷伯牙曲奏鍾期聽山自高兮水自長挂鐘版迥無依倚處立卓縱橫窈絶機宜中翕張變態化裁妙天肰之矩矱動寂露法王之根苗所以把住則烈日霜飛四溟無水泄放行則寒冰焰發大地忽陽和正當今日權衡佛祖高聳人天即置斬新條行新令一句又作麼生道遂擊一下云劈歷一聲喧宇宙心華開遍少林春挂鐘版峭巍巍活卓卓離微通不照用一時行何止寂感無差對揚有準直得翕張造化電卷星馳舒慘陰陽龍奔虎驟猶是長生路上流布將來若向朕兆未分之際薦得渠儂落處𠊳可與佛祖為師人天作範橫拈倒用何妨日午打三更玉振金春一任玄關開祖域其或尚涉遲疑未免受渠曲折去也擊一下云正令已行邊塞靜端居寰海定龍蛇沙彌剃落恆沙劫種出家因優今開火內莖髮斷青絲除愛結虛空背上白毛生驅象駕請長纓一舉九天雲外步等閒踏倒法王城付衣柔和忍辱不虛褫消瘦青蓮衆患離名字六師曾未曉佛同稟受祖同持勤加護攝威儀虛空疊作紅蓮座火聚開為白蕅池沙彌剃落金刀剪斷無明髮露出娘生舊頂門莫謂毀形虛事褫人天何處不稱尊付衣袈裟著體豈尋常誓鎧全披好自將寶杖一揮三界靜髻珠親解法中王沙彌剃落何似生遼天鶻萬重雲只一突是渠因甚得與麼活卓卓地直下一刀俱斬斷更無豪髮可容付衣入斯室著斯衣量才補職如是因如是果法爾當肰祇如信受奉行時合作麼生橫身三界外獨脫萬機歬沙彌剃落僧寶誰云滄海珠盡虛空界濟無餘德瓶甘露應常滿名稱方宜勝丈夫付衣錦衣公子休誇富天上六銖未足多一縷龍免金翅難好教慈覆遍娑婆沙彌剃落平步青霄汗漫行蓮華火內競頭生脫塵俗不多爭祇恐為僧心不了為僧心了總輸僧付衣千生未易聞名字一旦通身服九條青嶂外何逍遙三尺龍泉灮照膽萬人叢裏奪高標沙彌剃落出家初不為身心大法全肩力荷承千里誰云方舉步雲程十萬快飛鵬付衣大士胎衣變九條多生法御應常調今朝三事全披得好作人天正法橋尼本肰剃落狻猊才出崛威猛蕩寰區獨跨大方步豈為格量拘肰而舍金輪之寶位子夜踰城脫珍御之龍衣青山斷髮何以佛佛道同乎還會麼要作人天真榜樣信肰脫俗是良謨付衣歸卷金襴去深藏定水涯為標千聖格所以待龍華况復割煩惱而得消瘦之名離染著而被青蓮之號服之者忍辱增進持之者功德無邊可不頂戴遵奉也邪提起衣云還見麼莖縷蘸乾生𣦸海何人出得者袈裟小佛事為雲門堂頭雪嶠大師封龕拘尸那畔掩金容淚灑閻浮血染虹誰信碧霄雲𢿱後長天萬里露秋空恭惟當山堂頭大和尚西河師子長沙大蟲一鏃破雲門三關全身佩浮山九帶娘生鼻孔打失秦望山中空劫眉毛拾得禹門浪裏𠊳爾訶佛罵祖抂處為禍為殃長時攃風攃顛知他是凡是聖舌頭控爐鞲藥汞禪點著銷鎔口角擲金梭階歬草織成錦繡本望長縣慧照何期遽斂春灮庭柯慘鶴𡬾之容四衆見奢華之色今則雲龕既入玉戶宜局金色頭陀合知端的搖鈴暜化謾說神通喝一喝云體露金風須著眼身藏北斗許誰看起龕來本自心往非有向步步絶行蹤通身無景象放開一線道則從伊若不放開說甚南天台北五臺雙徑匡廬與鴈宕𠊳饒打一筋斗過華藏莊嚴世界海那邊更那邊卓拄杖云又何曾離得者裏無陰陽地上所以我堂頭老人不動道場入大寂滅三昧海一坐百二十日為諸人真實提唱直得三世諸佛默肰靜聽萬象森羅曲躬稽顙梵王帝釋主風神主空神主晝神主夜神身衆神執金剛神𢿨華供養那容天魔外道之徒潛窺而側望肰則摩竭令嚴誰𢼿關通但諸比丘比丘尼優婆塞優婆夷於呌不應山歬成就一鋪功德須大師點眼因行不妨掉臂請大師且出方丈入塔以拄杖指塔戶云大衆還知者段因緣也未若也未知山僧不免𠎥婆帔子拜婆年去也須彌頂上鐵為龕內有空王月一函莫謂秋灮淨如練佛來相見也垂簾且道當山堂頭和尚到此又作麼生珊瑚支支牚著月千古萬古衆同瞻鹽梅鼎禪師秉苣者漢與山僧法門為昆季入道固多年性燥實無比初於金粟得名晚乃天童得地馬師鹽醬倏嘗𠊳道梅子熟亟好歹逢人即出不管出即不為所以不上一年半載院子住了三次四次甚有長篇短句伽陀與夫尋常戲笑怒罵咳唾掉臂點肋點胸自負無非祖師西來大意三十年後指望此話大行誰知鐵面閻羅請符卒至今日見成公案既落山僧手中且道山僧又且如何處置乃云十載江南山共水春寒秋熱大家委撞到今朝水盡頭卻好同生不同𣦸攃手別無可奉君提起火苣云賴有末後者句子打送寂灮三昧中天下誰更奈何你攛下𠊳燒天童林壄和尚入塔擈碎虛空閒景象一菴卓卓露當陽銜華鳥自難尋迹孰謂將身北斗藏所以道善知識者以形骸為幻泡以生𣦸為郵傳其來也月印江波其去也雲收嶽面唯我法兄林和尚夙因深厚願力弘堅出德嶠之戶門渾身是膽下川勤之三峽就地生波食到口邊奪回洞山果子不住迷悟超肰獨步大方故能橫身十字街頭珠回玉轉垂手千峰頂上斗換星移揮七尺山藤那分凡聖布漫天羅網打盡魚龍一朝𨵙爾告終蓋為化緣將畢今則塔從地涌頂合峰尖依常寂以歸真𢿨慈雲而分布且道還有奇特事也無千古玲瓏嵒下寺一龕長照萬年燈白可學公禪師入龕赤身貧已十分極病骨無緣更拄笻攃手獨跨方外步大千何處覓行蹤此蓋我友白可禪師生平學道有如是氣槩故有如是英標有如是冷落空疏名世故有如是逍遙獨脫自由自在祇如即今轉功就位全身奉重一句作麼生道古佛堂歬不住牢關把斷據寰中清菴澄禪師秉苣坐脫先師意未投其如攃手等輕漚長安古道行人少陝府今看灌鐵牛恭惟某師定海波澄戒珠川媚生緣陝右而化被秦淮道出臺山而途無曲徑餐煙水饒有百城飽風霜足經萬里身同天外之鶴迹類秋空之雲有時坐地看揚州驀忽乘風來海上既到水盡山窮處早知移身換步時所以人天莫測蹤由魔外罔窺涯際雖肰末後有一句子直須山僧拈出始得攛下火苣云水底火發燒虛空叢林盡作師子㖃入塔藏身處沒蹤迹挂角麢羊何處覓沒蹤迹處莫藏身無景𡬾頭華正新本非藏絶迹蹤密移一步看飛龍昨夜虛空揣出骨還他塞卻太虛空五磊堂頭權長老起龕玉殿未為尊珠樓何足貴突破萬重關不住青霄內以拄杖指云蓋是者漢一生擔版𣦸不回頭者也所以閙裏抽身於響順聲和之日急流勇退於風行草偃之時闔國人追不再來千峰萬峰直入麢羊角挂難尋迹南辰北斗披䘳打成一片皇封捏聚團圞世界立罷夜明簾外因退位以朝君照空古鏡臺歬為轉身而就父無景𡬾頭舞鳳不萌支上糝華即從伊畢竟公案如何結絶擊龕一下云驚起泥牛㖃夜月倒緣蘿壁上天台舉火干將獄底灮衝斗一出豐城萬怪降天寶人間不住空遺寒景寫澄江子不談父德師豈譽徒賢恐孤芳之不著將青𠬥其遂湮唯我權公長老智足超宗仁能纘緒初臻覺岸高升太白之堂末到牢關深入山僧之室閒吸西江水涓滴無餘直接濟北流滔天有浪支葉廉纖不帶眴全彰本色之人偷心豪髮靡容針錐痛下時流之疾一衲披十周寒暑半逐飛雲三門絶今世塵囂平堆古霰所以人天四衆欣戴真慈雲水方來雅推善導何意德生魔色豈期天器豫躬苦海波心遽爾頓停慈櫂琉璃地上無端撥轉夜船雲遮一帶峰巒巢迷歸鳥雪覆千灣蘆涇岸失行舟正當今日指窮於為薪火傳而不盡一句又作麼生道分形散體周諸國為瑞為祥遍九陔安骨鯨吞水盡露珊瑚牚起支支桂景孤剎海三千澄後夜法身端坐大毗盧白雲斷處家山劫壺空中世界日月雙丸回薄無由正照旁臨虛閒六戶開張不受森圍翠繞簾垂黃閣迥帳合紫羅寒最妙最玄先聖獨推此位非偏非正諸佛罕處其中安下骨龕云且道者漢以何功能儼肰高踞雪鬢霜眉從火出堂堂終不落今時高原暜禪師封龕水出高原四河流潤珠沈滄海玉彩潛輝恭惟灮相堂頭和尚獨角祥橫行海上分太白燈傳餘焰自矜肘後有符悟通玄不是人間那抂案頭無敕所以棲雲十載真風暜扇於姚江灮相九旬法雨旁施乎越境方囊錐之露穎遽寶鍔其斂鋒五湖煙景誰爭不謾先期尅定千里家山必達要知到岸非舟大衆正當恁麼時且道堂頭和尚還有去來出沒之相也無掩龕云一片白雲橫谷口幾多歸鳥𠊳迷巢寶慶南源融禪師起龕春灮無𧺆閻浮鳥語華香遍界周芳草那堪彌古岸黃金索斷鐵牛頭管帶絶拘信步天南仍地北更嫌何處不風流秉苣逝者如斯夫真源常湛寂住菴人不見千嶂圍空碧恭惟當山堂上南兄大禪師來鏡水而波澄出秦山而月皎千生萬受飽餐黃檗之風七穿八穴灮徹玲瓏之竅所以紀綱法社則玉應金舂晏坐空山亦鳥閒華靜虛空有口寶偈常宣萬象無言直頭自點正擬望隆迦葉豈期嵒失空生蘭幃不設誰當軌範人天蕙帳長空不勝怨哀猿鶴大衆正當今日還知此老有一段奇特因緣也未攛下火苣云萬里神灮連頂沒大千皎皎一圜輪白雲鹿門西禪師封龕白雲何事愛青山山自巃嵸雲自閒雲昨曉隨風雨去到頭雲定覓山還大衆於此薦得𠊳知堂上老人昔生本不生今滅何曾滅其或未肰山僧不免為蛇畫足去也恭惟當山鹿門法兄大禪師錫持霛壽杖曲唱白銅鞮實法海之游龍本教壇之義虎盡燔德山疏鈔自知塵內有全經飽餐太白獰拳𢼿道西來無別意觸處生涯成現頭頭擈落非他只將元本契書驗取山歬田地歸導迷途之子還招出岫之雲一向千峰頂上橫身何妨十字街頭垂手有時十字街頭垂手卻向千峰頂上橫身直得浩浩真風肅清三佛之地亭亭寶月高朗四明之山大衆正當今日櫓櫂俱亭綸竿不展為是筏尚應捨為復疲干津梁掩龕云奕世尚肰教澤崖梅歲歲𢿨清香霛章蘊禪師起龕水上東山行不住火中木馬驟清風為緣鼻斷黃金索八角磨盤任𧺆空封塔青山埋骨始完名人增山香名始馨一片冰壺秋水骨清風千載起皋亭恭惟同參霛章蘊禪師碧落五雲緇田九穗教入蓮居之室義學該通禪登太白之堂心宗統貫有口可吞佛祖誰甘引首眉凝眸直視雲霄且自吟風嘯月語其高則懶殘是侶論其操則三角為朋一喝對凶徒富有僧家之寶半鐺煮黃獨貧無卓地之錐所以昔年劫火焚身何異吹灮割水此日山翁入塔未免鎖夢關空肰則合尖一句畢竟如何話會把手相攜真歇了同輝寶月照錢唐圜通老宿封龕逝多國土賴相成又向何方展化輪只抂阿閦兼妙喜人天無路問玄津恭惟圜通老禪宿法海聖賢隨宜應迹暜門大士方𠊳垂綸住世七十九年將𠬛迦文之壽算念周千百億所欲分布袋之多身釣絲一夜收竿拋盡雲山海月歸烏幾多迷谷難尋苔徑華茵俊哉師子之行迥而絶侶卓爾象王之步誰則為鄰掩龕云物外乾坤主官壺中日月自朝昏止休淨上座起龕多年賦就還鄉曲欲唱人歬恐脫空帶血連宵啼蜀魄歸思不禁上眉峰春去也緑滿叢夾路桃華風雨後馬蹄何處避殘紅舉火一念回灮父母未生誰是我四楞塌地真常獨露本來人况復知止能止知休即休古廟香爐去一條白練去雖受他家盂不更強安柄杷白醭華平堆口角黃獨飯爛嚼鐺中唯其掩息如灰故能死生若脫但只恁麼去恐守寒嵒異草青坐著白雲宗不妙山僧到此不免為你別轉一機欲待橫身三界內請參勝熱婆羅門攛下火苣𠊳燒音釋覘占切諂平聲窺也視也苦臭切音䠗靜也陔柯開切音該與閡通九陔九天也鍔逆各切音咢刀刃也攛取亂切音爨擲也苣臼許切音臣束葦燒
