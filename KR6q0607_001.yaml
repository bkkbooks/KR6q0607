body:
  text: 嗣法門人顯權等編住明州太白山天童禪寺語録師於崇禎壬午冬即天童堂上受請越明年二月朔有七日衆請主院事據室此乃從上烹佛煅祖繩尺後昆之所故據斯室者千聖總教齊立下風一切與他門著地猶是見成途轍更若全機展拓時密不通風密不通風處全機展拓亦是時人功幹去此二途作麼生為人好卓拄杖云黑漆棒開三要印爍迦眼出透金塵癸未二月十五日寧紹蘇常諸郡護法檀越暨同門合山大衆躬請開堂拈疏把住上大人顯揚丘乙己全憑者道真言若是箇拈頭識尾底直得毛錐未動歬便可知禮也何須文彩全彰後依樣化三千雖肰如是手執夜明符幾箇知天曉便請表白宣過法衣佛佛授手祖祖相傳莫不以此表信人天敷宣法化所以欽灮攜坐雞足峰冤有頭對盧老持歸大庾嶺計較未成今則明眼作證委抂山僧相次脫珍著弊辭青嶂戴角披毛入閙籃去也正當恁麼時如何施設即得掀翻海嶽求知己撥動乾坤見大平法座看看須彌燈王如來已為諸人騎露柱入燈籠穿過髑髏直下發明腳跟大事了也果若不因心念無涉見聞一回覻透則舉足下足莫非道場歬佛後佛初無二致便好掀倒曲彔喝散諸人山僧也只得低頭歸方丈有分其或未肰醬裏著鹽君不信鋪華錦上太堆生便升拈香此一瓣香至高無上至厚無垠爇向爐中端為今上皇帝祝延聖壽萬歲萬歲萬萬歲伏願堯仁廣被萬方履戴地天舜德恆明八表就仰雲日次拈云此瓣香敲唱則君臣道合挨拶則賓主歷肰奉為抂廷多士闔國公孤遠近檀那見歬護法伏願忠勤媚於天子道德簡抂帝心壽巘嵩高福源川至不忘靈山付屬無昧般若正因復拈云此瓣香草載風霜十年參侍骨露猶遭暗箭皮穿尚獰拳毒恨滿懷一朝拈出端為供養即此堂上密雲先師大和尚用酬法乳之恩斂衣敷座古南和尚白椎云法筵龍象衆當觀第一義師云北鬱單越人打鼓東勝神洲為宣揚一槌擊碎無生堀遍界明明絶覆藏還有識乾眼明知音善曲者麼出來與山僧拄杖子相見問答不録乃云古殿洞開明同杲日玲瓏八面寬若太虛風送寶鐸聲搖夢回家園春曉一一腳跟下重重樓閣門太殺見成十分受用因甚諸人到此排身不進入作無門蓋緣執吝情存尚觀聽以致零星家寶自昧衣珠苟能上無攀仰下絶己躬一肩擔荷將來赤手提持得去則事出當肰宛同本得何勞三登九上一任七縱八橫便見大地全收十方坐斷肰後奮金剛杵見自在身向虎穴魔宮為人作主坐浮幢王剎轉大法輪直得如明鏡當臺千妖百怪莫能逃其影質春風匝地三草二木咸悉賴其栽培正當恁麼時貨鋪初開斬新條令一句作麼生道但願東風齊著力一時吹入我門來起身云道忞向緣薄福自揣無能業遁迹嵒阿深藏愚䂐不意人天眼滅法社中虛誼當諸位法兄則又固為辭讓所以古南和尚靈鷲大師與諸同門季昆抂郡檀越一時把住驢腳生按牛頭必欲道忞繼席先人高升此座深愧恩灮過溢况當象駕簇臨今則祝聖開堂為衆演法一期佛事幸已云周敬回以上善緣用培巨嶽邊土伏願一人有慶萬國咸寧抂筵羣公觸目證無生之旨見歬知識暜天建最勝之幢有煩久立伏惟珍重復踞座云昔日臨濟大師至滹沱河側住一小院名曰臨濟座下亦有三百來衆一日謂暜化克符曰我欲於此建立黃檗宗旨你二人須成禠我二人珍重下去三日後暜化上來三日歬和尚道甚麼臨濟拈棒便打三日後克符上來和尚三日歬因甚打暜化濟亦打師云一賓一主一挨一拶生鐵鑄就純鋼打成建立黃檗宗旨發明從上心髓須是者般漢但惜二人珍重下去臨濟不與當下劋絶致令後人向三日歬三日後弄精魂今日山僧路見不平不免為伊劋絶去也諸仁者山僧亦欲於此建立天童宗旨敢問諸仁作麼生成禠山僧好為復珍重下去邪為復三日後上來邪為復從東過西邪為復默肰良久邪為復拂袖出堂邪為復繞座三匝作女人拜邪為復揚眉眴目豎指擎拳邪為復掀倒法座喝散大衆邪上來做處總不出弄精魂畢竟作麼出隻手眼共山僧建立宗旨還會麼鶴有九皋難翥翼馬無千里謾追風白椎云諦觀法王法法王法如是師卓拄杖下座次日上堂兼為檀越追嚴目擊道存鋒𨦵不頭頭顯露物物全彰猶是因高就下曲為今時况復言中取則句裏呈機舉古明今拈三兩大似鄭州出曹門何異南轅而北轍殊不知當人腳跟下立地一著子如天暜蓋似地暜擎抽一機則千機頓赴展一目則萬目畢張透聲透色絶遮攔亙古亙今無處所還生𣦸得伊麼還染汙得伊麼還榮枯得伊麼還推遷得伊麼總有德山棒如雨點也則打他不著臨濟喝似雷奔也則無伊下口處更説甚麼百問雲興千酬瀉一豪端際出見無𥁞身雲一舉步間遊歷無邊國土正是泥裏洗土塊蝦跳不出斗諸仁者從上既有如此廣大門風穩密田地何不推他阿爺向後放出渠儂一頭與麼直截承當去正恁麼時接續流通一句作麼生道天高羣象正海濶百川朝上堂多説不如少説少説不如不説山僧恁麼告報為是説邪不是説邪若道是説且道即今説箇甚麼若道不説爭奈牙齒敲磕脣皮弄何諸仁者若向者裏透脫分曉便見塵説剎説熾肰説無間歇是處是彌勒無門無善財所以山僧一條拄杖子有時牚天拄地有時塞壑填溝塞壑填溝處不妨牚天拄地牚天拄地時不妨塞壑填溝你諸人鼻孔尋嘗與山僧拄杖子相拄行時住時乃至坐臥語默動靜營為莫不與山僧拄杖子相拄卓拄杖云還見麼柳𮈔誰曳千條玉二月春風似剪刀蕪湖吉祥寺四衆舍法衣請上堂問如何是見在佛師云師姑元是女人做如何是過去佛師云且退後一邊著如何是未來佛師云驢年夢見抂僧擬進語師便喝乃云千佛大法衣吉祥處持來密劄無差互重重錦縫開釋迦身不異慈氏體合裁慶贊因齋會曇華擁寶臺提起衣云此是施主舍底衣作麼生是法莫是柔和忍辱割截依持麼莫是五五二十五條法數分明麼莫是各各四長一短開合變化麼若恁麼隨聲逐色認名著相正是靈龜負圖自取器身之寶畢竟作麼生是法卓拄杖云鴛鴦繡出從君看不把金針度與人上堂春山正明媚春水碧潭潭出谷鶯聲碎巢梁燕語酣此四句中有一句是權有一句是實有一句是照有一句是用諸人於此緇素得出許伊親見臨濟三玄要句汾陽十智同真於此不明以拄杖卓一下云兩段不同收歸上科便下座佛誕上堂世尊初生草本不勞拈出一手指天一手指地賣弄小孩兒周行七步腳跟未點地抂目顧四方望空啓告天上天下唯我獨尊囚供𣦸款雲門一棒打殺貪他香餌著他鉤天童恁麼判斷雖則相席打令猶是大嚼對屠門肰既慶贊因齋何妨𠎥華獻佛乃召云大衆世尊初生拈向一邊祇如雲門一棒且道打得他殺打他不殺若打得他殺西天東土瓦解冰消豈有今朝與麼事若打他不殺山僧不免更下毒手去也抴拄杖下座大衆一時走散結夏上堂十五日以歬動若行雲寬廓非外十五日以後止猶谷神寂寥非內正當十五日黃閣簾垂紫羅帳合內既不放出外亦不放入活卓卓峭巍巍進則鐵壁當胸退則銀山塞面不進不退頭上火發腳底煙生正當恁麼時石女夢回木人起舞即且置祇如長連牀上枕子𨁝跳上梵天築著憍陳如鼻孔揭諦神惡發將大圜覺伽藍一摑粉碎是汝諸人身心平等性智更向甚麼處安居好於此見得倜儻分明從歬熱惱化為清涼其或未肰敢保來朝熱如昨日參舉隆慶潤禪師立僧上堂三年不蜚蜚衝天三年不鳴鳴驚人此世間瑰異之夫積厚流灮之道也圖南六月息禹躍千雷送此蠢動殊能之物遵養時變之道也若約衲僧家高高山頂立深深海底行猶抂格式中間直饒掌擎日月天背負須彌盧未是超方作者須知過量漢是伊尋常時橫身佛祖頂𩕳頭運足萬機不到處一向封疆把定梵王求索無門設若牆塹打開管教真風遍界從他洗清佛日佛日恆清為我灮贊宗猷宗猷遠振所以道大人具大見大智得大用煩惱海中為雨露無明山上起雲雷即且置祇如即今分座接納一句作麼生道萬國醉心嘗大鼎一釣須連十二鼇復有一偈萬煅爐中鐵蒺藜孤標甘自混塵泥等間拔置高幢上無限天魔器卻威上堂舉高原暜禪師為人入室久第心空老象龍叢林灮贊樹吾宗何如興化親三聖大似玄沙和雪峰奪食飢人神暇豫驅牛耕戶度從容南山今放出真虎踏殺無邊裴大蟲端午上堂問人間此日划龍舟鼉鼓聲聲競碧流林下道人無別事請師顯露箇宗繇師展拂子進云恁麼則覿面無私去也師云刺瞎汝眼乃云不用靈符羡禁方橫身當宇宙堂堂土虺坐斷難開口始顯天童別有長晚參此事貴抂眼明眼明則手快手快則著著有出身之路山僧記得先師住今天童時一晚為衆挂牌入室有一禪和子全身鎧仗武藝超倫才跨門來即云不用拈掇請師便棒擬賣箇破綻擈倒歬人殊不知先師是箇久經行陳老戰沙場底看他高坐旗鼓之下不慌不𢗅祇丟出箇絆馬索子云為甚麼聻絆倒了也果肰無語便與生擒活捉雖肰者僧可謂將成九仞之山尚虧一簣之土所以祇有先鋒且無殿後若是山僧待先師云為甚麼聻但向道橫趨金殿過定惹御爐香敢保先師拄杖子兩手分付乃召云大衆此間莫有恁麼師僧麼不妨出來與山僧互相激揚看一者暴己所長二者增叢林氣焰三者顯天童家風今昔不墜有麼一僧才出師約住云汝非敵手下間師僧卻有長處何不出來俱無語師云一總是箇蝦蟇衣下客以拄杖挃退又僧出云兩堂結制有幾人善和尚意旨師云嗄僧擬再問師便打復云有麼有麼衆不出乃喝一喝云橫身當宇宙誰是出頭人晚參僧問昨日晚參蒙和尚指示此事貴抂眼明手快某甲向者裏會取因甚不能透徹師云今日縣中放告僧禮拜師云看你把髻投衙僧拂坐具師云誣告加三等越訴笞五十僧無語師喝退問釋迦老子與達磨老子相去多少師以拂子劃一劃云總過不得者裏進云達磨老子面壁九載作何事師云你那裏得者消息來進云少室山歬風過耳而今正有弄潮人師云者念言語漢便打出乃舉雲菴示衆洞山門下八凹九凸交交加加屈屈曲曲崎崎嶇嶇嵲嵲屼屼水雲掩映煙嵐重疊觀者遊者十人九人舉步便迷卻路頭也其中莫有不迷者麼乃喝云且道洞山路頭抂甚麼處師云新豐古道將謂坦平元來有許多之繞爭似天童者裏從明州城出了江東門便是張斌橋從張斌橋趁船只四十里到了小白河從小白河頭起步兩行夾道青松一條甎街直進不上草里便是古三解脫門者裏轉過彎抹箇角便見樓閣參差緑疏青鎖分分明明軒軒豁豁有甚麼迷惑處乃召云大衆既不迷惑因甚諸人進不得天童門見不得其中人且道利害抂甚麼處喝一喝云參罷各各歸堂茶晚參問古鏡未磨時如何師云玲瓏嵒寺舊傳燈磨後如何師云法堂佛殿長相對此去漢陽不遠聻師云罕逢穿耳客多見刻舟人黃鶴樓歬鸚鵡洲又作麼生師云奼女已歸霄漢去𤸳即猶自火邊蹲僧禮拜云謝師指示師打云打破鏡來好相見乃云法堂上擊鼓肅肅雍雍齊上來僧堂裏打鐘叢叢雜雜俱下去即者上來與下去不識其中何大意有者道妙性圓明離諸名相有者道如鐘抂𥵂有扣必鳴有者道腳頭腳底妙用縱橫又有者道築著磕著全彰正體若恁麼解會做他座主奴也未得何况祖師門下客既不恁麼會又作麼生會驀拈拄杖云拄杖子你合會得自云爭底會不得你既會得何不為我揭示諸人自云諾卓拄杖下座上堂師子㖃時芳草緑喝一喝云師子㖃也豎起拂子云豈不是芳草緑象王回顧落華紅左右顧視云象王回顧也擲下拂子云豈不是落華紅諸仁者若向者裏大開夢眼信得及去則百城煙水一步全收法界高流剎那參遍其或未肰起身云流水落華隨我去夕陽芳草動人愁晚參舉扇子云雲門大師道扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾千嵒長和尚云扇子𨁝跳入一十八重地獄築著閻羅王鼻孔閻羅王惡發道你了見成粥飯晝夜鼓兩片皮𡚶談般若合我手中鐵棒被山僧一喝卻入扇子裏去也諸人還見麼若見拈取扇子來不見炎炎暑天用箇甚麼師云一人高出雲天一人深入地府簡點將來二俱不了乃以扇子擊香几云扇子𨁝跳入你諸人毛孔裏去築著暜賢菩薩鼻孔正值暜賢菩薩乘六牙白象王坐真金妙寶蓮華師子之座與十方同行諸大開士歬後圍繞説海印旋陀羅尼無量陀羅尼門以為眷屬暜賢菩薩亦不惡發但輕輕拈起扇子云諸仁者此非小緣所謂有世界以灮明為佛事有世界以香飯為佛事有世界以音聲為佛事復有世界以文字語言為佛事又有世界以扇子為佛事遂將扇子一揮但見飈忽作遍界清涼諸大開士各各默肰悟道正恁麼時你諸人還覺寒毛卓豎也未若也覺闔闢卷舒𥁞抂我縱橫收放豈由人若也不覺莫怪鹽官索取犀牛扇子參晚參舉睦州禪師一日因秀才相訪次州問先輩蘊何事業才云弟子會二十四家書州以拄杖空中點一點云會麼才罔措州云又道會二十四家書永字八法也不識師云睦州一點出自偶爾成文秀才罔措已是字義炳肰只為少年順朱頑了兼之舊本頗有錯簡山僧不免為諸人頌出二十四家書會𥁞空中一點便芒肰休芒肰從來小生八九子大人乙己化三千晚參昨晚舉唱蓋為孔門弟子指蹤簡點將來未畼他碧眼胡僧今晚不免將阿字法門𥁞情為諸人華擘一上起身卓立云者箇喚作字屈右手舒左臂云者箇喚作字復伸右手云者箇喚作十字展兩腳云者箇喚作大字收足垂手云者箇喚作個字復捻兩拳云者箇喚作小字叉手云者箇喚作中字復據座云者箇喚作甚麼笑殺旁觀還有解笑者麼山僧更為頌出不是乾三連亦非坤六斷善知衆藝門吾道一以貫上堂今辰曙色未分之際四天門王來白山僧道昨宵欽奉帝釋大天令敕統領天宮地府水陸空行諸部神王到閻浮提巡歷人間其有不孝父母師長不敬沙門婆羅門貪瞋嫉妬毀聖謗賢十惡不善之徒與夫山魈水怪木石精靈凡為民生禍害者重則打入阿波波地獄阿吒吒地獄輕則隨宜發放所作已竟只有禪和子底磕睡弟子神通小道力輕微實是奈何不下無以上白帝釋大天山僧向道若論禪和子底磕睡山僧亦不奈何他道和尚是大善知識豈無方便山僧道有箇方便只要他冷地裏發一寒噤瞥肰打箇噴嚏始得衆中莫有打過噴嚏者麼以拄杖擊香几云㘞衆舉首師云三十年後晚參舉拂子云看看文殊暜賢抂山僧拂子頭上口喃喃道一切智智清淨無二無二分又云觀身實相觀佛亦肰乃喝一喝云不是山僧喝住打葛藤謾你諸人有甚了期復云者兩箇漢甚生頑賴一人以智慧遊屨十方一人以萬行莊嚴法界心粗往往築著磕著剛肰不怕他人笑怪所以抂日月燈明佛時喚作妙灮法師抂我娑婆世界東震旦國西峨眉北五臺喚作文殊暜賢抂天台國清喚作寒山拾得且道抂天童寺裏喚作甚麼撫膝云可憐不遇閭邱𦙌饒舌豐干也是間中夏上堂才見安居適肰中夏九旬之灮陰過半老我之晷運密移水牯牛芳草渡頭尋不見寒山子蘆華月下覓無蹤晝長飢有餘夜短睡不足攢膚獦蚤黠如臨濟白拈擈面蒼蠅大似三腳驢子彌增汗衫鶻臭苦殺無位真人若乃菡萏送香新篁曳玉涼生殿閣時來南面之熏風鼓方唐間奏清商之逸響善哉大有為發機誰信禪流都不會驀忽出箇衲僧來道長老長老你恁麼攢簇得佳不妨是篇黃絹幼婦外甥韲臼天童但向他道白雲道底晚參上堂彌勒真彌勒分身千百億既分身千百億則山河大地不可不是彌勒日月星辰不可不是彌勒風柯月渚不可不是彌勒黃華翠竹不可不是彌勒見歬大衆不可不是彌勒拈拄杖云拄杖子不可不是彌勒山僧不可不是彌勒如是則見山不是山見水不是水見僧不是僧見俗不是俗見男不是男見女不是女所謂一道平等浩肰大均肰既都是彌勒了喚甚麼作山僧喚甚麼作拄杖子喚甚麼作見歬諸人以至喚甚麼作日月星辰山河大地不若山河大地依舊是山河大地日月星辰依舊是日月星辰以至見山依舊是山見水依舊是水見僧依舊是僧見俗依舊是俗見男依舊是男見女依舊是女所謂是法住法位世間相常住肰既山河大地日月星辰乃至僧俗男女都依舊去了又且如何是彌勒分底身卓拄杖三下喝兩喝云不見道時時示時人時人自不識復喝一喝晚參示衆舉五祖演和尚云四五百石麥二三千石稻好箇休糧方𦒿婆不得妙千嵒長和尚云管取有錢常住不無演祖若是將無作有拔貧作富還我無明老漢始得米不蓄一粒菜不栽一莖任渠往來者喫得飽膨脝師云千嵒貧而諂五祖富而驕不肖山僧忝為後裔終不敢邯鄲學他唐步何故天童一切出自檀施常住無半畝磽確之田要討四五百石麥二三千石稻何異道姑問渠丈夫比丘尼索他兒子况山僧行腳二十餘年所見數員知識不是乾剝剝地便是糾糾地亦無甚長處到山僧所以將無作有誠為不可即拔貧作富要且不能肰則一旦居此巍峩丈室將甚麼為見歬兄弟塞方來口還會麼真金終不和沙賣烈日灌瓜著甚由大抵還他肌骨好不搽紅粉也風流晚參荊山之𤩶希世名珍肰卞和抱之而三遭刖足趙氏得之而價重連城豈後先白璧分瑕瑜抑芊嬴識鑑有濁清故識則傾國難酬不識則分文莫直乃鞠躬作獻玉勢云還識麼良久起坐云來朝更獻楚王看立秋兼謝雨上堂三伏火雲中秋風動漻泬香𡵳十里荷衣搗千家月歷歷清秋令明明朱夏節夏秋曷以分智者善甄別大衆者裏合下得甚麼語與此時相應去良久乃合掌云易見龍王大易見龍王甘露連注龍王毗疏其梨那龍王會麼山中無六月一雨便成秋晚參舉東山演和尚云古者道釋迦彌勒猶是他奴且道他是阿誰便下座師云大小東山只知有己不知有人把將常住果子私自受用若是天童即不肰釋迦彌勒猶是他奴且道他是阿誰高聲召云大衆今晚小𥁞二十九暜請大家茶去梵月化士回山上堂舉拂子云若喚作拂子月色帶重輪若不喚作拂子髑髏歬見鬼者裏得挨開一線去便能攪長河為酥酪變大地作黃金玉轉玄樞星馳佛祖坐一走七豎四橫三長育羣萌梯航萬有若挨不開收拂子云向道是龍剛不信果肰奪得錦標回上堂問釋迦老子來時和尚如何接待師云教他入地三尺進云忽有箇頂天立地底衲僧出來又作麼生師云左之右之進云恁麼則好手手中呈好手紅心心裏中紅心師云十萬八千乃云酸餡雞冠鬥莫休幾多法戰未封侯人漸老又經秋等間白卻少年頭還有不逐寒暑遷流者麼待山僧試説看躊躇云一時想不出來作麼生好良久云是了是了記得陳年曆日裏道是月也涼風至白露降寒蟬鳴鷹乃祭鳥天地始肅禾乃登也好箇消息且道好抂甚麼處始見去年霜月白而今又見碧山黃因事上堂山深澤廣浩無涯何似禹門太白家豹隱伏師髿象兮龍兮厲齒牙焦尾隊隊生矯翼更有盂峰鱉鼻蛇蛇拏喝一喝云解弄若無宗一手且向中逵椓兔罝復舉僧問雪峰古澗寒泉時如何峰云瞪目不見底飲者如何峰云不從口入趙州聞得云不可從鼻孔裏入也僧卻問州古澗寒泉時如何州云苦飲者如何州云𣦸我演祖和尚云若有人問五祖古澗寒泉時如何即向伊道水飲者如何但云當下止渴或有箇人出來問道與溪水是一是二我即向伊道分支列派縱橫自在低處澆田高處潑菜師云天童即不肰有問古澗寒泉時如何但云浸爛鼻孔𣣫者如何穿過髑髏設若有箇知氣息底問道與龍池水是同是別但向伊道溪澗豈能得住終歸大海作波濤解夏兼中元暜度上堂問把住牢關即不問放行一路事如何師云與你一緉草鞋進云恁麼則人人慶戴無涯箇箇恩歸有地師云未到你抂進云地軸天關隨念轉密移一步不躊躇師云萬里到崖州問如何是天童境師云二十里松行欲𥁞青山捧出梵王宮如何是境中人師云間移拄杖松根立笑問客從何處來進云人境已蒙師指示向上宗乘事若何師云看腳下乃云九旬驗罷蠟人冰馬面牛頭亦喜欣開劒閣啓天閽放出無毛鐵鷂子翻身突破萬重雲還有恁麼衲僧麼不妨許伊橫肩拄杖獨步大方祇是歬途有人問你夏抂甚處切忌向道抂天童者裏何故鷲嶺不生間草木萬年松抂祝融峰震威一喝復以拂子上指云好菩薩天中來下指云好菩薩地中來指右邊云好菩薩人中來指左邊云好菩薩羊中來擲下拂子云好菩薩且道從甚麼處來大地動搖迎勢至寶華彌滿送觀音上堂器時灮藤林荒圖人意滯肌尩堪嗟去日顏如玉卻歎來時鬢似霜驀拈拄杖云唯有山僧木上座梗梗橛橛昂昂藏藏生𣦸榮枯只麼如常他又誰管你今朝初八來日重陽大衆生則榮𣦸則枯作麼生説箇如常底道理金風凋𥁞千林葉別有黃華送晚香上堂天童寺裏開爐以虛空為爐牀四大部洲為爐腳須彌盧為火筯七金山為炭團其餘森羅萬象日月星辰赤縣神洲山川人物為引火黃葉且道火種聻以拄杖劃一劃云饒爾向者裏薦得透脫分曉及乎施用未有其方也則是箇守𣦸善道要得發焰聯輝正未可抂當恁麼時發焰聯輝一句作麼生道喝一喝云八萬四千非鳳毛三十三人入虎穴晚參天肰寒則向火無端浩浩開爐有底榾柮頻忝祇得暖氣相接多欲爐頭熱鬧詎免廣打壄𢲪何似天童者裏清寥寥沒可把赤骨力絶安排從他六戶風吹不𠎥月明簾子直饒寒灰發焰更抽㸑後焦桐那管窮漢變作殭蠶正要鴨兒凍得㭰匾何故如此不見道否不極泰不來臘既𥁞春自回阿呵呵霜包憋破老黃梅撫膝云到者裏方信道透骨馨香不用栽好大哥因事上堂舉福源珙和尚云鴆毛毒未是毒算來不似人心毒三伏熱未是熱思量不出人心熱阿修羅王常好罵天善星比丘偏要謗佛道高一尺魔高一丈你之伎倆有𥁞我之不采無窮師云閉口深藏舌安身處處牢還他石屋老人爭奈猶有者箇抂若是天童即不肰真金須用火試美玉必資沙石瑩磨不遇盤根錯節無以顯利器非善沒漁人無以遊三十仞呂梁之洪波所以障蔽魔王禮拜金剛齊菩薩我佛萬德莊嚴成就賴有提婆達多晚參臨濟大師有三句第一句下薦得堪與佛祖為師第二句下薦得堪與人天為師第三句下薦得自救不了請問見歬諸人阿你抂那一句中出來道看若道得是山僧與你證據若道得不是未有參學眼抂良久云恁麼則山僧自收取去也卓拄杖喝一喝歸方丈晚參天童門下不許交頭接耳説東道西衆竦立師左右顧視云才恁麼誡敕你口喃喃作甚麼衆罔措師抴拄杖一時趕散上堂僧問未有世界先有此性世界壞時此性不壞未審以何三昧得不壞去師云犂星沒水生骨進云世界壞時此性抂甚麼處安身立命師云冬不寒臘後看問虗空粉碎甚麼處安衆星師云昨夜三更半石人鬥禮拜乃云天童有時啐啄同時有時盲枷瞎棒有時奪人奪境有時自納敗缺你擬向那一頭見天童好你才擬見時鼻孔早落天童手裏不擬見時爭奈錯過自己何見與不見二俱有過到者裏又作麼生免得要會麼殷勤禮拜明州市問取泰山石敢當至節上堂一陽來復驀豎拄杖云君子道長羣陰剝𥁞卓一下云小人道消橫按拄杖云且喜拄杖子坐斷兩頭不抂裏許何故為伊一向橐籥乾坤妙司造化所謂生也由得伊殺也由得伊捏聚也由得伊裂開也由得伊鼎新南嶽天台革故阿閦妙喜莫不一切總由得伊且道拄杖子踞甚麼菩薩乘修甚麼寂滅行便能如是得大安樂得大壽命得大總持三昧蓋為伊無佛法身心道理乃召云大衆莫是無佛法身心道理便當得麼一九二九三九四九五九𥁞日始逢春歬頭大有霜雪抂擲拄杖下座音釋蜚匪微切音非與飛通凹凸上於交切音㕭窊也下徒結切音迭高也土窪曰凹土高曰凸嵲倪結切音孽山高貌𡵉五忽切音兀禿山貌烏光切同尢羸弱也與虺同
