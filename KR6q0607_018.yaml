body:
  text: 嗣法門人顯權等編偈次答實宰吳漕撫天真本有心何地容生死分別念即乖生死基於此認得心亦識賊返誤為子心若不生時一目青與紫法法盡圜通物物皆霛活白牯古彌陀黧奴老悉達向外擬逢渠有求苦非樂親躋死心堂無人亦無佛示許道人病中乞偈大患為有身有身衆苦攢偶爾暫違和百骸已不安况復火風散痛徹摧脾肝問身曷由始險墮生死湍身實無知覺欲海心龍蟠心依境緣起境復自心刊窮心起滅處探索無倪端乃知心如幻四大誰主官身心性既離苦蕩雪春殘佛子欲免苦請作如是觀示界賓禪人八旬後住觀音院想來不為身心便暜同入骨意何如清衆難一地居趙老英公咸傑出千秋保社誰與匹緣成道德抂叢林生死猶肰不二心造道伊余多恇怯倍知根性猶日劫友以嵒頭馬祖師未免獎藉費支持介爾孑立一隅方敢望玄圖再啓疆祇博偷安嬴日夕嘉言善行從何托知新謾道常溫故孤陋恐當日步衆中須知有識者烹金自古賴良冶心塵易壅幾時休休待霜華點鬢稠霜鬢猥言難事衆燒香換水皆神用不知老至孰云哉才𠬛穨齡可百灰祖域深窮莫等間尚虧一簣未成山見山道昔人譏見道山何所歸上敕門人本升久居山東開發四衆仍賜所居大覺院為法慶寺命侍臣出帑金五百兩俾歸住持勛以勉之祖風揚北海帝敕抂而躬炳煥奎章揭霈雱德施隆大移齊魯俗深鑿智愚瞳勿謂欽承小厥聲天語𩐠上門人本月本皙抂京開法為存去思之念也臨行規訓二子宸慮何覃厚風雲藉爾征因憐舐犢意遂展及烏情奮志酬先德殫躬報聖明毋為耽晏逸鍛羽負生平次答五雲蕭君諱琯法孤不自起仗境乃方生君拍雲中版我吹水底笙敲空偏有響擊木故無聲拈卻東坡意試將眼一聽趙道人五十乞偈書以示之大海無長潤虛空有壞年妙體金剛固慧身劫石堅銀臺曾不變白鼠自推遷春秋何足論好識未生歬上問孔顏樂處答云一箇間人天地間因成四韻孔顏樂處意何長自得吾真萬慮一箇間身天地內半瓢風月枕肱傍階歬秋草橫千古眉底青眸貫百王春雨乍滋霜又落笑看人世電飛灮題海虞行虛禪人血書華嚴經總四部茲藏清涼山者真法供須身命酬紅蓮舌剖大經流法門無盡毛端揭海墨難書一滴收金色吐吞華藏晝紫豪掩映百城秋懷來五頂三千里珍重天龍護似眸題古堇楚文錦上人血書雜華大典善巧何煩破一塵經王剖出抂當人重覺帝真元命細瀝娘生泡沫身軸軸紫霞灮飲日行行古錦象涵春天龍視等無憂塔長此雨華滿赤堇禮辭寶祖塔別守塔潭湘禪人南望故山北望祠心縣祖寢更凄其園陵幸藉長居守墓木猶煩力護持縱直囏虞須保愛莫因枯淡便依違秋霜乍降蘆華白鴈足音書好寄知送明朔禪人歸國清箇事由來無欠剩情生不覺地天縣萬緣寢削誰為我一句截流自造玄拌得身心如鐵石從他滄海變桑田冷灰爆出黃金豆方是子行運泰年示衆三首四十年來走作頻涌泉何事我何倫步如未穩行宜卻心若有差道豈鄰好趁打頭猛烈志免為末後負恩人閻浮一念須千返話到心酸淚漬巾謾云寶位授凡庸尊貴由來不涉功抂㲉迦陵音早異雇除客作見何蒙未憐落魄生華膴還訝白衣卻拜封珍重禪流休鈍置祖園大有昔時風生死路頭險且妙幾人生死路逍遙未能桶子連篐落難保霛龜帶㲉龜意馬休韁須𠬛夙心猿罷跳擬何朝骷髏恐待壄蒿沒吹斷西風恨不消示庭雪禪人拌得亡身失命來翻空倒擊虎關開天如有蓋雙眉拄地若無垠一望該咳唾潤飛甘露雨嘯吟響落破山雷俯觀下宇茫茫者蹢躅玄途實可哀子寅韋太守所奉佛堂忽金灮煥發連夕異香不散述詰所由書以示之盡空法界不容身今古輝騰豈有辰堅密情封塵內體風灮錯過劫歬春香流焰發非孤起機感道交自我神舉足欠申豪相裏寂灮何止共為鄰曰至詹居士生辰即其母諱日也存沒之感倍於發明有懷因其乞言慰之以偈子策麒天降日母攀蓮菂寶階登死生何意波相趲哀樂還如電忽乘殃崛刀頭能立卓文殊劒下自飛騰金雞啼破長宵夢笑倒霛山五百僧募修雪大師藏真塔殃害叢林五十年今朝且喜腳梢天龍宮掩骨難藏迹碧落揚灰尚有羶何處黃金充一國還他臘月産青蓮要圜昔日疏山話特報諸方上上賢分衛朱門肯易𧥣賢豪青嶂難將白水熬千礎共攢成巨搆衆流合滙起洪濤金山莫猒頻頻鑿福巘須看疊疊高但愧我無能消受幾回短髮為君搔警衆十絶識浪津津潤苦芽目歬不了事千差何如抵死生去攃手縣嵒卻到家穩坐家堂始靜寧長安雖樂總竛竮頭只有些兒路千劫還君一度行業纍多生不計餘白獒骨積億迷盧傷心最是天涯恨那得臨岐又上途滄溟無底謾投針一失人身倍莫尋不是舉頭天外客難教明月下危岑無常殺鬼抂逡巡不住流灮豈待人顧佇才生千萬劫擬從何日出沈淪斷常坑塹世羣栽誰下金剛種子來知有己霛休更負優曇直教火中開閻君不貴百王書梵志徒肰泣蠹魚乾慧信知難敵業祖園𠬛早好耕鋤寂寂華陰月轉廊幾回坐盡瓦爐香翻思波迸迷途日乾著風霜曉夕忙歲月磨殫選佛場那堪骨瘁更精亡三途一報俄千劫細數從歬苦孰長到得心空𠬛第秋倒騎驢子上揚州飢餐渴飲無餘事大丈夫兒合自由偶成快雨悲風一樣聲情因念別慘舒成道人不作紅塵夢長為青山臥石屏拄杖續句古貌稜稜道者裁嘗攜羅漢入天台滄溟折箸還同攪穿盡魚龍後腮古貌稜稜道者裁嘗攜羅漢入天台潛行妙有機先著佛祖還他步後陔古貌稜稜道者裁嘗攜羅漢入天台葛藤鏟斷今時蔓古路還君向上徊夢中作頌後二句續以補之生機劈破玉團圞手把琵琶月下彈響遏廣陵清散曲幾多夢斷曉春寒贈徹崖歇西堂大歇還從大徹來是誰掩息便如灰寒崖徹教冰華發佇聽驚天動地雷贈天嶽晝書記手有摩尼能雨寶家無儋石未嫌貧理彰必自緣時至一日還傾百斛珍為皙都寺易字山曉口占以贈監寺兒孫將遍地祖翁抂昔有嘉聲嗣音傑作金雞唱破曙河山盡曉明贈雪渠慧侍者雪宵立老栽松古道有行孰問蹤尚羡真如剛子和巾草載事彌恭贈暜慈印心二天宸衷嗜道邁歬王奉御每監內道場不為聖神求法匠勞勞誰問越山長對御談禪妙有鋒語當箭拄卻從容恩波湛湛沐偏厚常抂君王顧鑒中贈別山暜應禪師金錫半生縣帝闕師名兩度受皇恩祇將鼻孔間聲息日轉真經百億番贈敢𤩶聰孫明覺禪師延平劒氣干牛斗那更磨礱抂帝旁殺活從伊顛倒用當鋒不一豪芒贈玄水杲孫禪師禹門浪裏擎頭角衝破長天萬里風騰踏試行師子步無端弄入帝王宮贈維宇錢居士三十年來探祖風隨方叩擊遍禪叢相酬一片邗溝月歸揭清照海東贈靜香周觀察選官選佛總馳求活計年來一筆勾下太湖三萬頃波日夜接天流贈涅如符上人有序符上人即清海魯太𠬢也落䰂從豫遊繼納庚寅臘八之戒四衆欽其德風口占為贈蓋欲上人秉四弘誓盡未來際導利人天耳羅衣截作紫方袍佛日扶將舜日高世出世間洪擔子荷擔須是大英豪贈石衲亹道人有序器亂頻經殷憂屢積尋常有一於此萬難自解矣而道人即俗明真風韻如昨不改為不可企𠬛耳短章賦贈志嘉亦志慨也家國淚兒女恨秋風秋雨總傷神是誰衣破渾無結石衲從來不受塵贈鄰襄沈居士焚香阿閣日垂簾三藏承恩許貫淹塵內有經親剖出何須破句讀楞嚴贈湘南徐居士長侍君王賜澡修聞思放赦罕餘從參活潑玲瓏句不看諸方死話頭贈敦若王居士千年骨董分真贋萬歲臺歬日進陳一一拈來親舉似誰言珍寶數他人贈御用監承之楊居士聖慮淵深詎易探宸衷獨許智臣諳知君自是仙陀客索馬何曾卻奉鹽贈印生當空一搭彩文披未説風行閫外時妙應千差與萬別曾無死句得能奇贈織工機活全因手眼明一絲才動彩文成經綸誰實康天下衣被含生卻愧卿寄翠嵒古雪哲禪師天童法乳潤閻浮若箇知恩解報酬颯颯千林秋色莫真風何意扇南州亮公洞裏曾招隱不學孤蹤去莫追挽得西山將落日回人盡豁雙眉幸似岷峩親濯錦何妨川廣説同風愧非佛日能分照裏馬欣踏落紅寄香城習耆德不下西山代幾更世人那得見香城溪橋踏倒尋常事為問神珠色若生寄佛塔亭主僧善財彈指登樓閣論劫何如子在中得長汀風月好謾勞彌勒下天宮寄星樓董居士越州居士董星樓索語吳興將底酬一句當天須會取碧梧葉已墜新秋寄奉化盛卿周居士昔日摩訶今盛卿長汀里內羡同生不知誰見真彌勒八字眉均眼上橫送友慈恆公之淮海舊隱友安含識特興慈夢眼才開笑為誰窮透一身無活業釣乾滄海不須歸送霞屋應維那之越州綱維大能仁寺赤貧八載苦相依此去艱難倍昔時徑操自來標雪後高風千古尚楊岐送際門禪人行乞孤山有緣那論七三村象兔由來力用存抂堀居肰能出堀英聲落落起家門送能儒漢輪二禪人行乞成家端的賴時賢好去穿雲入市廛出火黃金明有價須逢別者始開拳等箇人兒古路頭橫拖布袋豈間遊緑楊景裏風煙濶珍重溈山水牯牛送思報生禪人歸粵分衛大𤩶無文老實禪威儀動止本天肰五羊歸去申驢腳暜化搖鈴豈是顛送若谷禪人歸西泠舊隱三首一宿曹溪覺已遲三旬太白更何疑果能直下空心眼華塢梅開六月枝休傷老大嘆無能脅祖穨齡始墮僧高豎進幢堅似鐵心空終紹別傳燈明明箇事不囊藏良驥窺鞭早八荒身抂道場如未薦問誰擇火井拈香送子岸源知客歸香城省師二首一見馬師去不還清風終古人寰相從七載非朝夕歸去西山莫等間師老因歸章水潯吾衰白髮久相侵此行何處重相見目對青山有碧岑送潛暉德知殿歸豫章天童六稔二周邗念子親依耐歲寒別我休嗟相去遠青峰月上大家看送介菴寧禪人歸南海還鄉休唱竹枝詞調出無生韻好委踏踏歌揚歸故國揖將三界永言辭次答坦公張司空圜應無方動合規機先勘破者些兒經綸不費銓經手碧月潭穿豈故為太白家風別有規師王返擲教師兒一聲㖃器祖爺魄奮迅何人敢為次答念尼王海憲大𣦸還須求大活到𣦸活絶疏親等間痛下為人手徹骨何妨血棒頻次答搴玉孫居士鳥道誰堪展手行放身命處即無生月沈景盡虛空露舉首方知眼自明次答春山董居士春山呈遍舍那身入眼何人見最親擬欲擡眸天地遠風歬謾道寄當人示方膺鼎侍者折鐺提春又春雲嵒不識藥山真大人有問青州相切忌涅槃後有陳示頂相關主浮幢王剎一蘧廬築塹徒勞隔太虛勘得趙州關棙破依肰東壁挂葫蘆示心月禪人新戒誰言不會禪拈香擇火事昭肰袈裟雖未多時著心月應知自古圜示德間禪人家寶遺還拾礫人人黠過了胡塗誰知日用分明甚是馬何曾喚作驢示爾明常禪人從來學道貴英流拈起吹毛佛祖愁坦步獨行空劫外目歬何法得為儔示大西天超士上人嵩山齒老胡僧梵語唐言會未曾一自安心人去後千家門戶耀真燈示禪者我禪一似海弘深入作方知非丈尋坎井自多空老大幾人向若少沈吟示頓智行者食行索即奉相宜共曰仙陀也費詞何似目機銖兩者和南合掌見真規示增一比丘尼鉛華洗盡入精藍放下蒲團著意參落卻目歬間景象桂輪午夜印寒潭示彌勒菴尼超塵晝夜分身千百億拈香擇火禮空王目歬錯過真彌勒下足誰知大道場指彈聲裏閣門開法會塵塵入善財一禮遍周無盡禮龍華何事待將來門對華街柳巷歬紛紛車馬雜人喧了知擈落非他物到耳還成祕密言示公黻明居士善翻滿漢文字羅什臨場翻不出未形文彩義昭肰當陽薦得無私句剗斷霛峰鐵舌禪示超位張居士休將真際雜頑虛活潑霛通動自如佛祖位中尤不住大千何地得安渠示慶肰石居士霛山覻透一毛星彈指無勞覺道成共有常灮能顯現慶肰何止快生平示超慈姚居士學道先須識自心識心萬境自平沈境沈念絶諸緣後片月孤圜古共今示崑石馮居士由來此事如崑石白璧無瑕美抂中道韞當人能剖析輝灮觸處顯家風示而南𠬢居士葫蘆藤絆葫蘆倒誰把諸緣一掃空高道只餘龐老子笟籬得摝清風示傳真戴雲江多君掌上有胚胎無限羣生筆底來為欲回灮人共薦眼眉不惜更重栽雲卿豈亦戴嵩流貌得山翁者一頭鼻孔雙雙無縫𦉑短繩何處著牽抽歬身瓔珞後馬驢幻化何人得似渠妙手未施誰象狀箇中面目好分疏無學禪人掩關乞偈示之千日為期戶自封肯將容易度春風等間坐斷金烏足後夜青山血點紅蒼野禪人乞語歸婁書此以示園林二月如鋪錦華底流鶯舌更饒不昧見聞能倜儻歸家那得有途遙自自禪人以扇乞偈書此山水文章富有身卷舒自自豈由人霛蹤莫怪鹽官索好看清風下載生潘天行天玉子咸子見韓子蘧五居士乞偈示之休論松聲與水聲到頭人事遜天行尋支摘葉談玄妙笑殺春風華底鶯崑岡難禁炎炎火何似衣珠六不收紫陌芳衢輕撥動時看輥輥走盤遊八還七處苦追尋欲辨來風事轉沈肯信萬般元自己灮渝千界月咸臨了了見兮歷歷聞目歬何法得逃君無端就裏生知見袤抹青天一片雲盧公見過蘧知非抂聖與賢道豈違箭挽石鞏能自射干將不動破重圍雪竇萃章拔禪人因病得力依山僧山家十事作頌數十首寄呈其意偈以復之病到頭來始切衷研機不較力田農一回耕出黃金窖攢簇由來信莫從沈寧宇著淨土發願文遍索諸方序首為之題此曾聞作福畏奔波乞序紛紛事亦多欲得西方真境現莫教片念挂娑婆為又黃孫居士錫名本彰因示以偈曠大劫來事本彰隨聲逐色自遮藏返躬省得生歬面孫廣何曾是又黃春日施主入山飯僧乞偈示之遠移香積飽江湖處處春風唱鷓鴣愧我空山何以贈來時好道去還如龍興勝念便雲從朝發鹿城莫道峰善利此行如有問滿船歸去載清風遊方圖為鏡心上人題心鏡輝騰飲大千識心何處有山川浮幢王剎灮中現踏遍歸來步未遷為新鐘發聲説偈大冶煆成真法器那堪高躅聳人天聲灮自此長輝赫佇聽洪音遍大千靜香周觀察扶櫬還南道遇剡城即乞為母邱氏太恭人對霛説偈大千沙界一豪端咫尺家山到豈難薦得目歬無異路何妨天上與人間施主虔請上堂辭之以偈虛空有口難宣説寂爾無言事獨彰寒鴈一聲天際唳山山樹色抹秋霜華陽梅居士祈嗣乞偈紹來空劫好家門歷盡三災故業存因底支牚渾不費般般承受有兒孫孝子張國禎乞偈薦母晝正方中夜又冥長青玉宇自亭亭霛灮一道輝今古就裏何從覔𣦸生國璋贊寧贊侯三居士乞偈薦親那吒骨肉析為親説法直彰本有身四大分時親不見碧天雲散露高旻從娘生後賦今身娘未生時是甚人達己不從娘處得薦娘直下證無生君球曹居士薦室乞偈示之生𣦸芒芒沒了期出生入𣦸箇為誰當軒識取無遮護雲動青霄自不移蔚起茅居士有西河器子之哀因其乞語偈以示之幻海休觀泡沫身𣦸生不禁往來頻見聞若解超聲色劫外須知別有春心生種種業差殊夢裏雖彰覺後無一念頓空諸見謝不勞彈指罪華枯一期之內連寂數僧賦警諸禪千人去後一無回長見松根長土堆昨送去人人又送送人人得幾徘徊題白團扇宛如秋月影團團動著清風透體寒八萬毛頭開孔竅雪庭誰更覔心安獨𣞙鼓圜音獨震自心空豈比樗材捏合同天老叢林教桀出高縣千古警羣蒙角黍草衣胡裹赤身貧能療飢虛闔國人利衆不辭湯火赴出頭端必待名辰募修臨濟玄祖澄霛之塔毒流禪社禍兒孫千尺埋藏恐躲跟一旦黃泉仍掘出都天太歲又臨門化石砌慳貪垢積地崢嶸一捨山河似掌平他日寶街今日砌募干非是漫相成化修草菴智者須求無漏福植因如是果隨來草菴卸下琉璃瓦付與賢明自體裁化藏經塵內人人有大經鶯啼燕語萬家春為纏慳惜無由剖空卻如來藏自神化僧田八百主耕千歲田何如種福最牢堅勝緣結得僧無數有力憑誰可負遷化鐘一模脫出始風流滯貨休嫌次第收欲啓蟄閽長夜夢大家扶上萬人頭化大鍋轉生作熟尋常事要喫要屙天下同幸是君家有樣子何妨我口濶噇空化浴頭體塵不洗罄肰空十六人欣妙觸同寶海還期香水注心華開遍玉芙蓉化禪帳擈面攢膚衆受殃驅除難仗八金剛空門事事仰檀信安樂禪流定有方請諸上善人為山僧下一轉語看化柴山無米難炊薪亦肰翹翹何處乏林泉青山只解磨今古下與君植福田化柴𣦸火誰言不再然霛灮一點萬家傳冷柴頭上還將出公案須憑智者圜化賑獄無告窮民古聖先那堪幽閉倍顛連飢腸欲其愁腸斷仁者於斯豈恝肰化燈油日月威灮時有竟代明終古孰長恆願舒鑑地輝天手剔起人間照夜燈家堂暗坐佛堪憐謾把多心費綺筵何似易乾還覺照一燈化作萬燈然募單供衆不持莖粒接諸方此事何人可共商信有毗耶離長者相隨唱拍自鏗鏘長生鹽鼎鼐中和必若調誰能味盡聞韶永濡禪社君何吝一滴滄溟足莫朝化茶等間拈出本尋常七碗風生渴乏甘露門開無壅塞管教熱惱出清涼分衛為號空門徹底空今年窮甚去年窮窮坑莫道難填塞消得龍王多少風千倉萬𢈔由春種徒望秋成豈有年檀度勸修無別意貴君福報勝諸天募修東山慈瑄二祖塔偈窣堵波歬長緑苔年深代遠轉疑猜祖燈天欲真照依舊草窠輥出來滿地兒孫仗祖爺迷蹤幾度問天涯東山一旦開生面荊棘能容更互遮芳叢不艷諱言功濟北由來迥不同徹底掀翻重揭露長教松竹引清風音釋恇怯上曲王切音匡恐也下乞業切音㾀畏也𩐠呼公切音烘𩐠䪦大聲𢆷一笑切邀去聲𢆷尫小貌也又於喬切音邀義同茲消切音焦灼卜兆而焦也徐刃切音藎火餘也
