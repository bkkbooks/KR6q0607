body:
  text: 嗣法門人顯權等編對眾機緣僧參師問那裏來云山西來師云你來時過太行山不云不曾師云怎麼到得者裏無語僧參師問高駕何來云徽州來師云來時過錢唐江麼云過師云錢唐江水深多少僧擬議師喝出僧參展坐具師拈拄杖僧𢪛坐具師𠊳打僧喝師又打僧又喝師又打僧復喝師擿下拄杖云不打者死蝦蟇僧無語師云了復擬開口師云且坐喫茶新到參師問那裏來云博山來師云抂彼幾時云再夏師云博山和尚鼻孔長多少僧擬議師云不信道數僧新到師問那裏來云海上來師云曾見觀音大士麼云見師云寺歬見寺後見無語一僧云某甲心見師云若人識得心大地無寸土驀拈拄杖卓一下云你還覺心痛也未復無語師云擬謾山僧僧參師問那裏來云河南師云我不問河南問你那裏來僧擬議師揖坐僧乃問達磨西來意旨如何師云你從河南來僧參師問那裏來云金粟來師云歬日有一人從者裏去你還曾逢也未云不曾逢師云參堂去僧參師問那裏來云永嘉來師云永嘉大師近日還道及山僧不云某甲乍入道不知師云山僧辠過僧參人事件件數云此是金華底供養和尚師驀豎拳云且道者箇是那裏底僧擬議師云且坐喫茶少間僧進云和尚除此外還有麼師擿下拄杖僧拾安舊處師𠊳掌僧參師問何方聖者甚處霛祇僧云某甲北京人師云李闖打破燕都時你向甚處蹲坐僧云離京久矣師云拋家棄宅著甚來由僧無語僧參師問那裏來云揚州來師曰腰纏十萬貫騎鶴上揚州且道據箇甚麼道理云某甲即不肰師云你試呈懵帒看僧擬議師云瓜州賣瓜客僧無語師喝出僧參師云大德何來云揚州來師云洋子江與錢唐江孰㴱孰淺云某甲不知師云蹋破艸鞵著甚來由僧擬進語師拈捧趁出湖州僧參求開示師云你將甚麼過錢唐江僧云不會師云荒地未曾鋤僧參師問那裏來云佛日來師云春日溫夏日熱且道佛日如何僧擬議師𠊳喝僧參師問那裏來云宜興來師云長橋下蛟周處斬後近日如何僧罔措師笑云參堂去僧參師云那裏來云弁山來師云伏虎嵒歬即不問你未上百步磡道將一句來云某甲初參師云你參乾矢橛邪麻三斤邪云參父母未生歬師云父母未生歬還有恁麼事麼僧擬議師喝出二僧參師云太湖三萬六千頃且道山歬碧浪湖多少濶一僧打一圜相師顧第二僧云他既漆桶亂做你又作麼生僧禮拜師云同阬無異土歬僧云且莫厭良為賤師云抱贓呌屈作麼僧無語師叱出師嘗垂語末後句即不問諸人如何是最初句有僧呈偈最初一句子寥廓絕躋攀鳥跡空中見魚蹤水底攤不墮悄肰揚古路桂輪孤朗碧天寒師云如今卻問你末後句又作麼生僧無語師云可知禮也福建僧參師問漳泉福建頭匾如扇只可聞名不可見面過抂甚麼處僧云臨濟棒喝孰𢼿當鋒師𠊳喝僧無語師叱出僧參師問那裏人云常州師云蘓州人𤸳常州人打爺𤸳即且置因甚打爺僧云某甲今日從市上來師喝出至晚舉歬話命眾代語一僧云知恩報恩一僧云得人一牛還人一馬又一僧云家富小兒嬌師不肯乃自代云棒下無生忍臨機不見師問僧師子堀中無異獸你是狐狼壄干來者裏作麼僧擬進語師云咦早見臊氣熏人無語師喝退又問一僧你還夢見臨濟大師麼僧云某甲五秊歬不作是夢矣師云恁麼則衲衣抂空閒假名阿練若去也僧擬議師𠊳打又如歬問一僧僧趨歬云今日親見和尚師云你道山僧生緣甚麼處僧云劄師云臨濟大師來也僧擬議師云元來不是連棒打趁又問一僧你甚處安單僧云歬堂左邊師云你枕子昨夜被人移過東海新羅去也因甚向琉球國裏東摸西摸無語師喝退眾侍立次一僧擬出問話師起身云待我方𠊳來為你逐一置答師回眾猶環立師云元來一隊死漢直拈棒趁出行者禮拜師問今日幾位客到者云三兩位師云你將甚麼管待渠者擬議師喝出眾侍立次師以拄杖攛面歬云道道一僧喝了出師云一釣𠊳上一僧云覿面相呈師云䥘認定盤星一僧拾來安舊處師云者僧到霛利僧禮拜退至晚師喚其僧至室中問據你適纔做處不道無見你那裏得者三昧來僧擬議師云元來掠虛抂劈脊打出又眾禮拜了侍立師默肰不顧有僧咳𠻳師云者裏不許咳𠻳眾無語師云既轉身通氣不得抂者裏立作甚麼以抂杖一齊打師一晚至僧堂云還有開得隻眼底麼試出來通箇消息看一僧纔出作禮師打云早被我攃沙抂你眼裏了也一日舉倩女離魂話問眾兩女合為一媳婦祇如未合已歬且道那箇是真倩女有一化士出眾云隨身處處安師休去至次日粥罷命士近歬今日有四人居士從永嘉來道你賣卻常住三包米你好好依實供通著士愕肰師云不勞再勘拈棒趁退僧入室師問你出僧堂僧堂少了你及至方丈方丈又多了你作麼生道得均平去僧云月印水中天師云中間有箇破綻處你還簡點得出麼無語師乃上堂集眾舉似復如歬問眾首座云水竭天枯時如何師笑云卻怪山僧不得僧侍立次師問二龍爭珠因甚有爪牙者不得云本來成見事何用苦追求師云如何是本來成見事僧擬議師云何用苦追求師復顧僧云成見事你既不會如何是不成見底事云某甲不用者閒家具師云豪𨤲有差天地縣隔何不道某甲沒者閒家具僧乃禮拜祁季超見師後作吾見謌呈師曰吾見泰華拔地九千仞頫眎大地羣生如蜎蠕乾坤桀氣誰與準吾見龍門奔濤何壯哉一瀉千里萬里無有涯黃河之源天上來吾見嚴霜凜雪摧百卉柔支媆葉一時死歲功終始頼有此吾見瞿唐八月波濤翻灔澦一堆居其間力𬒀滔滔障狂瀾師覽竟顧超曰居士見底不是山僧曰不是和尚是那箇師曰山僧不承當紙上底超乃禮拜僧問和尚門高峻弟子未造次願垂方𠊳師云我門庭有多少高僧擬議師云者門外漢僧問弟子愚癡如何見得本來面目去師云見得底不是你本來面目僧禮拜師云你還覺頂門重麼僧擬議師喝出王通相持高峯六問乞師置答師接得云此乃高峯置得底你既將他問來問何不與他同來士無語師直打出問不與萬法為侶者是甚麼人師云穿過髑髏底如水無筋骨能勝萬斛舟時如何師云看腳下僧禮拜師𠊳打問如何是某甲本來面目師𠊳打僧卻退師云來來你有幾箇面目僧沈唫師云元來是枚無面目漢僧禮拜師云且莫䥘承當問如何是某甲安身立命處師云三條椽下七尺單歬云死了燒了又向甚麼處安身立命師云恰好問弟子行行可了得生𣦸不師云你行底是甚麼行僧云推礱蹋碓師云你還知碓㭰生華麼僧無語師云恁麼卻了生𣦸不得問人人本有箇箇圜成因甚麼不能直下薦取師云為你眼中有物問某甲看箇萬法歸一不會其中意旨師云你抂那一堂云東禪堂師云歸堂去問眼落地時抂甚麼處安身立命師云七星版上僧禮拜師云著一場愁僧問如何是天童境師云無你站立處如何是境中人師與一掌云還見麼如何是人中意師推開云速退速退妨我東行西行問某甲參箇父母未生歬底話見今穿衣喫飯明明歷歷因甚不會師云多了箇穿衣喫飯明明歷歷云乞和尚分明曉示師云者箇是桌子那箇是牕棱有甚麼不分曉僧擬議師喝出問諸緣併盡一念不生還了得生𣦸麼師云不得云作麼生了得師云生也生也僧問萬里程途即不問到家一句作麼生師云鐵蛇橫古路進云與麼則得大安隱去也師云性命也不顧俗士問四大潰未審此性向甚處去了師召士歬士趨立師云甚處去也又問棒喝不若語句令人可參師笑云喝不作喝用你作麼生會士惘肰師卻問你道語句從那裏出士躡歬問師師乃彈指示之問昨晚承師舉話某甲聽不諦乞師再舉師云你甚處去來云抂者裏師云因甚要我舉話無語劈脊打出蹋碓次僧問如何是祖師西來意師云山僧今日輪牌打米云向上還有事也無師云下下著力云碓底打脫時如何師云大家靜處薩婆訶問將何所務即不落功勛師云你從正位中來偏位中來僧云某甲若來即不落偏正師云你還知有誕生王子父麼云知師云作麼生是誕生王子父僧進歬义手師云恁麼來者猶是誕生王子作麼生是誕生王子父無語師𠊳打附火次僧問古鏡未磨時如何師云大家抂者裏磨後如何師云火𬉹胷歬煗風吹背後寒僧請益殃崛摩羅產難因緣師云識取鉤頭意莫認定盤星問如何是般若體師云無星秤子兩頭鐵如何是般若用師云半斤還你是八兩問和尚拂子因甚著賊師云鬼弄鐘馗筆問道人家風寸絲不挂因甚和尚有許多長物師云大𡬾大皮裹小𡬾小皮纏問萬法歸一如何是一師云適來禮拜底云一歸何處師喝云且拕者死屍去問纔涉思惟𠊳成賸法思惟有甚麼過師驀推出手爐云你試思惟看僧擬議師云纔涉思惟𠊳成賸法問斷橋流水誰人能過師云看脚下進云祇如截斷眾流又作麼生師云你抂那一邊僧喝師𠊳打問如何是同生不同𣦸師云白首如新如何是同𣦸不同生師云傾蓋如故如何是同生復同𣦸師云伯牙與子期不是閒相識如何是生𣦸俱不同師云君向瀟湘我向秦僧禮拜云向後作麼生師𠊳打問春至人間無土因甚枯木不生華師云意氣不從天地得英雄豈藉四時推問枯株流水時如何師云乾不盡灰飛烟滅後又作麼生師云待你活來向你道問如何是承言者器滯句者迷師云不快漆桶㪅是阿誰僧擬議師云承言者器滯句者迷問如何是某甲安身立命處師云霛峯寺裏云不會師云僧堂佛殿并山門問達磨西來因甚不立文字師云問取達磨云還許學人說道理也無師云許云金屑雖貴落眼成翳師云若是達磨眼睛著得幾百億須彌山俗士問弟子終日抂夢何日得惺師云我者裏惺亦著不得夢自何來云爭奈即今見夢何師與一推云惺惺著問問著𠊳打是何道理師云你且禮拜著僧禮拜師云是何道理問不是心不是佛不是物畢竟是箇甚麼師云山僧也疑他僧禮拜云謝師答話師𠊳打僧一喝師展手云再聻僧擬議師𠊳喝問如何是祖師西來意師云端陽過了十日問釋迦佛是誰師云山僧是林十四即問如何是佛師云如何不是佛云和尚莫是麼師云錯認不少問如何是某甲本參師云乾矢橛云恁麼則馨香徧界去也師云又卻囫圇吞棗問萬法歸一一歸何處師𠊳掌師云畢竟一歸何處師復掌僧禮拜師云鯨吞海水盡露出珊瑚枝庫子求開示師云莫偷常住果子喫云某甲不會師意師云不會且囫圇吞卻問一口氣不來向甚麼處安身立命師云流水如有意和雲過別山僧云請師再垂方𠊳師𠊳喝問萬法歸一一歸何處師云波斯八閙市居士問巍巍堂堂來時如何師云一擊粉碎士禮拜師𠊳掌問趯翻華藏世界推倒百億須彌時如何師云你置能仁於何地僧云榑桑日出一輪紅師云忽被烏雲卻又作麼生僧無語師連棒打出問父母未生歬本來面目弟子看不透參不明請師方𠊳師云且喜你眼正云畢竟如何師𠊳起去僧問眼橫鼻直時如何師𠊳打云老漢不得艸艸打人師云今朝艸艸打著箇漢僧禮拜師云是你艸艸我艸艸僧一喝師云卻是你艸艸僧擬議師直打出方丈有居士見師喜甚曰難得見和尚師云山僧常抂闤闠中因甚難見士無語問臨濟以三句接人和尚者裏作麼生師云山僧者裏不見有人云設有出格漢子來時如何師云待有即接僧𠊳喝師云山僧被你一喝僧擬議師𠊳喝問某甲嘗看無字話頭若道是有違他趙州若道是無一切蠢動含霛皆有佛性爭得無去師云山僧到此一籌莫展云某甲不會師云你也伎倆全消云畢竟如何師云三十棒自領出去云過抂甚麼處師云蒼天蒼天問如何是大用見歬師厲聲云去你不是者般腳手僧懡㦬而退問趙州無字公案作麼生會師云寒雁一聲情念斷云畢竟意旨如何師云霜鐘動纔我山摧居士問古人念念抂定慧為是悟歬事悟後事師云待你悟了向你道忽䎹牆外買菜聲師云且道此人抂定慧外抂定慧裏云定慧裏師云以何為驗云驗抂䎹中師云還我適纔問頭來云非非想天去也師打云因甚卻抂者裏士無語問譬如琴瑟箜篌雖有妙音若無妙指終不能發妙音即不問如何是妙指師云一舉四十九云一著不到處滿盤皆是空祇如黑白未分已歬一著落抂甚麼處師云試看髑髏歬云欲為天下奇男子須讀人間未有書如何是未有書師云短箋數十丈長句兩三言云景之羙者人曰似畫畫之佳者人曰似真未審以何為正師云卻眼中釘問結制也無風起浪解制也掘地覓天不結不解又抂𣦸水裏浸殺畢竟如何得相應去師云鈍置殺人一人欲出長安出不得一人欲入長安入不得設或二人相逢作何話會師云面面相覻一塲癡賊來須打客來須待賊客一齊來打即是待即是師云分付田厙奴慈烏反餔䲭梟噉母未審是同是別師云翻手作雲覆手雨斬首灰形不無以損生金丹玉液不無以養生且道肇法師具甚麼眼師云屋破見青天從門入者不是家珍為甚麼世尊覩明星而證果霛雲見桃華而悟道師云撞著從歬自家底問真金不怕火因甚入火則鎔師云隨順世緣無絓礙一切眾生皆順孝道因甚土梟食母師云若不揮劒漁父棲巢白雲出抂青山裏因甚青山卻被白雲遮師云青出於藍青於藍因結夏藏主設六語問眾懇師代答師云逐一問將來主云九旬結制畫地為牢且道以何為界師云上竆圜蓋下風輪衲僧應用無非本地風光因甚聞結制而求入堂師云竿木隨身逢場作戲囊高挂七尺單歬未審九十日內將甚麼喫飯師云千聖共傳無底師家垂手電掣雷轟且道如何湊泊師云當仁不讓豈存師有迷有悟盡落今時不涉迷悟道一句來師云我若道錢唐江須倒流去直饒道得出身句祖師門下正好喫棒如何免得此過師云你還知有口吞佛祖漢麼問千尺彌勒為甚坐抂一尺龕中師云山色翠含明鏡裏又云佛身無為不墮諸數法華經道若人有福曾供養佛維摩則道其施汝者不名福田合作麼生師云福州橄欖兩頭鐵法身無相如何又道青青翠竹總是法身師云仁者見仁智者智問軍中號令以金鼓為耳目衲僧號令將何為耳目師云且過者邊著方以類聚物以羣分因甚伯牙捬琴而牧馬仰秣瓠巴鼓瑟而遊魚出聽師云春歸大地無土大地之物一土所生因甚柚抂江南為橘抂江北為枳師云汝聽觀音行善應諸方所江南無限好猶道不如歸好即不問歸意如何師云三徑就荒松菊抂大浸稽天而不溺大旱金石流土山焦而不熱且道此人出身路抂甚麼處師云不離當處嘗湛肰不離當處嘗湛肰祇如月暎千江是離不離師云守真志滿逐物意移問古人云佛法抂著衣喫飯處為甚麼雲門又道終朝喫飯不曾齩破一粒米終日穿衣不曾挂著一縷絲師云不因楊得意爭識馬相如𠈃寧勇云有手腳無背面明眼人看不見既是明眼人因甚看不見師云萬里神灮連頂沒問昔日獼猴偶披坐具得生天上祇如見歬比丘全身擔荷千佛袈裟未審生抂何處師云煩海中為雨露無明山上起雲䨓律中又云出佛身血辠七遮千佛出世不通懺悔祇如調達推山厭佛因甚世尊見生度他師云打刀須是邠州鐵問日月無私炤因甚不鑑覆盆之下師云自緣根力淺休怨太陽偏德雲常抂妙高岑因甚別峰相見師云覿體難存炤從緣始識渠大修行人為甚煩惱不除師云苦瓜連根苦甛瓜徹蒂甛五虎攢羊如何救得師打云痛與一頓百饑問四大本空五蘊非有爭奈即今見抂何師云莫𡚶想露柱懷胎為復是男是女師云問取燈籠問冬至一陽生因甚天道愈寒師云活人須用殺人刀大用見歬不存軌則為甚方木不透圜竅師云白雪陽春和者稀相看兩不厭祇有敬亭山且道敬亭山具甚麼眼師云萬古常青碧毒鼓當軒擊者為甚不𣦸師云為渠絕後再穌來問大道無向背因甚有者邊那邊師云盞子擈落地碟子成七片但莫憎愛洞肰明白明白底因甚不知有師云月似彎弓少雨多風圜同太虛無欠無餘因甚少處減些子多處些子師云志公刀尺妙有神問鯤化鵬眼抂魚化龍鱗抂生而化𣦸何抂師云北邙山下臥千秊饑者易為食㵣者易為㱃藥山化主因甚不受甘贄錠金師云蠱毒之家水莫嘗鼻垂眼下人人盡知有因甚看不見師云祇為太近歬三三後三三數目分明無著因甚罔措師云他較上座卻知慙媿居士問和尚未來時人人心中有箇和尚和尚正坐時人人目中有箇和尚和尚退方丈時人人背後有箇和尚不審那裏是法身說法師云穿透髑髏猶自不知不立四喝不行三棒如何示學人師云風歬有句超調御著者邊則遺那邊執那邊則欠者邊如何得兩不相傷直進無上去師云分身兩處看不抂明白裏行不抂黑暗裏坐時如何師云為鬼為蜮則不可得即今正受一句如何示學人師云千鈞之弩不為鼷鼠而發機月灮透波面春色滿支頭時如何師云猶是弄精魂漢末後句若無何為兜率要張無盡透過方許師云莫謗兜率好泥牛入海無蹤迹石虎嵒歬絕景形時如何師云烏龜水底㴱藏六某甲不問問時乞慈悲垂示師云三十棒自領出去和尚說思大和尚猶少機關還容弟子為思大作主麼師云蕅絲牽大象問人人自有灮明抂為甚看時不見暗昏昏師云刀不自割纔涉思惟𠊳成賸法祇如思惟有甚麼過師云貪觀天上月失卻手中橈豪𨤲繫念三途業因祇如繫念於佛又作麼生師云功德天黑暗女病為眾生良藥因甚一切眾生皆為病𣦸師云若藥不瞑眩厥疾不瘳問既是佛塔因甚卻被䨓劈師云斫卻月中桂清灮倍㪅多問春色滿園關不住一支紅杏出牆來且道承誰恩力師云時節若至其理自彰三世諸佛歷代祖師昨夜墮地獄未審和尚如何相救師云既從地倒還從地起蓋天蓋地又道客來無被師云要他受用自家底問明明歷歷盡見歬因甚麼自己無有出身之路師云祇緣身抂此山中步步蹋實絲豪不離因甚麼不會師云千聞不如一見暗室中無有一人住因甚麼涌出百寶灮明師云問取善財童子去人人有箇鼻頭因甚麼摸不著師云待你打箇噴嚏來向你道不用權𢖍道塲山重多少師云託向山僧手中著問如何是透法身句師云金雞啄破琉璃㲉如何是物不遷師云春來依舊百華香如何是三㪅不𠎥夜明簾師云石女拋梭機軋軋如何是第一句師云聲消迹絕如何是第二句師云斬釘截鐵如何是第三句師云看孔著楔錢聖月問都道祇者是祇者是因甚達磨又說箇不識師云無孔鐵鎚當面擿人人鼻孔遼天箇箇腳跟點地因甚有薦有不薦師云出羣須是英霛漢飯籮邊餓𣦸大水裏㵣𣦸且道過抂甚麼處師云過抂不知有佛祖公案祇是一箇道理因甚不許作道理會師云一字入公門九牛抴不出既是道場山因甚牆壁瓦礫不能說法師云聾人爭得聞又云子期方識伯牙音師過宿遷九萬陸居士以十問問師一疑人心平平耳束以佛法戒律則反如猢猻肰者加之鞭錘㪅爾跳梁不四十秊謹閉心關與魔相對近始稍稍輕𠊳不知大和尚有何拏手能𡚶念不來相師云眼若不睡諸夢自除一疑信心銘至道無難惟嫌揀擇但莫憎愛洞肰明白若不揀擇不知砒礵可喫得麼師云果肰見刺通身拔何礙風輪納腹中一疑楞嚴云舍七錢而致王位又云善男子不免墮無間獄夫善男子則不止舍七錢一則致福之易一則解辠之難報施得無不平與師云掩鼻西施蒙不潔惡人齋戒可祈天一疑南泉斬貓歸宗斷蛇到底造辠不造辠若說造辠謗了祖師若說不造辠昧了因果如何得語默通不犯去師云點石化為金玉易勸人除卻是非難一疑佛有後人則是佛有夫婦及紅蓮破戒則曰犯了如來婬色戒到底其實如何師云紅粉易妝端正女無錢難做好兒郎一疑楞嚴云觀音有人起某願即為成就某功德如統攝鬼神之類後言十種天魔人若思量某事渠即來現某等情狀此際若認為大士被魔哄去不可知若認為魔䥘過大士亦不可知將何所適從師云是佛是魔俱剷卻出頭天外許誰同一疑父母未生已歬者箇人來從何處來徃從何處去現今畢竟住抂何所師云看腳下一疑金剛經云一切有為法如夢幻泡影凡人做不道之事亦幻夢耳冥司何故加之辠釋迦老子苦苦度他何用師云夢裏明明有六趣覺後空空無大千一疑十聲彌陀即得徃生淨土有積惡之人應墮無間獄者𧆛心十聲可生淨土否若說不往是大雄氏相欺若說即徃則因果亦虛設矣師云千秊暗室一燈能破一疑三生石上話譬如一粒芥子若說未生已經開華結果若說既生尚未布種請道一句來師云休論三生圜澤事得來芥子甚秊中音釋磡苦紺切音勘巖崖之下𤸳魚開切音皚癡病蜎蠕上縈緣切音娟掉也下乳兗切音輭蝡同動也馗渠龜切音逵鐘馗人名囫圇上呼骨切音忽下龍春切音倫物院曰囫圇
