body:
  text: 嗣法門人顯權等編住台州府寧海縣廣潤禪寺語録長至小參舉慈明冬日榜僧堂作此字其下注曰若人識得不離四威儀中首座見曰和尚今日放參明聞而笑師曰首座胸中藏日月慈明掌上握乾坤則置祇如拈卻下頭注腳作麼生知他字義分明聽取山僧一頌霛符一道賽書雲瑞應堂歬已絶氛四海文明風不動醉眠贏得日邪曛吳江沈君謨薦母請上堂萊衣舞罷錦堂空三載形儀想象中葉落風冷山骨露幾人於此見秋容蓋為心塵固壅智日難開雲去雲來誰識長空之自在漚生漚滅那知溼性之恆如况乎之𣦸誓靡他清霜嚴峻節口碑深鐫道路之石何須寶煥天章蓮蒂早結上生之緣豈慮雲薶玉樹大衆與麼話會喚作看樓打樓莫望衲僧門下過打折腳有分在且道衲僧門下又作麼生佛祖位中不住夜深吹笛過蘆彎晚參有佛處不得住無佛處急走過趙州老子非但八十猶行腳更饒走到百二十歲也未得歇腳在大衆還有為渠作主者麼出來解嘲看良久云恁麼則山僧𠎥手行拳去也自幼持齋身已老見人無力下禪牀晚參舉欽山因僧問如何是和尚家風山云錦繡銀香囊風吹滿路香嵒頭聞得令僧去云傳語十八子好好事潘郎師云邃老不昧洞上之宗奯公無違德山之子簡點將來一人尤挂本來衣一人尚行心處路未出曹山四禁在若是山僧如何是和尚家風似玉珍不御如簧語帶悲遂顧視左右云即今莫有傳語底麼衆默肰乃云血染杜鵑春又過為君那惜損娥眉詣南禪人請上堂一則三三則七生兒石女老黃梅無角鐵牛眠少室信不及切須疑照膽蟾光沈碧漢拍天滄海浸須彌疑得大悟方深袢夏雲欺千嶂碧零秋風動萬家砧超疑悟越玄關善財去後無消息樓閣門開竟日間以拂子畫一畫云正當詣南參請時又作麼生但辦肯心決不相賺晚參星輝午夜髑髏穿透霛山燭滅昏宵智眼宏開德嶠肰則風雨晦冥之夕不少而證道為誰明星有爛之辰何多而契真無一故知因明啓悟而悟者非本諸明即暗開通而通者詎關乎暗大衆祇如去卻明除卻暗又作麼生是諸人開通的眼良久云歸堂喫茶去除夜小參諸仁者臘月三十日到來也廣潤寺裏且恁市果山蔬爐熏茗碗師友道契話故談新若論閭閻編戶大有公賦勾追私租敦逼命寄枯魚之肆身縣貸子之家天涯流落而竛竮則父母望穿老眼獄戶長淪而淹抑則妻孥痛斷柔腸蓋一年之內悲情苦况畢輳今霄故也所以古人喻爾我眼光落地時謂之臘月三十日到來者正以此陰未謝彼陰方生從歬所作業緣苦境一時俱見則其慞惶怕怖較之人間臘月三十日又何啻或相十百或相千萬或相倍屣而無算哉呵呵大笑云肰則豈無高門巨室卿宰侯王之家仰事無所虧俯蓄無所憾綺羅筵上錦繡闈中鶴焰高燒龍膏漫剔金縷煙嫋嫋玉漏度遲遲促管繁絃歌緩版雕觴霞泛醉袂雲飛者邪復呵呵大笑云好大哥何不與我了辦在歬也得恁麼一回快樂去不見古有老宿上堂衆集定乃起身作舞曰諸人會我意不衆曰不會宿曰山僧不舍道法而見凡夫事後來復有老宿亦上堂作舞顧衆曰諸人會我意不諸人無對宿曰清貧常樂奇怪諸禪德古人逴得些子便爾神珠玩弄旁若無人受用則是受用爭奈落在世諦中若是山僧遂起身作舞曰諸人還會我意不良久云龍袖拂開全體見象王行處絶狐蹤行者出衆白云奉堂頭和尚命兩班勤舊即就寢堂獻湯師卓拄杖歸方丈上堂晝金夜玉秋潦冬涸凍徹冰崖芳生杜若風淡淡楊柳池塘雨輕輕梨華院落正紫煙南陌麗日千門許你諸人七穿八穴築著磕著又作麼生得一句截流萬機寢削瓊支璧月嘗如昨免見杏靨夭邪榆錢輕薄飛絮亂投簾幕喝一喝云推倒佉盧虱吒陰陽何處拘約晚參紅滿支緑滿支宿雨懨懨睡起遲間庭華景移左右顧視云洎被打破蔡州數歸期憶歸期夢見雖多相見稀相逢知幾時驀下座擒住一僧云你一向甚處去來僧擬議師拓開歸方丈大悲生日印宗化士從霛峰過廣潤納疏小參化門舒卷邈難同得妙須憑識自宗一印千差無別共大悲月見碧潭中所以心有心宗法有法印挈其印則寶鏡當軒達其宗則化母在握化母在握則應不因心而應同八萬四千母陀羅臂寶鏡當軒則明不待照而明同八萬四千清淨寶目明同八萬四千清淨寶目則辦魔直辦佛界之魔揀異直揀同中之異應同八萬四千母陀羅臂則驅耕夫之牛端令苗稼滋盛奪飢人之食必使永絶飢虛驅耕奪食而苗稼滋盛永絶飢虛則何難將山河大地堆作黃金該有情無情俾成正覺辦魔揀異直辦佛界之魔揀同中之異則豈如黃羅子經玄中記説夫自稱天地父母神者必是貓貍野獸自稱將軍神者必是熊熊虎豹而已哉海印彰時森羅畢印則置且道即今印文落抂甚麼處舉拂子云好大衆燕子呢喃景色乍長春晝睹園林萬華如繡海棠經雨胭脂透柳展宮眉翠拂行人首喝一喝復舉藥山令供養主抄化甘行者問甚處來曰藥山來來作麼曰教化還將得藥來麼曰行者有甚麼病甘遂舍銀兩鋌意山中有人此物卻還無人即休主便歸納疏山問子歸何速曰問佛法相當得銀兩鋌山令舉其語主舉已山曰速送還他子著賊了也主便送還甘曰原來有人遂忝銀施之師曰甘贄將蝦釣鱉化主貪餌鉤藥山亡羊而後補牢得失未免相半同安顯云早知行者恁麼問終不道藥山來雖有入地之謀且無衝天之計廣潤若作供養主當時與他一喝便行管取大小行者疑著半生去大衆廣潤者一喝為是答他語邪奪他機邪與他相見邪為復別有道理邪請簡點看若簡點不出向道莫行山下路果聞猿叫斷腸聲下座晚參舉石室善道禪師一夕同仰山玩月山指月問者箇月尖時圓相向甚麼處去圓時尖相又向甚麼處去石室云尖時圓相隱圓時尖相抂雲門別云尖時圓相抂圓時無尖相道吾云尖時亦不尖圓時亦不圓師云據三尊宿語愜仰山即得愜山僧意未抂請諸人別下一語看一僧云逢尖即尖遇圓即圓師不肯又一僧出以袖轉身作圓相師直打出法堂乃自別云尖時圓相尖圓時尖相圓晚參勝思惟梵天問不退轉天子云天子我常於此佛國土不曾見汝天子云梵天我亦不曾於此國土不曾見我有汝有我展轉難見畢竟如何見得分明去新筍看成堂下竹落華都上燕巢泥虞山梅里王紹林六十請上堂大盡三十日小盡二十九月鏡通書四月是小萬吉通書四月又大盡訝清曆無凖殊不知月之大小歲之餘閏悉是名言𡚶想若約當人各各歷歷孤明者著子何止包天括地籠古絡今正便不可言説諸佛剎皆悉碎末為微塵一塵中剎不可説如一一切皆如是此不可説諸佛剎一念碎塵不可説念念所碎悉皆肰盡不可説劫恆爾此塵為剎不可説此剎為塵説更難以不可説算數法算諸剎塵數可知以此諸塵數諸劫説彼壽命倍難窮何况此方一二三四五六七八九十百千萬億兆京秭垓壤溝澗正載之法所能會稽者邪以無性故得性自在以無命故得命自在以命自在故修短任物以性自在故真俗隨緣且置正當自艾而蓍自蓍而耄作麼生薦得者著子親切免為大盡小盡之所推遷舉拂子云還見麼去年梅今歲柳顏色馨香仍舊擲拂子下座晚參大通智勝佛十劫坐道場佛法不見歬不能成佛道甕裏何曾走卻鱉廣𬱃屠兒放下屠刀云我是千佛一數不是性燥漢大集會上有魔王語佛云瞿曇我待一切衆生成佛盡衆生界空無有衆生名字我乃發菩提心捏目生華作麼三箇漢既未足觀灮諸人莫有過渠一頭地者麼出來試説行履看衆默肰乃云恁麼則山僧不免放行洞山麻三斤去也七寶畫牛頭黃金為點𬱃春晴二三月農人皆取則寒食好新正鐵錢三四百何故不見道鴻鵠一舉千里飛鑽雲鷂子與天齊鳳凰不是凡間鳥為瑞為祥自有時珍重耿兵憲請上堂分巡寧紹台兵僃副便耿公應𢖍以今朝六月六日乃其父九一徵君忌辰特齎資入寺修供仍命山僧升於此座舉揚般若用資先考覺霛山僧即也不土上加泥若夫生當聖作物覩之朝親際風虎雲龍之盛探釋以知儒達生而知命有如徵君芳躅誠山僧所樂道者大衆還知楚黃有耿氏三先生也未見歬諸人想也未知山僧打初行腳時首造商麻則聞諸無念和尚者甚詳乃知皇明隆萬間性學復明於荊楚者由三先生為之唱也三先生者長曰天台大司農也季曰叔臺少司馬也次即徵君父曰仲臺則以布衣為名儒宿學者之宗蓋其得無師智自肰智因是大司農少司馬所自遜未達一間者徵君幼過先生之庭長入司農之室孝友義讓急人樂施一本自性成肰於學無所不窺因再躓春闈度不用即鋭意林泉多從方外老衲遊日誦金剛經自課山僧比見秦內更行狀及兵憲侍榻紀聞當徵君疾革時僧俗有來省者與之問答類機鋒踔厲卓有楊李風諸仁者徵君是塵勞中人本渠得力抂甚麼處一僧才出禮拜起師便打云大衆見麼即此物非他物峭巍巍兮無空缺活卓卓兮絶倚依佛祖因之出生真常資以流注不如不異非色非心離自離他無抂不抂若是夙有霛根底於此放卻身命便見全消即息全息即消全有即空全空即有遂能不動真際體浮幢有時示真纖塵不立或復見俗萬化斯張出而月印寒潭沒則星沈曉漢乃至美流芳繼璧合珠聯皆玄感夫風雲非夤緣以要約蓋彼方空得器一去來眇沙界於纖漚類聖賢於電拂又何生𣦸榮枯之足論哉大衆正當恁麼時且道九一徵君畢竟居何位次還委悉麼卓拄杖一下云大用塵塵見勝身剎剎彰更有一偈掣開金鎖玉麒麟超步玄淵自絶塵不作修文天上客詎方獨醒汨羅人存君子知家學去挽生民見至仁為問餘灮何耿耿桂輪千載景常新耿兵憲馮總鎮唐郡侯洎合府尊官迎師至郡就請天寧寺升座問嵒谷遠離國門親踐既爾入廛垂手必當祖印高提向上宗乘請師直指師云萬人遐仰處紅日到天心進云清風吹玉管幾箇是知音師云大唐天子只三人進云寒山逢拾得把手上高峰師云黃河三千年一度清進云記得風穴抂郢州官衙升座云祖師心印狀似鐵牛之機去即印住住即印破意旨如何師云不是知音者徒勞話歲寒進云盧陂既有鐵牛之機因甚一籌莫展師云根境未空玄路抂臨岐終自泣亡羊進云忽肰被盧陂掀倒禪牀喝散大衆又作麼生師云你試施設看進云今日人天暜集凡聖交參箇箇有鐵牛之機人人有祖師之印即是印即是不印即是師打云且道賞你罰你進云一種沒弦琴唯師彈得妙師云五彩畫虛空僧禮拜師乃云握閫外威權殺人須用活人之劒據寰中令敕活人貴得殺人之刀若但能殺而不能生便見髑髏滿地縱便能活而不能殺未免荊棘參天就中須是頂門眼正掌上機圓句裏明人言歬定旨方可鋤見山之𡺴屼鏟意地之根株直得千差一照而等平萬化皆如而絶對干戈不動躋聖世於黃虞象魏無縣返淳風於太素正當恁麼時坐享太平則固是畢竟承誰恩力祇奉一人天地貴從教諸道自分權復舉風穴因兵亂避地郢州牧主李便君暜設大會請就官衙升座云祖師心印狀似鐵牛之機去即印住住即印破祇如不去不住底且道印即是不印即是時有盧陂長老出問某甲有鐵牛之機請師不搭印穴云慣釣鯨鯢澄巨浸卻嗟步碾泥沙陂佇思穴喝云長老何不進語陂擬議穴打一拂子云長老還記得話頭麼試舉看陂復擬開口穴又打一拂子牧主云信知佛法與王法一般穴云便君見箇甚麼道理牧主云當斷不斷反招其亂穴便下座師云風穴據令牧主知歸可謂龍驤虎驟鳳翥鸞翔且暮一時千秋或遇祇如盧陂落節且道過抂甚麼處諸人若未委悉更聽山僧頌出大人知見不尋常大用繁興絶忖量經濟有權𢖍佛祖太平無象見陶唐已將化育同天溥誰信耕漁別有鄉心境尚存玄妙路臨岐終自泣亡羊久立尊官伏惟珍重下座金剛會衆居士請上堂質逾金剛體空劫石魚行肉肆巍巍堂堂搢笏升階綿綿密密風吹不入雨打不溼迅電非灮疾雷非急浮幢手捏成太華只一劈福德越虛空乾坤無等匹人天贊仰莫能窮三世諸佛有口只堪挂壁顧視左右云阿呵呵是甚麼卓拄杖喝一喝下座上堂森羅及萬象一法之所印乃喝一喝云一法山僧已揭示了也只如森羅萬象諸人又作麼生印若也印得方顯一法之妙霛其或未肰懷寶荊山徒自泣玉復喝一喝下座浩肰直歲化大鍋回上堂問窮音神竭躓袈裟不隔纖豪萬里賖廣潤清灮圓更暜指蹤那待杖頭邪諸餘即不問如何是清灮暜照一句師云天高地厚日月長明進云恁麼則法令無私人天有賴師云烏龜水底趁遊魚進云但得爪牙利清風匝地來師云祇恐不是玉進云即今頑鐵鑄成釜人人獲飽餐且道恩歸何地師畫進云竹疏煙補密梅瘦雪肥師云未抂更道僧喝師云一釣便上進云和尚罪過師云山僧年邁乃以拂子畫云圜陀陀灮爍爍周萬方韻一致所以真俗暜入而體本無生凡聖均資而神非有作玩無邊變弄行平等大慈富不多渠一瓢貧不虧伊半杓日用隨諸百姓冷暖職唯自知蓋雖浩肰質稟乾剛而爐鞲親承智者雖富矣霛鍾萬有而甄陶不廢先規故能智機五熱𬉹身而恬若絶滲絶漏西江一口以常吞大衆正當今日因圓果滿要且如何但願東風齊著力一時吹入我門來赴越州大能仁寺過蜀阜訪三宜禪師衆請上堂彩雲景裏神仙現手把紅羅扇遮面直須著眼看仙人莫看仙人手中扇展袈裟角云者是彩雲景舉拂子云者是紅羅扇作麼生是仙人面青邪黃邪赤邪白邪諸仁者若向者裏著得隻眼親見一回便見人人壁立萬仞各各常灮見歬非但山僧藏身無地要且不被堂頭老子舌頭謾而今諸方見他尋常東倒西攂隨處談經演教便道他少叢林縣羊頭賣狗肉殊不知他好象箇南屏山下西子湖相似有時水灮瀲灎有時山色空濛有時風皺紋漣有時金波乍涌有時霞帔半抹有時翠黛全遮你向甚麼處看他你才擬看時他卻將黑豆子換卻你眼睛你不擬看時他卻將斷貫索穿卻你鼻孔諸仁者不要看他直須自看忽肰看透自己立地處方知渠儂立地處知得渠儂立地處方知山僧立地處知得山僧立地處方知拄杖子立地處拈拄杖云知諸人立地處則易要知拄杖子立地處則難且道拄杖子立地抂甚麼處卓一下云盤根直透威音外佛祖還他步後塵過寓山祁理孫為父忠敏公請對霛小參季超居士問身騎箕尾氣壯山河正是生𣦸岸邊事如何是出生𣦸一句師云橫身三界外獨脫萬機歬進云莫便是忠敏亡弟安身立命處麼師拈拄杖云忠敏且置拄杖子安身立命抂甚麼處進云恁麼則不但亡弟一人蒙師點出本命元辰一切忠臣義士俱裂破娘生鼻孔矣師卓一下云更須重下針錐進云劫外風吹君國恨寂灮照破首陽心師云猶較些子乃云蜃氣吹江夜正昏挑燈抱義赴蛟門九重車馬千羣入萬里河山一寓存白手無繩牽日月赤衷有血灑乾坤投身直欲長虹化俯首鯨波一飲吞唯我衲僧家要且不肰奮迅來時海嶽昏一聲霹靂透千門𣦸生夢破隨高下今古情亡任廢存兔角杖頭挑日月龜毛拂子拄乾坤眼歬萬事流雲過佛祖橫將一口吞肰雖如是癡人面歬説不得夢話何故苟無殺身成仁之節槩豈能脫𣦸以超生必有縣崖攃手之風標自不貪生而害義大衆設有如是風標復有如是節槩底人又教他作麼生履踐即得煩惱海中為雨露無明山上起雲雷音釋靨益涉切音魘姿也懨衣鹽切音通作厭懨懨安也耄莫報切音帽與耄同惛忘也九十曰耄蛙烏瓜切音哇與哇同蝦蟇屬一作䖯攂盧對切音纇與擂同研物也
