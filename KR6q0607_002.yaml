body:
  text: 嗣法門人顯權等編住明州太白山天童禪寺語録為新戒付衣上堂昨晚南嶽與匡廬兩山爭論佛法一山道南嶽讓和尚乃𣍘溪嫡子一山道青原思大師實寶林正宗一山道廬陵米價傳千古一山道甎鏡磨穿古佛心互相競爭不已羅浮山聞得出來約住云莫爭莫爭饒你青原思大師南嶽讓和尚少不得從我嶺南者裏去山僧驀頭與羅浮山一棒天台合掌道善哉和尚打者一棒不妨透頂透底畼快殺人山僧遂與震威一喝咄縮頭去於是四山各各㦬懡而退拈起袈裟角云還見麼自從盧老收歸後須信人人總有之上堂昨日佛法太殺有只是牙齒痛今朝牙齒幸平復思量無甚佛法可說就中有箇衲僧出來道天童天童你得恁麼潑狼潑賴佛法豈抂牙齒上敲磕况𢼿有無之邪山僧不妨𠎥水獻華𠊳將今日尼本慈設底細齊請你了仍濃煎金字品茶熱𬉹兩手奉上何故如此但願你自信得及肻恁麼作得主省卻山僧多少心力晚參舉西天祖師云父母非我親誰是至親者諸佛非我道誰是最道者雲蓋本云父母非我親無有不親者諸佛非我道無有不道者祖師得第一句雲蓋得第二句有人忝得一句許伊鼎足三分千嵒和尚云父母非我親我亦非親者諸佛非我道道亦非我者祖師也不得第一句雲蓋也不得第二句無明碎身如微塵何止頭破作七分師云天童則不然父母非我親無我無親者諸佛非我道無我無道者三分鼎足許他歬輩古人若是中心𡬾子還屬天童在不見道家無二主國無二王若有二主二王莫道頭破作七分直饒碎身如微塵也則未免是箇客作漢因雪上堂學道須求妙悟參禪定要打徹打得徹寒木抂握兮全機可笑秋水橫按兮半提可滅打不徹好象箇甚麼好象大雪紛紛下烏盆變白盆忽然紅日出噁依舊是烏盆上堂問四大本空五蘊非有坐斷乾坤如何是諸佛出身處師云此問何來進云平地風波起師云老雅沒𭪿進云因甚如此師云又遭大衆笑怪進云笑箇甚麼師云笑你韓獹逐塊乃云釋迦老子道作是思惟時十方佛皆見古德道才入思惟𠊳成賸法且道名字既同因甚麼有利有害紅粉易𤖩端正女無錢難做好兒郎晚參舉趙州到百丈丈問甚處來州云南泉來丈云南泉有何言句示人州云有時道未得之人亦須峭肰去丈叱之州容愕肰丈云大好峭肰州作舞而出師云賊是小人智過君子肰二人賊漢之中有一人正賊有一人草賊還有定當得出者麼若定當得出也許你是箇賊漢若定當不出看你諸人今晚箇箇著賊去也上堂問臨濟家風即不問父母未生歬事是如何師云看看臘月盡進云恁麼則五九盡日又逢春也師云燈籠緣壁上天台進云龍虎慶嵐日人誇得意時師云是何言歟乃云德山入門𠊳棒飯飽弄筯臨濟入門𠊳喝饑不擇食從上為人一句作麼生道喝一喝云不可總作野狐精見解去也上堂天童三八升座朔望祝聖拈香其餘晚參示衆一依大智典章兩序後先問訊東西作禮燈王蒙堂詣座翹勤燒香請法趨旁上首白椎警覺師僧問話躋蹌陳白事意方竟拂子據款宣揚大衆陳白宣揚理應長老分上事拂子有何德能卻許他出一頭地舉拂子云還會麼復放下云拶得渠儂關子透大千無處不歸降聖節上堂聖諦第一義能出萬宗至尊貴至悠久至博厚至高明佛祖因茲圓成人天由其發見故此義當陽野老謳歌家邦寧帖此義虧危乾坤陡變世界崢嶸所以違之則永沈有海奉之則立致康衢設若拈出之時直得天魔外道拱手歸降千聖萬靈擎拳擁衛正當恁麼時知恩報恩一句作麼生道長將日月為天眼指出須彌作壽山春朝雪下上堂古者道一塵起大地收𠊳有人道一葉落天下秋今則山僧不妨道一華開萬國春春則且置華聻拈拄杖云不得道碓𭪿生華風歬鐵𡬾開華昨夜六出飛華今朝𡬾結銀華大似瑤草琪華錦上鋪華且道畢竟是甚麼華擲拄杖云切莫眼華除夜小參一年三百六十日今夜是最後一日四千三百二十時今夜是最後一時三萬六千刻今夜是最後一刻叢林舊例保社嘗規少不得口勞舌費一上所以九峰則道同歲老人分夜燈北禪則道烹露地白牛分歲𢼿問諸方還免得說理說事說窮說通說苦說樂說新說故也無惟有天童到此直下眼如鼻孔口似眉毛何故點胸云你若此中穩當不妨蒙頭衲被今宵過愛日來朝春漸長若此中未穩臘月三十日是甚麼時候尚有工夫與你說閒話抂不勞久立各自歸堂上堂舉一不得舉二放過一著落在第二乾峰恁麼說話大似釘樁搖櫓抱橋柱洗澡忒殺無轉智若是天童舉一不妨舉二放過一著橫三豎四昨日有人從天台來卻往徑山去呼直歲新年頭已過第三日了也今朝好暜請且道天童意抂于何良久云春風景裏乾坤大無限江山開畫圖晚參舉盤山云向上一路千聖不傳師云抱贓叫屈作麼慈明云向上一路千聖不肰師云且莫詐明頭大慧云向上一路熱碗鳴聲師云合眼跳黃河千嵒云向上一路抂你底師云接竹點青天先和尚云向上一路踏破草鞋師云猢猻倒上𡬾大衆者五員善知識被山僧一時領過了也畢竟作麼生是向上一路拈拄杖起座云歸堂喫茶上堂過去諸如來斯門已成就揮拄杖云站過者邊著見抂諸菩薩今各入圓明卓一下云百雜碎了也未來修學人當依如是法收拄杖云且莫𡚶想好三世所有若聖若賢若佛若祖總被山僧拄杖子穿卻鼻孔祇如拄杖子鼻孔還有人穿得麼擲下拄杖下座晚參今晚上元十四人間最勝良宵處處笙歌鼎沸村村火𡬾高燒天童別有家風暗坐一似墨澆鐵蛇任橫古路彩鳳從舞丹霄不見僧問香林如何是室內一碗燈林云三人證成鱉恕中云三人證成鱉一口各含一舌當機不辦來風喫水也須倣噎老香林能列挈真燈照世都吹滅雖肰吹滅就中有箇好處且道好抂那裏待諸人暗地裏東撈西摸忽被箇露柱撞翻自肰知得正當恁麼時如何攃手那邊千聖外塵塵剎剎放豪復舉僧問嵒頭浩浩塵中如何辦主頭云銅沙羅裏滿盛油密菴和尚云嵒頭貧做富要且不能設若有人問靈隱浩浩塵中如何辦主𠊳對他道日輪正卓午喝一喝師云嵒頭理上偏枯傑祖事上不足不肖兒孫隨例看孔著楔有問浩浩塵中如何辦主但云白面即敲金鐙過紅𤖩人揭繡簾看請簡點與他古人是同是別老僧慈慧請上堂兼謝海陵衆檀齊雲門大師道終朝喫飯不曾咬破一粒米鎮府大王問趙州云和尚尊年有幾箇齒抂州云只有一箇牙大王云爭喫得物州云雖肰一箇下下咬著趙州下下咬著雲門一粒不曾咬破且道不曾咬破底是下下咬著底是者裏須具透關眼始得若不具透關眼蘇州菱邵伯蕅沒價數有地頭作麼生知得他來處諦當要識透關眼麼推倒門歬大案山腰纏騎鶴上揚州晚參舉巖頭值沙汰後抂鄂州渚邊作渡子兩岸各挂一版有過渡者打版一下頭曰阿誰或曰要過那邊去頭即舞櫂迎之一日因一婆抱一孩兒來乃問呈橈舞櫂即不問且道婆手中兒甚處得來頭𠊳打婆云婆生七子六箇不遇知音祇者一箇也不消得𠊳拋向水中師云奇怪者老婆雖是女流卻有衲僧氣槩看他兩兩作家相見顯發箇事如擊石火閃電相似如今衲僧總情解摶量道拋兒奇特䥘過了也殊不知婆子下水拖人嵒頭逆風擺柁一箇滑頭一箇肰簡點將來二俱不了若是天童待他拋下孩兒更與一橈打落教他母子俱器不惟塞斷今時露布且與者老婆增氣召大衆嵒頭幸肰放過天童者裏放過不可驀拈拄杖云且道山僧手中拄杖從甚處得來衆舉首師攛下拄杖衆眼目定動師云嶮晚參值董殿元至舉僧問雪竇古人道有讀書人到來意旨如何竇云且抂門外立學云請師相見竇云任是顏回亦不通師云雪竇雖是真實相為太殺不近人情若是天童讀書人到來時如何道之以德請師相見齊之以禮畢竟意旨如何相逢相見呵呵笑更有春風春又春涅槃升座不見十力空如幻雖見非見如盲睹分別取相不見佛畢竟離著乃能見驀拈拄杖云看看釋迦老子抂山僧拄杖頭上降神處胎示見受生出家學道降魔波旬成最正覺轉妙法輪度脫不可說不可說佛剎微塵數衆生乘時于其中間作大佛事放大明震動無邊諸世界網見你諸人分別取相卻往俱尸那城入般涅槃去也下座同到佛殿拈香上食以展餘思大悲生日升座二月家家觀世音鷓鴣啼遍緑楊陰圓通門啓江南北底事𦬆𦬆烟水尋不須尋拈拄杖卓一下喝一喝云觀世音菩薩來也因甚將錢買糊餅放下手卻是饅頭還會麼不因紫陌華開早爭得黃鸝下翠岑追嚴上堂幾番白又幾番紅半寄支頭半逐風華落華開春自老故園常抂月明中所以道羣靈一源假名為佛體竭形消而不滅金流檏𢿨而嘗存如斯薦得非但今辰尹氏薦嚴故夫王公元配陳氏乘斯善利應念超越𠊳可與一切人同𣦸同生同得同失同暗同明同殺同活動無遺照舉必全真非一非多離他離自男身入定女身起女身入定天身起天身入定佛身起佛身入定外道起置法界于一塵而此塵不隘促僧祇為一念而此念非延隨心造作變見無方廓佛祖之妙靈開人天之正眼祇抂尋常動用中更不假于他術正當恁麼時薦嚴一句作麼生道西方剎見豪端裏遍界全彰淨妙身晚參舉不顧即差互豎拂子云山僧舉也諸仁者還免得顧也未擬思量何劫悟昨日三月十三來朝暮春十五思量箇甚麼既不思量理合悟去因甚只麼眼𥉌地如今山僧更不避諸方簡責直下盡情為你剖露也要大家瞥地好擡手云暜請喫茶去化主周遍髻珠請上堂盡道沙裏無油誰知麥中有等閒做造千般一一繇人轉變所以道百千法門同歸方寸河沙妙德總抂心源一切戒門定門慧門神通變化皆悉具足淨嬴嬴絶承當峭巍巍無空圓裹十虛周遍法界有時十字街頭垂手卻抂千峰頂上橫身一月暜見一切水有時千峰頂上橫身卻抂十字街頭垂手一切水月一月攝出各各懷中至寶晃人人髻上明珠直得俯仰之間稻麻黍稷無一物不是真如折旋之內咳唾掉臂無一法不為妙用摑須彌𨁝跳上非非想天且置撮大地如粟米粒拋抂靣歬你諸人作麼吞噉得喝一喝劈歷一聲春浪裏化龍魚早攫雲還施主寄資修供兼請上堂諸供養中法供養最驀豎拂云唵蘇嚧蘇嚧囉蘇嚧娑訶供養已陳加持已畢見歬大衆還飽足也未善來諸仁者不是盲瞑無識定肰飽足既肰飽足則知法無異味既知法無異味則於施於受兩無所著既於施於受兩無所著則達磨不來東土二祖不往西天處處珠翻荷蓋村村火吐𭞬抴占波國與毗耶離城𩰚𬱃非為分外攪長河為酥酪化酥酪作長河豈是強為正當恁麼時千里同風即置且道彼此如何通信相見又無事不來還憶君佛誕上堂金團未揀人間江南從來秋熱鬼宿尚岐天上塞北一向春寒及至五淨雨華九龍灑水𠊳有佛有衆生有迷有悟有縛有脫有涅槃可證有煩惱可除清淨本源翻成毒海𦬆𦬆之者匝地暜天香水洗蕩不清雲門棒打不殺如今要得葛藤劋絶所謂既從地倒還從地起除非明取他生緣始得且道釋迦老子即今生緣抂甚麼處陰倏忽催人老嫩緑駸駸已過牆結夏兼建護國道場上堂心王不𡚶動六國一時通罷拈三尺劒休弄一張弓盡謂古人坐籌帷幄決勝千里殊不知止動彌動轉見紛紜大衆要得家寧邦帖直須識取心王面目則殺生護生權衡抂已如王秉劒更不繇他統十方法界為一伽藍摶三世古今為一念際朝遊檀特莫宿羅浮也得扇子𨁝跳上三十三天觸著帝釋鼻孔東海鯉魚打一棒雨似盆傾也得不見道身心安居平等性智如是則佛恩皇恩一時頓報正當恁麼時如何紅霞穿碧落白日繞須彌尼行賢請上堂兼謝南嶽道舊見訪喫粥了也洗盂去當時𠊳有人直下大悟且道悟底事作麼生若向者裏打破漆桶可謂撞著道伴交肩過一生參學事畢肰後方好向者牀子上說大脫空話近日西天打殺一門僧多寶寺歬金剛因甚倒地他適來也有權也有實也有照也有用殳乎山僧將手向伊面歬橫兩橫卻去不得似者般瞎漢不打更待何時其或未肰山僧不𢡽老婆舌頭且為你小脫空頌出付與賢明智者裁不須巧說更安排師姑定是女人做思大天肰南嶽來晚參舉興化到雲居問權借一問以為景草時如何如是三度舉話雲居無語興化云情知和尚道不得且禮三拜雲居一日上堂云我二十年前興化問我當時機思遲鈍道不得為他置個問頭奇特不𢼿孤他如今祇消個何必後有僧舉似興化化云雲居二十年祇道得個何必若是興化即不肰不消個不必師云雲居放憨興化廝賴雖則極力互相激揚爭奈只作得個賓中主作不得主中主若是天童如今有個衲僧恁麼問但云好才若擬議劈脊打出不唯𠊳他差異禪和無開口處且顯宗師家有三玄戈甲照用同時底手眼天中節上堂適見朱明啓候又驚午日重逢善財采底藥頭年深寡效白雲歬驅符𠊳歲久罔靈誰知天童別有殺人活人底不用雄黃燒酒艾虎桃人無煩扣齒捻拳噀水作法單單只用者條黑楖𣗖任是他方妖魅此土迦羅赤口毒舌瘟神疫鬼卓一下云雲零星散去也直得暜天下歲稔時豐鄉堡間家祥戶吉黑楖𣗖既有如是威神如是作用且道是師承有據為復自性宗通復卓一下云莫怪渠儂多意氣昔年曾奪錦標回晚參舉仰山坐次大禪佛參翹一足云西天二十八祖亦如是唐土六祖亦如是和尚亦如是某甲亦如是仰山下禪牀打四藤條雪竇顯云藤條未到打折因甚麼只與四下須是個斬釘截鐵漢始得師云者渾圇吞棗漢你要知者四藤條落處麼一藤條打他西天二十八祖亦如是一藤條打他東土六祖亦如是一藤條打他和尚亦如是一藤條打他某甲亦如是諸仁者還肻山僧恁麼判斷也無若肻不惟薶沒仰山何處有他大禪佛若不肯爭奈渾圇吞棗者裏也須是個斬釘截鐵漢始得晚參松直棘曲鵠白烏玄大盡三十小盡二十九是人知有祇如背後有人喚你你𠊳回首且道明得甚麼邊事布袋肚皮寬金剛手版濶上堂𧺆雲門掣電之機金鞭手握奮臨濟奔䨓之用寶劒眉縣獨步神州橫行赤縣則不無伊還出得大明天地也未所以宏灮日月自古高明正統乾坤從來廣大如今不用如何若何只要諸人臨危不悚見義勇為莫駐中道化城力還暜天寶所果能如是非但鳥窠船子拱手歸降直得臨濟德山全身遠害正當恁麼時堯階永泰舜世隆平則且置祇如保太定功一句作麼生道橫按鏌鎁全正令太平寰宇斬癡頑晚參古者道離心意識參絶凡聖路學請問諸人心意識作麼生離又且如何是絶凡聖底路烏龜頭點須彌柱瞪眼大蟲看水磨立秋上堂若人𢿨亂心入于塔廟中一稱南無佛皆已成佛道且道以何為驗良久云片葉飄際西風萬里秋解夏小參洞山萬里無寸草石霜出門𠊳是草更有一個直得不出門亦是草漫漫地者一隊漢怪力亂神只知一重去一重一步高一步𠬛乎輥到牛角鐵裏和自己動軃不得今晚山僧不免為伊撥轉天關打開籬落貴要諸人個個濶行坦道免蹈者輩險僻之途還肻恁麼承當麼卓拄杖一下云而今四海清如鏡行人莫與路為仇上堂朱明九十已隨波夏末秋初事若何寸草未泯千萬里出門正有大誵訛去宜野鶴翔空外住應麢羊挂薜蘿莫謂欄棬今解卻最防雙角入平莎中秋上堂問昔有僧問老和尚如何是明中暗尚云南海波斯晝洗面此理如何師云也無此理也無如何進云所謂日午打三更師云正是闍𥠖見處進云者僧又問如何是暗中明尚云東村王老夜摩肩又作麼生師云開眼也著合眼也著進云面南看北斗師云非汝境界進云且道是甚麼人境界師打云會麼進云情知和尚有此一機師云如何是此機僧𠊳喝師又打進云者僧道明暗相去幾何尚云分身兩處看意旨如何師云過者邊著進云即今不問明不問暗未審如何祇對師云裂破舌頭進云正所謂父作子述人天欽仰師云莫謗他好進云明暗蒙師親指示應時𠬛節作麼生師云汝且向明暗裏會取僧云切莫壓良為賤𠊳禮拜師乃云開池不待月池成月自來舉拂云月來也若是池成之者𠊳知者月落處既知落處則妙體全彰孤獨露一挨一拶一卷一舒不用計較思量著著是者個出見雖肰猶是林老師二十年歬曾恁麼底且道即今底又作麼生桂魄一輪圓此夜暜天匝地大明中晚參𪂶𪂶鳥守空池魚從底過𪂶𪂶總不知驀召云大衆衆舉首師云歸堂喫茶上堂我今為汝任此事終不虛也豈不是釋迦老子底話因甚又道深固幽遠無人能到可見取他別人語話終無自由分莫是一向拍盲不取𠊳當得麼爭奈舌頭被他牙齒礙卻畢竟作麼生得自由去拈拄杖云須知海嶽歸明主未信乾坤別有天卓一下下座上堂拈拄杖橫按云有時一喝如金剛王寶劒卓一下云有時一喝如踞地師子移拄杖過東復移向西云有時一喝如探竿影草擲下拄杖云有時一喝不作一喝用霛利漢若向者裏著得一隻眼臨濟老子不直半文錢其或未肰莫怪海門風浪緊干戈元是太平基上堂悟了須遇人始得若不遇人祇是一個無尾猢猻才弄出人便笑灼肰灼肰祇如悟了又遇人底且作麼生無限風流懶賣弄閒攜好月過滄洲開爐上堂天地為爐造化為工陰陽為炭萬物為銅且道鑄個甚麼即得待你過了今年十月十一月十二月來年正月十一十二十三十四十五元宵燈節候那時為你說破上堂良久顧視大衆云淨潔地上豈可攃土攃沙𠊳起坐復問衆云好話還有進得語者麼有僧出云淨潔亦是病和尚因甚護𢡽他師云願你永劫染汙進云某甲只如此未審和尚如何師云山僧於諸染淨而得自抂祈嗣請上堂金剛正體流出萬端佛祖賴以胚胎聖凡由其誕育所謂無名名之父無色色之母為造化之根源作天地之大祖吞萬象氣絶諸塵祇要個漢與麼克紹將去則瓜瓞攸綿真風永繼譬如一燈然百千燈明終無盡其或參不真參悟非實悟假託有身名他人子何殊漢魏之後宮不異諸呂之失策終歸腐爛必至天亡大衆祇如金剛正體本無變易因甚卻要孕信懷疑著意祈求還委悉麼不得春風華不開華開須𠎥春風力晚參龍女於一彈指頃疾往南方無垢世界成等正覺且道與禪門立地成佛是同是別若道是同此人眼目未開若道是別此人窮劫流浪永無成佛之期見歬大衆為山僧說道理看至節小參天寒人寒大家抂者裏日南長至不出十二時靈利漢聞與麼道𠊳飛騰將去有甚麼限其或意𡬾崢嶸心華未綻亟須晝夜研窮深究力索坐教冰河發𦦨石筍抽條肰後一是一二是二三是三四是四五是五六是六七是七九九還他八十一若只依稀越國倣佛揚州莫道洞山掇退果桌慈明貼榜僧堂也大難消遣抂復舉雪竇示衆云三分陰二早過靈臺一點不揩磨貪生逐日區區去喚不回頭爭奈何雪竇老子可謂痛下瞑眩為人徹骨其餘泛泛之徒不抂論量設若喚得回頭底又且如何朝打三千暮打八百何故如此冬至寒食剛百五一重雪了一重霜上堂冬至月頭賣被買牛冬至月尾賣牛買被惟我衲僧家賤亦不賣貴亦不求未有天地世界早有者頭水牯牛身毛彼彼無雜角蹄對對完周只要諸人繩頭緊捏善自調柔待等春歸上苑緑暗芳洲那時放出耕翻大地坐享有秋又何必魯雲此日書瑞魏雀當年呈庥管取汙邪滿車甌窶滿篝囉囉哩哩家家唱升平之樂飽地個個免永劫饑虛之憂是則固是且道水牯牛鼻孔即今抂甚麼處叱叱者畜主五歲來尚𠊳不得跳下一齊打𢿨祈嗣上堂舉古德云接物利生絶妙外甥終是不肖他家自有兒孫將來應用恰好智海逸拈云諸禪德還會麼菜園牆倒晴方築房坫籬穿雨過修院宇漏時隨分整兒孫大小盡風流師云疏也疏了鈔也鈔了祇是不知兒孫來處如今大衆要會麼乃舉起拂子云一回舉著一回新斧斫難開父子思感應道交豪不爽騰騰任運起家門擲拂子下座客鄉張廣文遷望江尹入山話別上堂經中道譬如暗中寶無燈不能見佛法無入說雖慧不能了既肰如是因甚維摩杜口毗耶尼父息言魯國還薦麼好事不須頻話會留將和氣暖丹田除夕小參三十六旬丐祠之會七十二候休沐之辰年窮月窮日窮時窮還有窮不盡者麼自有一雙窮相手倒用橫拈不𠎥人復舉趙州四佛話云久向趙州古佛得與麼鼻孔即當若是天童金佛不度爐木佛不度火泥佛不度水真佛聻已如臘月扇子揚下屋壁角頭了也且道天童用個甚麼今宵殘臘盡來日賀新年歲朝祝聖升座拈香皇圖更運千祥集慶遇臣僧剛五十願見黃河百度清贊揚聖壽何終極乃云一二三四五六七辰巳午未申酉戌從頭直數到驢年究竟依歬跳不出寄語東村西舍南隴北郭趙大錢二孫三李四伯謾說歲朝把筆休云萬事大吉須知今年年是去年年端的日日還他是好日暜請栽松上堂若論此事如種𡬾相似揀擇欲精下手須確根宜其條直坎貴其寬容肰後時之以雨暘資之以風露則自肰由拱把以至合抱由合抱以至蔭覆人天雖肰者邊底從你種祇如那邊底又作麼生栽驀召大衆衆舉首師云根生也復說偈曰怪來禪社日凋傷四望喬林卒就荒幹折薪槱知法弱根摧匠石占魔強幽棲鳥出無高託天外鶴歸失故翔欲起山門千載色請栽大𡬾作陰涼因雪上堂問大地渾肰玉琢成虯支盡是銀華結正恁麼時還有祖師西來意也無師云無僧云因甚卻無師云無你出頭處僧喝師𠊳打乃云彤雲密布匝地暜天六出紛飛填溝塞壑於斯時也寒山無計掃除拾得徒勞把帚見歬諸人看即有分灼肰打并不去肰則天霽日出雲物解駮豈復有哉所以道愚人除境不心智者心不除境除境故九烏射盡一翳猶存心則大地平沈諸緣自寂祇如心境俱底又作麼生披簑側立千峰外引水澆𬞞五老歬上堂哀哀三歎蓼莪章罔極無能一報償至竟吾門真孝大回直薦本爺娘灼肰欲報至恩須是親見本生爺娘則於一切時如龍得水無一念落虛於一切處似虎靠山無𮈔豪𧺆作縱橫𭣣放全彰本地風出沒卷舒獨露金剛正體𠊳能不動塵際坐寶王剎不動舌頭轉大法輪俾人人達本生緣使各各知恩有地所以道輪轉三界中恩愛不能舍棄恩入無為真是報恩者大衆祇如山僧近日有人從嶺南來報道生身慈母已於辛巳冬朔遷化了也且道即今作麼生與本生爺娘相見山色翠穠春雨歇北堂萱草倚蘭開復云良哉我母淑且賢夷考生平動可鐫婦德固肰閒四教母儀端不愧三遷菴居室欲千朝掩耳順心期一徹玄事佛精勤三十載蓮胎不託定生天雖肰水漲船高泥多佛大下座同到大雄寶殿頂禮千佛洪名用助山僧少報劬勞之德晚參旋𭣣黃葉燒青煙竹榻和衣半夜眠粥後放參三下鼓誰能更話祖師禪古人尋常略露些子風規直是七穿八穴肰有等依樣畫猫兒底往往墮抂無疑必𣦸之地今夜山僧不免教他移身換步別作生涯乃云參究如同鑽𤎩煙晝宜食夜眠等閒鑽發金剛焰燒盡人間藥汞禪就中有個出來道天童恁麼說話喚作𣦸馬醫即得山僧要問你實頭處若不實頭劈脊打折驢腰不放抂參歸元禪人請上堂兼謝常熟衆信齊歸元無二路方𠊳有多談三藏十二部千七百則葛藤悉是方𠊳之談作麼生是歸元底路拈拄杖山僧為你當頭點出擊禪牀云若能直下知歸則一一壁立千仞處處常見歬身口意不可思議身口意業亦不可思議如是則一香一華如海一滴味攝百川不可思議乃至功不唐勞如塵才舉大地全𭣣亦不可思議况復割重捐私辦所難辦正當恁麼時如何千祥如霧集萬善若雲臻音釋噎一結切音咽𩚿窒也𧝹同裸露形體也鑯將亷切音犬鋭也篝居候切音鉤負物籠也鐫遵全切音鐫鐏也乂鑿也汞虎孔切音嗊本作澒丹砂所化為水銀也
