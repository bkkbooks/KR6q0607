body:
  text: 嗣法門人顯權等編贊歷傳祖圖贊始祖釋迦牟尼佛貴買無數僧祇賤賣一時拈出盡底家私暴揚誰知常住僧物乃有百萬癡𤸳猶道渠儂是佛不是佛正法眼藏廣流通一切聖贒如電拂第一祖摩訶迦葉尊者事佛抂後覺法抂先三昧同鑣調御出入諸禪熾肰從來鶉衣百結一向盂朝天多子曾分座雞足久連底事閒身歸未得無端一笑風歬第二祖阿難陀尊者七佛儀彰傳水器剎竿倒卻慧聞幢翻身驀過空王界山海誰憐繫馬樁第三祖商那和修尊者化艸逢生日胎衣變九條青林縣佛記香乳自空飄示以龍奮迅因之折𢢔憍大慈力無上筆舌豈能描第四祖優波毱多尊者玉塵橫拈時一埽紛紛華雨來何早五印風馳剛偃倒聲浩浩頻石室籌如艸春色屋頭誰戶少殷勤末授無師道心印確肰非瑤造真明導波旬嫉妒從茲薨第五祖提多迦尊者出家不為身心師子驀頭𠊳擿超步支離眾八千同人早遇梵天席通真量兮慧超方金日灼肰耀大荒第六祖彌遮迦尊者來自心往無向一鎚擊碎虛空藏闤闠人中識大乘傳衣觸器䘳何曠真過量蹭蹬僊階泣路岐指彈六劫曾超上第七祖婆須密尊者徉狂冀人間世慈定方趨又出來鐼遭他安柄了虛空謾把𣗥華栽第八祖佛陀難提尊者髻生瑞彩腹流灮智炤如空豈有方眾角半千人頓獲起家何似獨祥可怪宗傳跛又吃㪅饒一偈費商量第九祖伏䭾密多尊者癡癡𤸳𤸳故故杜杜推開父母嫌他佛祖立定跟齩定牙春灮不管流秊鹽行七步何䥘誤袈裟得一身多回頭卻來時路第十祖脅尊者勞生豈畏出頭難抂處春風抂處閒白首人阿堵裏祥帀座徙移間明珠自顯䭾香象精進非干攝怠頑欲識渠儂端的處黑華貓子面門斑第十一祖富那夜舍尊者神機旁礴言鋒如槊倒將鐵鋸舞三臺解卻天馬頭一角來住俱非佛亦不著變大地作黃金決洪流潤枯涸覺華紛紛桂子落第十二祖馬鳴大士衣被含生僅一端紛紛異見孰摧殘當臺舉起軒轅鏡萬古蚩尤器舊顏第十三祖迦毘摩羅大士賺海偷天技自神頂門一拶器家珍三千異論流雲𢿨五百同乘合雨臻力卻王宮嫌近勢親探虎穴遠求人只今象教仰明德荷戴㴱奚獨子忞第十四祖龍𡬾大士生知大達詼諧閎肆豎功勝無上之幢落修羅天外之臂說法辨魔揀異為人入泥入水龍山千載月輪孤閻浮夜夜清輝裏第十五祖迦那提婆大士傳得龍山格外宗五天何止辨推雄圜輪識體知無相𡬾耳明因驗有從旛動巴連人結舌詞傾百論座生風鴛鴦繡出金鍼度千古令人話莫竆第十六祖羅睺羅多大士義證無我道自尊驗人骨出不師存天酥酡食并甘露凡聖都來與一餐乾坤𧺆萬象奔金河撈得鐵崑崙第十七祖僧伽難提大士玉出崑岡金生麗水過去莊嚴劫如來驀地撞翻十二寶落迦童子盡力扶起古殿月冷風高䲭吻𠢐牙劈齒不因五百生歬業鏡自難逃誰信娑羅𡬾王佛是你第十八祖伽耶舍多大士舌頭怪得利銛釾生小逢人擅作家齡叶機宜真有百鑑圜內外洞無瑕風鈴擺斷黃金索心地迥開鐵𡬾華一自燈傳高躅後黃梅路上事如麻第十九祖鳩摩羅多大士轆轤天上下波劫𧺆閻浮貪他從來著他底無端惹得許閒愁東風吹戶牖一釣上金鉤今後春灮行有腳瓊華開徧古揚州第二十祖闍夜多大士開明之度智慧淵沖客舍無生途聽了到家天外指彈中奮逸翮鼓清風揚大海起蒼龍臨行不捏些兒怪誰道顰眉效隱峰第二十一祖婆修盤頭大士可是真燈繼瑣諓如師芳躅請推挻應真固避居懷日智者曾親七劫歬何知衰颯穿瑩琇𠊳把鸞膠續斷絃激發俄頃成大慧良駒自古一揮鞭第二十二祖摩拏羅大士鼓腹無鉤萬象騰紛紛宿慧總餘能不因半偈攑羣鶴定作神通傳上僧第二十三祖鶴勒那大士千身分大內九白坐林隈龍宮七出八沒紫殿日降月徊幻惑拘羅神直頭罵教倒驚羣師子子驀鼻抴將回獨𢡽羽毛成隊去不知何日得歸來請下一轉語為祖師出氣看第二十四祖師子尊者難兄難弟古攸艱龍子何如師子𡢃機佀桔槔終曲喻智方流水少窺斑蹏涔迹陷揮肱援合浦珠亾唾手還興到陽關時一唱悲風千古動龍顏第二十五祖婆舍斯多尊者劒出龍淵珠潛寶浦逢別者而開拳遇知音而即付風行迦勝兮固默論之斯摧艸偃南天兮奈霛通之正妒及乎毒中之而靡傷衣燓之而如故肰後師子之真嗣方明密多之祥始遇嗟乎道之難行也擷芳芷於歬修兮恍予心兮日睹雖不周於今之人兮亦執鞭兮予慕第二十六祖不如密多尊者霛異天肰降迹來其如智眼絕纖埃誕生不墮今時貴綠蘚從封古殿臺氣貫嚴城禨正兆空飄金鎖夢初回閒思近事籌往事抂昔真宗不易恢第二十七祖般若多羅尊者挂弊由來顯妙傳衣珠默示若為甄一竿釣上龍門客萬古支那受禍延第二十八祖菩提達磨尊者竺乾埽土又東華擬混閻浮共一家布鼓鳳凰臺岌嶪𧘂風楊子浪交加方思嫩桂傳僊種坐看寒梅釀雪華皮髓可憐剛俵了依肰跣足過流沙第二十九祖慧可尊者自拌為法𠊳捐軀放下元來一物無早信心宗傳不得何須換卻舊頭顱第三十祖僧燦尊者法僧悟得一刀休山谷猶傳燦赤頭辠性不知何處去岧嶤天柱自千秋第三十一祖道信尊者腳下無私得大自在坐斷雙峰天書不采愛翹壄鶴松可原驚銜華鳥叵耐猶廝頼不甘𣦸卻𠊳薶藏強出人歬生捏怪第三十二祖弘忍尊者身歬身後不多爭白髮猶能復稺嬰矗矗青松長自老滔滔濁港幾時清有人和得完圞句許見祖師眉一莖速道速道第三十三祖慧能尊者七百黃梅一偈降倒將九水入盂囊東流鼓作西流派天下谿沸似湯第三十四世南嶽懷讓禪師五葉分披果欲成高支結得最寧馨金雞謾訝縣殊域法器先徵動帝庭蹋斷源無一滴卷歸南嶽起滄溟堂堂大用平拈出怪甚兒孫越格行第三十五世馬祖道一禪師日月佛為面虎眼眎耽耽為翫清谿景幾回宿艸菴牛頭沒馬頭還風卷輪蹏過海南無限英霛遭蹋殺愁雲漠漠至今猶自鎖精藍第三十六世百丈懷海禪師鼻遭扭得脫耳遭喝又聾渾身無著摸任意擿西東哭笑顛翻師子堀杖槌撥動壄狐宮興禮樂啟禪樷崱崱屴屴肅肅雍雍㪅有驚人奇特事巍巍坐鎮大雄峰第三十七世黃檗希運禪師偉䫉堂堂頟有珠那堪悟處大庸麤縣機動陷南泉虎倒用時掀百丈須一任牛頭橫豎說不奇梢子卻能浮大中帝面頻揮掌裴相國名輒𠊳呼八十四人剛列下噇酒漢擬何須家風幸是當秊別總似而今早滅胡第三十八世臨濟義玄禪師鐵棒打不𣦸業風吹又生白拈僥似賊㴱險過如阬剛言佛法無多子卻有三玄要主賓趠得用攫𠊳行分明黑漆灮生桶幾許精霛鬼共爭第三十九世興化存獎禪師受冤大覺誠難雪中毒滹沱㪅莫當古廟中軃欺壄鬼紫羅帳合繡鴛鴦梁山頌子醻旻德屈項鞭屍戰法場莫道雲居曾靠倒髻珠親手下君王第四十世南院慧顒禪師胸中無一物著著超機變千仞孤危赤肉團堂堂壁立恣揮揎薝蔔林鬼厭箭老鵶沒㭰報君知餓虎投嵒許誰薦阿呵呵只合黃面浙西人棒下無生師不見第四十一世風穴延沼禪師錦繡腸生腑焦銅矢抂腰殺人不眨眼一箭落雙鵰物義無傷底開心兼劈腹㴱潭魚隱者湯盪火加燒蘆陂鐵印當頭搭鏡水艨䑳列漢飄七載單丁風穴寺行藏何止擅孤標第四十二世首山省念禪師出脫法華念平超廣慧真間行收艸賊好手不張名一言截斷千江口濟北遭風莫𢼿傾欲定大仰來果再日輪午後騐全身第四十三世汾陽善昭禪師龍袖拂開展御眸山河席卷到交州禹門點下千千客大器褫成上上流正道三玄恢祖域邪宗一句破蚩尤桮盤驀地驚狼藉半陌錢燒萬鬼愁第四十四世石霜楚圜禪師柴柴崖崖瀟瀟灑灑閒闖楊李宮牆輕躍汾州爐鞲扶搖九萬負翳空翼而等若鴻毛雲濤際天接濟北流而愈加澎湃南公叱咤亾魂諲老喑嗚挫敗手鑠黃河乾蹋須彌壞一劒當軒踞坐時烽煙六合收沆瀣第四十五世楊岐方會禪師監寺兒孫徧界能禪不說渠儂無端捏定慈明老禿驀地拓開同參九峰方信金圈栗棘難奈始知三驢兒頑兇雲迷大壄霧鎖長空奮迅灼肰龍自抂其餘消得幾多風第四十六世白雲守端禪師覰破春風笑裏刀山河徹底沒谿橋瓊樓玉殿莖茅見今古白雲響夜潮第四十七世五祖法演禪師咄哉川藞苴無口非啞有舌胡利潦倒沒狀邨夫一味小兒子戲參圜鑑譏圜鑑手段平常師白雲嫌白雲語言重遲只合皖水作眼皖山作鼻與他七出八沒橫三豎四輥繡毬唱巴謌夢拄杖教禪理石擊尺咦喜美磨盤生八角旋轉夌風起第四十八世昭覺克勤禪師夢回時一聲雞千山俱落炤得意處四句偈萬派悉歸源風濤生舌底劈歷𧺆齦根白雲宗等閒滅卻碧嵒集特地瀾翻眉間寶劒起妙喜𣦸中之活袖裏金鎚醒太平悟後之昏雕鐫諸子卵翼同門盡道東山家業大誰知陰翊賴渠恩第四十九世虎邱紹隆禪師行僧睡於菟踢蹋廣南蠻肉醉川圜悟刮地腥風吹建炎紛紛眾角如蠅聚盡刊落何知數遼空搏得天麒雄雄坐斷雲嵒路第五十世天童曇華禪師門啟甘露道震梅衡三驢風蹏十分潑剌擎瞌睡虎頭角數倍崢嶸橫揮雪刃埽蕩欃槍佛受煅兮祖受烹邪舍塔中敲鐵磬天台鴈蕩絕人行越格量出謂情虛空背上白毛生第五十一世天童咸傑禪師投機以句廓徹頂門唱脫空謌白格𡬾頭魚扇子捏人痛處等閒佛祖黯消魂風馳七剎響徹九閽口似乞兒席帒鼻如歉歲塵甗人言匡僧再世我道蒺藜重蕃黃金骨鎖中峰塔破沙盆注萬谿源第五十二世臥龍祖先禪師風行水上木落秋山一菴破壞四壁倒㘱削梓慶鐻弄宜僚丸如太阿之落膊似神珠之𧺆盤寶劒從渠開獄底龍灮斗䠶畐人寒第五十三世徑山師範禪師藞藞苴苴崎崎嶇嶇一似卭州磁盌端如遂府盂卻知四明六縣解道奉化八都蓋為從歬曾聞些臭猢猻氣息到底辨得王獦獠李麻鬍若將二十秊徑山法宣大內衣賜金縷與夫再新桀構積有豐儲底以為盡渠能事不孤老胡彈指一下云唵蜜怛哩智蜜怛哩孤何異瞎眼波斯念梵書哉第五十四世仰山祖欽禪師生鐵鑄面具黃金疊脊脢萬里青湘寒燄發千秊㬜柏𡬾華開赤手牚佛鑑潑天門戶單絲釣暜明𧘂浪鯨能袖藏風雨舌卷雲䨓碧玉盤中珠宛轉琉璃殿上月徘徊第五十五世高峰原妙禪師萬里血戰空拳破壘眉毛𦉑裏積山嶽鼻孔中藏師子兒烹大爐鞲下惡鉗鎚排達磨不是祖阬諸佛陷泥犂斷岸無路天階去梯拔地千尋嵒壁立西峰高厭五山第五十六世中峰明本禪師流泉迸冽智水湍洄𣦸關仡仡一蹋兩開新篁屋頭春色寒景掃萬里飛埃處處喧傳古佛心心荷擔如來河目嵌海口馬𬱃頰魚顋生鐵蒺藜當面擿琉璃阬塹遶身栽第五十七世千嵒元長禪師虛空擈地一聲號突出千嵒萬仞高趺坐龍山三十載閻浮下眎空牢牢風颯颯雨騷騷噴嚏青蓮香徧界通身毛孔笑如濤第五十八世萬峰時蔚禪師達蓬燕坐鄧尉開山諸家門庭勘徧一喝納敗龍灣灮福錦陷獸大湖香餌垂綸壄火葛藤燒不盡是非從此譒人寰第五十九世寶藏持禪師接得滹沱的骨傳徽音親口自爺宣行言何用嗟遺逸面目如今已儼肰第六十世東明旵禪師虛空一棒打破東明日涌榑桑爪牙莫怪生獰甚脊骨從來似鐵剛薶向安谿去㴱雲自藏春色滿園關不住半疄黃獨噴天香第六十一世海舟永慈禪師西川成都氏子住建康東山開翼善禪寺碑塔具存坐斷秦淮百二州龍踳信是馬駒流無端古道輕凌躐惹得西風笑點頭摶取東山開梵宇倒傾三峽泛慈舟藞苴不是蘇𤸳子休認文星作斗牛第六十二世寶峰智瑄禪師高峰展旂石頭下寨倒用鐵牛之機何止坐觀成敗二水中分白鷺洲三山半落青天外第六十三世天奇瑞禪師鬼窟裏頭全身跳出九十六種濶步橫行越樣生機彌宇宙滔天活路𧺆雲霆瑪瑙階白玉屏紫羅帳裏攃珠珍塞北江南弘大化風流獨占許誰鄰第六十四世絕學聰禪師一關把定古山河三尺龍泉炤膽磨無限飛鴻驚不度華山突屼太行峨第六十五世月心德寶禪師機投大覺道𢍆無聞曲翻韶陽之調絃奏師子之筋倒嶽傾湫萬人氣索持綱挈紐千聖一縜廓禪天以再耀洗佛日以無氛頭挨周嶺雪衣挂楚山雲烈燄爐中飛彩鳳頂𩕳囟裏攂砏𥖵夫是之謂大明國裏天童忞三葉之顯祖有元天子暜應國師十世之嫡孫也第六十六世龍池正傳禪師燈華爆斷眉夌骨修羅拓出夜义頭萬方暜炤而乍明乍昧一笠半遮而全放全收把任公之釣移夜壑之舟化變鯤鵬歬悟後修潑天浪接禹門濤終古源源不斷流第六十七世天童圜悟禪師壞那伽定明格外宗奪人天正命之食滅從上瞎驢之蹤截斷眾流如太華之倒地圅蓋乾坤似寶鏡之交融旱䨓忽震後夜霜鐘肅肅金風吹大壄山山𡬾色露秋容於乎小子何命之禪之髓兮僧之龍音釋薧苦浩切音考乾魚蚩充之切音蚩尤人名諓則前切音箋巧言也揎荀緣切音宣與𭠛同鉤衣出臂也䖃苴上呂下切音砢下側下切音鮓䖃苴泥不熟貌囟思晉切音信顖同頭會腦蓋也
