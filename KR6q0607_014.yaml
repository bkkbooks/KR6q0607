body:
  text: 嗣法門人顯權等編舉古垂代晚參舉臨濟至京行化到一家門首曰家嘗有婆曰太無猒生濟曰飯也未曾得何言太無猒生婆便閉卻門師曰好大衆臨濟老子得黃檗大機之用生平逢佛殺佛遇祖殺祖直下如白拈賊相似因甚被箇婆子折倒還有扶持得他起底麼出來下一轉語看若下得諦當許你他日向孤峰頂上豎立吾道去在若下語未有主宗風掃地盡矣有麼有麼速速出來僧下語師皆不肯乃自代云臭老婆我識得你了也將下座復云此猶是門外話作麼生得門開與他婆子相見衆無對抴拄杖一時打散晚參舉夾山上堂我二十年住此山未曾舉著宗門中事有僧問承和尚有言二十年住此山未曾舉著宗門中事是不山曰是僧便掀倒禪牀山休去至明日普請掘一坑令侍者請昨日僧至曰老僧二十年說無義語今日請上座打殺老僧薶向坑裏便請便請若不打殺老僧上座自著打殺薶在坑中始得其僧歸堂束裝潛去師云見可而進知難而退固是衲僧嘗事爭奈龍頭蛇尾何大衆者裏合下得箇甚麼語免他夾山薶卻無對乃代云乞兒見小利晚參舉僧問龍牙二鼠侵藤時如何牙云須知有隱身處始得如何是隱身處牙云還見儂家麼師云既曰隱身必無蹤迹儂家若見面目斯彰作麼生道得遮照同時句代云萬象之中嘗獨露無因即次問行纏晚參舉密老和尚住天童日有居士問世間以何為尊答云唯汝獨尊士禮拜密和尚云忽肰劈歷打你又作麼生士無語師云先師與麼提持可謂摯開金殿鎖撞動玉樓鐘爭奈者俗漢醉鄉夢長撼呼不覺如今座中肅是久參禪客不妨出來下一轉語貴圜先師公案衆默肰乃代云恩大難酬一晚舉龐居士訪大梅常問久嚮大梅未審梅子熟也未常曰熟也你向甚麼處下口士云百雜碎常伸手曰還我核子來當時居士無語今夜得閒沒事敢煩大衆代答一語貴塞大梅口且為龐公出氣悟侍者云已揚下掃堆頭了也師深肯之舉雲門問僧甚處來云江西來門云江西一隊老漢寱語住也未僧無語代云卻煩和尚齒頰又云江西老宿也曾道及和尚舉深明二上座因聞僧問法眼如何是色眼豎拂子或云雞冠花或云貼肉汗衫二師特特而去遂問承和尚有三種色語是不眼云是深云鷂子過新羅便歸衆代法眼云少年曾決龍蛇陳老大還聽稚子歌其時李後主在座下不肯乃白法眼云來晨為置茶筵寡人請此二人重新問話代云割雞焉用牛刀明日李主置茶筵乃備綵帛一箱劒一口語二師云今日請上座重新問話若問得是奉賞雜彩若問不是只賜一劒法眼於是升座深乃出問今日奉敕問話師還許也無眼云許深云鷂子過新羅便捧彩而去代云宋郊渡蟻日毛寶放龜時衆一時𢿱法燈作維那不肯乃打鐘集衆僧堂前勘辨問云承聞二上座在雲門會下多時有甚麼奇特因緣舉一兩則來商量看深云古人道白鷺下田千點雪黃鸝上樹一枝華維那作麼生商量法燈擬議深乃打一坐具便歸衆代法燈云不易上座念得來舉東禪嶽問僧甚處來云黃檗來嶽云黃檗有何言句云某甲到者裏一時忘卻嶽云上座豈不是黃檗來云是嶽云又道忘卻僧擬議嶽喝出別是語云賊是小人代後語云和尚適來問甚麼舉龜峰光因舊住相訪光問頃年有一則公案與你商量不下如今作麼生云未入門已舉似和尚了也光云者裏又作麼生云不可頭上更安頭光以手畫一畫云者裏且置你為甚麼踏斷天台石橋住無語代賴有和尚證明舉保寧英因僧問山河大地不作眼見耳聞時如何英云只恐不與麼云便與麼時如何英云山高水深僧無語代和尚猶有者箇在舉三祖會因僧問如何是第一義諦會云百雜碎云禪一會不異靈山會云將箕掃帚來代幸有讓王節何爭洗耳清舉天元因僧問如何是禪元云入籠入檻僧拊掌元云跳得出是好手僧擬議元云了代和尚在裏許來多少時舉水菴一室中垂示語問衆西天鬍子因甚沒髭鬚小師本㒥應聲曰文不加點師叱之馨侍者云金不博金師亦叱之乃代云巨嶽難為土舉洞山𧆛凡有新到先令搬柴三轉然後參堂有一僧不肯問曰三轉內即不問三轉外如何𧆛曰鐵輪天子寰中旨僧無對𧆛便打令去代云壄老無心戴帝堯舉乾峰問僧甚麼處來曰天台峰曰見說石橋作兩𫨻是不曰和尚甚麼處得者消息來峰曰將謂華頂峰前客元來平田莊裏人代云和尚甚年到彼間舉玄沙因文桶頭下山沙問幾時歸曰得三五日沙曰歸時有無底桶將一擔來文無對代云不辭將來恐和尚用他不著舉洞山行腳時會一官人曰三祖信心銘弟子擬注山曰才有是非紛肰失心作麼生注代云比來拋甎何期引玉舉報恩慧明禪師住天台白沙菴時有朋彥上座博學強記來訪次敵論宗乘明曰言多去道遠矣今有事借問只如從上諸聖及諸先德還有不悟者也無朋彥曰若是諸聖先德豈有不悟者哉明曰一人發真歸源十方虛空悉皆消殞今天台山嶷肰如何得消殞去朋彥不知所措代云依經解義三世佛冤又云某甲也疑和尚舉南泉山下有一菴主人謂曰近日南泉和尚出世何不去禮見主曰非但南泉直饒千佛出世我亦不去泉聞乃令趙州去勘州去便設拜主不顧州從西過東又從東過西主亦不顧州曰草賊大敗遂抴下簾子便歸舉似泉泉曰我從來疑著者漢次日泉與沙彌擕茶一盞三隻到庵擲向地上乃曰昨日底昨日底主曰昨日底是甚麼泉於沙彌背上拍一下曰賺我來賺我來拂袖便回師云前來趙州且置末後南泉道昨日底昨日底別合下得甚麼語免得簡責一僧云者野狐精師甚喜之舉華林覺禪師因夾山問遠聞和尚念觀音是不覺曰肰山曰騎卻頭時如何覺曰出頭即從汝騎不出頭騎箇甚麼山無對代當時但與他三拜舉天童密老和尚有士大夫自撰禪門口訣詣尚請正展卷指一實字問曰此字如何解說士擬議云卻解說不出尚曰恁麼則虛言了也其人面熱不能答當時合下得甚語免他道是虛言有僧云他道了也師云同坑無異土又有僧云險師不肯乃代云待老和尚腳跟點地即說舉真歇了一日入廚看煮次行人才舉忽桶底脫潑地上衆皆失聲曰可惜許了曰桶底脫自合歡喜為甚麼卻煩惱典座曰和尚即得了曰灼肰可惜許一桶乃云你諸人為典座代一語看一僧云放他三十棒師云自領出去一僧云狼藉滿地師云可惜許一桶一僧云和尚即得師云兩箇無孔鐵鎚儉侍者云某甲當時若在但以兩手作捧勢看他作麼去就師與一掌儉沈吟師云看你作麼生去就心侍者云某甲只管看師云灼然你看即有分心禮拜云請和尚代語師云元來和尚在此心云貓師云者畜生舉古者道摩尼寶殿四角有一角常露露底即不問你作麼生是那不露底一僧出禮拜了立師云者箇猶是露底云烏龜水底深藏六師云你又探頭作麼云和尚是甚麼心行師云是山僧心行僧無語一僧云某甲道不得師云道不得卻有分付處只是你漆桶未破在乃代云寧可截舌不犯國諱舉古者道一切賢聖皆以無為法而有差別則以無為法為極則憑何而有差別祇如差別是過不是過若道是過一切聖賢悉皆有過若不是過決定喚甚麼作差別代云如月印千江舉趙州示衆云南方來者即與下載北方來者即與裝載則從設若總不恁麼來者又作麼生代云喫茶去舉古者道肯重不得全卸卻方為妙既是卸卻方為妙因甚曹溪屬南嶽汝既如是善自護持代云無須鎖子兩頭搖舉古者云書頭教娘勤作息書尾教娘莫瞌睡中間事作麼生代云祇許佳人獨自知舉古者道無手人能行拳無舌人解言語忽肰無手人打無舌人無舌人道箇甚麼僧云我嘗於此切師不肯代云阿阿舉隆慶閒室中垂問祖師心印篆作何文代云扯卻皮可漏子看諸佛本源深之多少代云問取拄杖子十二時中上來下去開單展此是五蘊敗壞之身那箇是清淨法身代云金剛腳下鐵崑崙不用指東畫西實地上道將一句來代云早晨喫白粥如今又覺饑十二時中穿衣喫飯且道承甚麼人恩力代云吾嘗於此切魚行水濁鳥飛毛落亮座主一入西山因甚窅無消息代云還出得大唐天地也未舉大隨問僧向甚麼處去僧云西山住菴去曰我向東山喚你你便來得麼云不肰曰你住菴未得當時合下甚語免遭大隨簡點有僧云遍界不曾藏師不肯代但進前問訊云不審和尚有辱慈念舉古者道是處是彌勒無門無善財因甚琉璃殿上卻無知識代云澄潭不許蒼龍蟠舉雪竇示衆二龍爭珠有爪牙者不得師云既有爪牙因甚不得一僧入方丈道從門入者不是家珍師深喜之至來日晚參畢命其僧近前如法舉昨宵語供養大衆著僧才舉師以杖挃退云蕉鹿已成經宿夢枯株尚守舊山嵒舉僧問龍牙終日區區如何頓息牙云如孝子喪父母始得師云好聻者裏合下得一轉語諸人試道看一僧云不是一番寒徹骨爭得梅花噴鼻香師云若恁麼正在區區如何頓息去乃代云靈衣未脫難忘奉孝滿曹山始愛顛舉洞山因雲居作務誤剗殺蚯蚓山云者箇聻雲居云他不死山曰二祖往鄴州又作麼生雲居無對師代云將此身心奉塵剎舉太陽問僧那裏來曰洪山陽曰先師在麼曰在陽曰者箇猶是侍者僧無對師代云不遇中郎鑑還同野舍薪又云來朝更獻楚王看舉雲居常令侍者送袴與一住菴道者者曰自有娘生袴竟不受雲居復令侍者去問娘未生時著箇甚麼道者無對後遷化有舍利持似雲居居曰直饒燒得八斛四斗不如當時下得一轉語好師代道者云全超不借借又云正恁麼時還有將來分也無舉玄沙在雪峰時光侍者謂沙曰師叔若學得禪某甲打鐵船下海去沙住後問光曰打得鐵船也未光無對法眼代云和尚終不恁麼法燈代云請和尚下船玄覺代云貧兒思舊債師舉畢顧衆曰上來者一隊老古錐各納敗了你諸人莫別有見處麼請更代一語看瑞寮元云不因樵子徑爭到葛洪家師為破顏舉古者道雞見便鬬犬見便咬殿上鴟吻終日相對因甚麼不瞋僧云大智若愚師不肯代云你若無心我也休舉韶山見白頭因問莫是多口白頭因麼云不敢山云有多少口云遍身是山云大小二事向甚處屙云向韶山口裏屙山云有韶山口即從無韶山口又作麼生因無語師代云無韶山口一事也無舉悟空禪師問座主云講甚麼經云法華經空云有說法華經處我見寶塔當為證明座主講倩甚麼人證明主無對雪竇代云私通車馬師云我意不欲雪竇與麼道諸人更代一語看一僧云自有燈籠露柱在師云山僧亦未肯上座與麼道乃代云將謂和尚忘卻晚參舉魯祖凡見僧來參即面壁而坐南泉至亦面壁而坐泉遂於背上拍一掌祖云是誰泉云普願祖云作甚麼泉云也是尋常大慧拈云垂鉤四海只釣獰龍格外玄機為尋知己南泉雖則善機宜明休咎要且不知魯祖落處如今衆中莫有知得落處者麼切忌向鬼窟裏卜度師云山僧者裏不問諸人落處且道鬼窟裏作麼生商量有道得恰好者與他青州七斤布衫一件僼書記出衆云請和尚離卻鬼窟裏問來某甲即道師遂與之晚參舉道吾見南泉泉問闍黎名甚麼吾曰宗智泉曰智不到處作麼生宗吾曰切忌道著泉曰灼肰道著即頭角生師云今晚有人向者裏下得一轉語山僧與他龍牙襪著咸知藏出云寧可截舌不犯國諱師遂與之復云肰雖如是語少藏鋒若是山僧又且不肰乃自代云某甲今晚定不得和尚襪著舉雪峰辭洞山山問子甚處去云歸嶺中去山云當時從甚麼路出云從飛猿嶺出山曰今回向甚麼路去云從飛猿嶺去山曰有一人不從飛猿去子還識麼云不識山曰為甚不識云他無面目山曰子既不識爭知無面目峰無對代云三更垂下夜明簾舉佛印與學徒入室次適東坡至前印曰此間無坐榻居士來作甚麼坡曰暫借佛印四大為坐榻印曰山僧有一問若道得即請坐道不得即輸腰間玉帶坡曰便請印曰山僧四大本空五蘊非有居士向甚麼處坐坡無語代云和尚衲衣重多少晚參舉海岸黃居士司理杭州時請石車石雨二禪師齊次士問兩石相磕時如何車云一碾粉碎雨云只可自怡說不堪持贈君師云一人暴虎馮河自傷己命一人聽事不真喚鐘作瓮各與三十拄杖了肰後問諸大衆作麼生道得一句與他二尊宿增氣衆下語不契乃別云聲光徹天室中垂代問僧認著依肰還不是瑞嵒因甚喚主人公代云碓搗東南磨推西北問僧萬法歸一一歸何處無對代云大海若不納百川應倒流問僧作何行業底人通身紅爛僧云喫官酒臥官街師笑云紅即已紅爛即未爛一日問衆合眼許你跳黃河設若開眼時作麼生過無對時有僧問師合眼跳黃河時如何師云無人孟浪過你設若開眼時作麼生過師展手云了又有僧問如前師云今朝霧起答後語云日出後看取復有問如前師云露柱撞翻燈籠答後語云聖僧歸堂打坐有時云既是雲門六不收因甚又道北斗裏藏身有時云髑髏無識道眼精明漢因甚仰面不見天低頭不見地有時云拄杖拂子隨我者隨之東南羅漢天王確住者苑住西北去住不隨風力轉無傷物義若為宣有時云本來無位次不用強安排山門因甚在前佛殿因甚在後有時云十方同聚會箇箇學無為因甚無為無事人尤是金鎖難音釋薶與埋同藏也噴普悶切音湓叱也鼓鼻也鴟常支切音匙鶗鵳也鶗鵳鷂別名磕丘蓋切音慨兩石相擊聲髑髏上杜骨切音獨下即侯切音樓頓顱謂之髑髏
