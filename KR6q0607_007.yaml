body:
  text: 嗣法門人顯權等編住越州大能仁寺語録三門大解脫門不落方𠊳撥動霛樞千回百轉喝一喝遂入佛殿不來相而來不見相而見珠圓有腳𧺆晶盤月午無心當桂殿據室龍蛇混雜分緇素凡聖交參定是非那論人天與佛祖卓拄杖一下云總教齊向此中歸小參人人衣線下各有坐具地生佛未彰早已開闢虛空壞爛湛爾獨存辟之乎大能仁一巨剎當許玄度舍宅為寺之日而此地不加增洎呂相國改寺為宅之時而此地不加減肰雖無有增減而燈明金殿燭與夫華笑玉樓人不大相縣隔耶向非德公長者呂氏亢宗盡底掀翻揮千金而不吝和盤掇轉化火宅為清凉則金屋長貯阿嬌碧池半流香膩而山僧與諸人又安得經行坐臥燕默禪思於此中也肰則爾我衣線下地雖則富有萬德蕩無纖塵而七情擾擾六賊紛紛苟不直下親自識取常自守護勤自修葺力自莊嚴則如能仁之廢為民業者幾希求其頭頭皆寶所觸處有風灮又安可得者不見東山演祖和尚道山歬一片間田地叉手丁寧問祖翁幾度賣來還自買為憐松竹引清風清風徐引松竹交加受用則是天肰受用畢竟如何得一肩承紹去萬古碧潭空界月再三撈摝始應知晚參舉洛浦示衆云孫臏收鋪去也有卜者出來時有僧出曰請師卜浦曰你家爺𣦸法眼代僧拊掌三下大慧拈云者僧沒興𣦸卻爺又被別人拊掌信知禍不單行福無雙至師云大慧老人䥘下名言要知者僧正是因禍致福第恨不解即慶為祥能仁門下龍象必定別有長處不妨為者僧下一轉語看開爐上堂問乾坤是大冶萬物皆薪炭突出無位人師將何法煅師云平堆三尺土淺葬一千年進云鼠肝蟲臂從吾適是蝶是周應為分師云思鄉頻有淚歸路已無津僧云謝師答話師𠊳打問大開爐鞲陶鑄聖凡陶鑄且置不涉有無一句作麼生道師云金剛寶劒當頭截進云此猶是古人建立事未立已歬請師更道師𠊳打僧禮拜云一滴雨霑甘露潤畫斷千峰與萬峰師云猶是強惺惺乃云梅寒透而香飄道窮則變金煅烹而色勝理至自彰所以傳心有法誰立雪於空庭超證無階孰投身於火聚童子嗟其難再神悵以莫還驀拈拄杖卓一下云祇如者箇從來不入諸方社火卻乃高超調御孤運風歬紅爐焰裏安禪寒威凜凜淨水中澡浴波浪天翻又作麼生六合乾坤懷揣裏飽參何止擅空王晚參舉雲門大師道一任橫說豎說未是宗門苗裔若據宗門苗裔是甚熱鳴三乘十二分教說夢達磨西來說夢若有老宿開堂為人說法將利刀殺卻百千萬箇有甚麼過師云眼蓋諸方氣陵一世許他雲門老子簡點將來跛腳阿師說得行不得當時山僧若抂座下直出衆歬扼腕立地向他道和尚項上三百斤鐵枷何不卸卻待他動靜𠊳與掀倒禪牀肰雖如是三乘十二分教說夢達磨西來說夢𢼿問諸人作麼生免得說夢去抴拄杖跳下座一時打歸方丈請化山三和尚引座上堂孟嘗門下珠履三千金谷園中繡繻八百安似我輩衲僧家𠎥來香飯餉萬聖於同堂三變淨坊集分身於一處是故進一步則震動無邊世界網退一步則踏斷百億大風輪不進不退則正令當行十方坐斷𠊳饒如是未是衲僧家全體作用抂諸人要見全體作用麼舉起拂子云看看空王佛多寶佛威音王佛大通智勝佛四萬同名同號日月燈明佛盡向山僧拂子頭上吹大法嬴擊大法鼓演大法義作大佛事一一佛事周遍法界所謂一豪見神變一切佛同說盡於未來劫莫得其邊際倒握拂子云及乎山僧倒轉柄來要且三世諸佛歷代祖師卒摸索頭不著何况諸人茄子瓠子那裏知得今朝幸遇化山和尚象駕灮臨高垂天鑒下座同申勸請暜為諸人委曲指示果園尼請上堂問三頭六臂那吒眼八面玲瓏作者機此猶是尋常之用作麼生是向上關鍵師云幽州江口石人蹲僧擬進語師云鷂子已過新羅國問遇境逢緣即不問如何是一句中具三玄師云秦望峰高碧漢連進云如何是一句中具三要師云鑑湖水接滄溟灝進云三玄三要且置截斷衆流一句作麼生道師𠊳打僧禮拜云且喜天下太平師云消得龍王多少風乃云但覺𡬾曲彔不解果子未免當面成䥘過只知果子不知𡬾曲彔亦是渾圇吞棗頭何故江南之橘一也徙淮北而為枳焉苟不審其地之所宜辨其性之寒溫以之施用得不謬誤者哉驀豎兩拳云大衆祇者兩枚果子同根竝蒂色香正等肰而有損有益有利有害諸人還辨明得出麼若辨明得出許你隨手拈來可以塞斷佛祖咽喉管教天下老和尚出氣不得其或未肰一箇烏梅是本形蜘蛛結網打蜻蜓被我將來摘卻兩邊翅呵呵大笑云好似烏梅銜鐵釘彌陀生日上堂問掬沙供佛果感輪王今辰設齊感何果位師云紅爐爆出鐵烏龜進云如是則功不浪施也師云闍𥠖分上又作麼生進云三春果熟菩提𡬾一夜華開滿院香師云猶是閒話會進云還許學人進語不師云許僧喝師𠊳打進云萬古碧潭空界月再三撈摝始應知師云龍頭蛇尾漢問妙用等恆沙心空𠊳到家妙用即不問心空一句作麼生師云青山重疊疊流水響潺潺進云如何是到家底句師云側立縣崖處擡頭子細觀進云禮拜和尚去也師云困魚止濼病鳥棲蘆乃云身口意清淨是名佛出世身口意不淨是名佛入滅拈拄杖云拄杖子聞恁麼道引身出衆歬曰說甚淨與不淨某甲從來無身口意業肰而不聞有能出之佛與所出之世莫成斷滅去不山僧對他道你豈無某甲拄杖子豎起拄杖云拄杖子不覺聳身高七多羅𡬾躍肰大呌曰我會也我會也於是東涌西沒南涌北沒北涌中沒中涌邊沒有時見天或復見人有時見男或復見女有時見僧或復見俗有時見聲聞或復見緣覺有時見菩薩或復見諸佛乃至化娑婆為極樂變釋迦文為無量壽於一豪端見寶王剎坐微塵裏轉大法輪皆不出者箇時節大衆拄杖子歬來會箇甚麼道理𠊳恁麼得大神變卓一下云踏得自家田地穩高山平地總西方魯太史涅如符道人請上堂問法筵龍象衆當觀第一義龍象則不問如何是第一義師豎起拂子進云分明月抂梅華上看到梅華早已遲師云卻怪山僧不得僧畫圓相云與者箇相去多少師打云差了者些子進云踏破澄潭月穿開碧落天師云有甚交涉問爐鞲洪開今已久煅凡煉聖事如何師云萬里雲收盡千峰秀色寒進云荊棘林中曾進步夜明簾外早翻身師云匝地紅輪都一照誰人𢼿外大威灮進云頓開五位乾坤靜劈破三玄世界平師云𠎥人面具舞三臺乃云舉手攀南斗回身倚北辰劒挂眉間符縣肘後一言之下掃蕩欃槍一句之中奠安家國直饒恁麼猶是時流舉措若踏著向上階梯說甚猛虎項下縣鈴饑鷹爪邊奪食縱𠊳兩曜東行星辰易位乾坤翻覆佛祖潛蹤不妨於中坐臥經行神通遊戲如是則何用高眠太嶽泛宅五湖方將混勞侶以為儔與諸魔而竝作任他磨涅不受磷緇即且從畢竟如何是此人真實受用處幾度黑風翻大海未曾聞道釣舟傾晚參舉大慈示衆云山僧不解答話只是識病時有僧出大慈𠊳歸方丈雪竇拈云大凡扶豎宗乘須是辦箇得失且大慈識病不答話時有僧出𠊳歸方丈雪竇識病不答話或有僧出劈脊𠊳棒諸方識病不答話有僧出必肰別有長處𢼿有一箇動著大唐天子只三人師云大唐天子只三人雪竇太殺肋胸自點諸方必肰別有長處布袋裏盛錐子不出頭是好手雖肰既已見義不為非勇如今山僧亦識病不答話設有僧出𠊳乃呵呵大笑若是諸方長處座中儘有江南客舉泉首座立僧上堂茅廬未出先知鼎足三分王氣潛符早定真人消息况復衲僧家眼爍破四天下鼻孔中藏師子兒所以把住則四溟無浪月輪孤放開則玉蘗未萌金鳳舞若論能仁門下簡點將來猶是草菴止宿漢欲得眼目人天炊香別供直須踏翻雲門斗柄倒接霛𡬾支條始得且道能仁門下為甚如此到江吳地盡隔岸越山多晚參舉大慧常舉俱𦙆和尚凡有所問唯豎一指又自賣弄云我抂天龍處得一指頭禪一生受用不盡後來琅玡有頌云俱𦙆一指報君知朝生鷂子搏天飛若無舉鼎拔山力千里烏騅不易騎乃云俱𦙆和尚若不得琅玡為伊出氣幾乎薶沒了者一指頭禪妙喜既恁麼舉不免隨後也有箇注腳俱𦙆一指頭飯飽方休腰纏十萬貫騎鶴上揚州師云琅玡妙喜只顧盤中喝采不解馬上奪標諸人要知者一指頭落處分明麼更聽山僧念箇真言補闕一指頭禪誰不有霛樞妙轉抂天龍巨霛擡手無多子分破華山千萬重祈嗣小參問天童一箭已射能仁能仁一箭當射何人師云速退速退進云恁麼則聞名不如親見師云你向甚麼處著眼進云日輪正當午一箭中紅心師𠊳打乃云若論此事如人家生兒子相似奚待㘞地一聲之際而後定其嗣息之有無哉果若真胎結就則自肰眠思不安飲食無味逗過了七月八月九月十月十一月十二月即極遲亦不出十三四箇月是男是女定有分曉肰必受胎之日母人胎藏潔清體不尩羸方有如斯喜慶之事况復諸人必欲了辦己事直須發大正信起大疑情不見道信為道元功德母長養一切諸善法又云大疑大悟小疑小悟不疑不悟既得真疑見歬則不用如之若何胸次間自有一種不寧之象鯁塞於中行自不知行坐自不知坐乃至廢𥨊餐亦不期肰而肰者矣到得此時驀肰擈落從歬礙膺之物方始慶快平生肰後灰心泯智飲啄隨緣葆素含真如愚若魯忽被龍天一朝推出上報先聖莫報之恩下開後昆未開之眼俾燈燈續焰葉葉聯芳猶如巨姓大家一人發迹本支百世瓜瓞綿綿豈不名為真勝丈夫即今衆中莫有恁麼人麼釣竿斫盡重栽竹不計功程得𠊳休上堂問臘月青蓮開雪浦雙頭獨結少林春如何是少林春師云試看紅輪日無私照八荒進云兩堂首座同時喝歷肰賓主當時分如何是歷肰賓主師云揭進云與麼則大小臨濟性命落抂學人手裏了也師云張果老騎驢入你鼻孔裏你還知麼進云自從舞得三臺後拍拍元來總是歌師云你底性命卻落抂山僧手中進云不因濯足龍門過爭得清風動地生師云放過即不可𠊳打乃云鑿壁擬分鄰舍灮較量有底短和長厥明誰似雙丸暜平等無私照八荒舉拄杖云大衆還見麼卓一下云還聞麼既爾聞同見暜則郭大平等李二平等鄧四平等張三平等僧平等俗平等男平等女平等拄杖子與山河大地晝夜熾肰為諸人說平等法門更教山僧說箇甚麼即得不如唱箇漁家傲供養諸人乃謾詠云釣笠披雲青嶂曉緑蓑雨細春江渺白鳥飛來風滿櫂收綸了牧童拍手樵清嘯明月太虛同一照浮家泛宅昏曉醉眼冷看城市閙煙波老誰能認得閒煩惱上堂問惡龍出口白虎牚牙如何抵敵生𣦸師云崑崙著靴空中立進云明月暜遍杲日麗天師云十八十九癡人夜𧺆進云霜華滿地點水滴凍如何分別師打云向者裏著眼乃云佛以一音演說法衆生隨類各得解聲聞解人空菩薩解法空二乘解緣生佛祖解向上第一機籌山僧今日亦以一音一者奉為山主祁鴻孫薦嚴先慈再則為少微昱禪伯暜垂開示乃震威一喝云諸人作麼生解解人空邪法空邪緣生邪向上第一機籌邪若但恁麼解得祇是隨名起見逐相生心未是能仁種草設若一總瞢無所解則又甘負己霛詎堪持論諸仁者向者裏挨開線路拶入身來方見天高地厚海濶山長則又何妨逆推甲子倒置陰陽擠排佛祖斥辱三藏諸小兒用驅耕奪食之手起三玄要用之宗隨喝一喝云適來一絡索向甚麼處去也霧露雲霞時起滅長青自古一般天復喝一喝下座追嚴上堂問正法眼藏喚作破沙盆未審破沙盆喚作甚麼師云眼裏須彌拈卻著進云如何是佛三腳驢子弄蹄行祇如三腳驢又喚作甚麼師云有你恁麼癡人進云即此二途蒙師指薦亡一句若為生師云萬緣遷變渾閒事青入燒瘢又見春進云鐵牛㖃破澄潭月一句無私利有情師云且莫亂叫喚乃云春華秋又菊夜暗晝還明陰陽不涉者何地著遷更水中月鏡裏形今無滅昔何生悠肰天際片雲橫日昨雲隨風雨𢿨碧天依舊一空青解冬辭院時闔郡當道宰官護法紳士躬詣攀兼為敘謝上堂問四水淡回金殿碧千峰翠擁越城高如何是能仁境師云吐吞千界月周匝萬人家進云月照冰壺華鋪蜀錦師云喜得闍𥠖相證明進云煅就精金躍翻爐鞲如何是境中人師云橫拈三尺劒特地斬精霛進云麟鳳翻騰椎拂下象龍蹴踏寶華歬即且置祇如文斾遮未審和尚去即是住即是師云雲𢿨家家月春來處處華進云瞻之仰之師云速禮三拜問洪開爐鞲振宗風道化寰中佐帝功吾祖西來真消息知音側耳若為通師云但得雪消去自肰春到來進云恁麼則座中固有仙陀客一句親宣得意時師打云釘根拔卻耳中進云白棒無私恩歸有地師云如何是知恩底句子僧舉坐具云也要和尚共相委悉師云你須自委始得問解制時將二月間金鱗隊隊戲波瀾禹門浪擊三千里燒尾乘雲去不還畢竟如何施設師云穿銀山透鐵壁進云古者道有佛處不得住無佛處急𧺆過意旨如何師云緊捎草鞋進云恁麼則竿木隨身去也師云𧺆殺闍𥠖進云有意氣時意氣不風流處也風流師云依舊騰蛇繞足問世尊拈華迦葉微笑能仁解制未審和尚將何佛法示人師云駱駝尾上弔冬瓜進云恁麼則眼界虛明空碧落師云你見箇甚麼道理進云有水皆含月無山不帶雲師云杜撰禪和如麻似粟問春風𩖼𩖼徹人寒吹動梅華撲鼻香華香人寒即不問解制一句請宣場師云當路遊絲縈醉客進云樓上已吹新歲角窗歬猶點舊年燈只如臨濟大師來也和尚又作麼生師云隔華啼鳥喚行人進云某甲禮拜去也師云裁衫䥘卻領乃云春風吹大壄物有卉而必芳赫日耀當天處無幽而不燭拈拄杖卓一下云况復寒灮吞萬象一法印森羅大哉洋洋乎發育萬物峻極於天者乎是故內聖得之而木鐸千春外王得之而儀形百辟抂位尊官得之而覃敷至化黼黻皇猷見歬檀護得之而壺教修明天真內葆合堂清衆得之而無生克證諸見頓亡所以或遠或近或去或不去聖人之行不同也肰即總而別別則天上人間即異而同同一大灮明藏如是則往也抂裏許復也抂裏許結也抂裏許解也抂裏許卓拄杖起座云因甚山僧不抂裏許且歸嵒下座等待月明時開爐上堂爐頭量濶世界函同火種深薶千生不斷本自孤明歷歷何須百丈橫挑常時大用現歬那抂龍門豎撥頭陀石被莓苔裏擲筆峰遭薜荔纏未為分外羅漢院裏一年度三箇行者歸宗寺裏參退茶蓋是尋常牽東籬補西壁山僧且恁上來牛頭沒馬頭回諸人一等下去卻謂如蟲禦木太殺減渠威灮遂喝一喝云祇如司馬頭陀舉壄狐話問溈山山以手撼門扇三下又作麼生早知燈是火飯熟已多時受徑山能仁萬壽禪寺請拈護法當山疏示衆云馬師圜相緘來久全幅今朝始啓封以手點一點云點下若開千聖眼德雲何事話重逢其或未肰更請維那高聲朗讀且圖別峰相見宣疏畢升座云徑山堂就能仁上國一話將此際談不動道場來遍吉未撩煙水已周參還有恁麼人麼出來共相證據僧問秦望山高凌霄峰遠即今未上徑山先請和尚舉揚若到山中如何垂示師云榑桑赫日當空見今古紅灮爍太虛進云恁麼則直截分明一椎兩當師云但見日又夜教人爭少年進云祇如弘宗曜祖一句又作麼生師云天上有星皆拱北人間無水不朝東進云勝地非師重舉令祖關誰揭與人看師云眼裏瞳人吹叫子乃云所以一真絶待本無心境之分法法圜同寧有自他之間蓋智因情而暌隔體緣想而差殊遂𠊳百億浮幢剛被迷雲暜覆妙嚴佛土幾遭豐草全遮果若坐斷主人公不起第二見則全心即境全境即心心境交融自他無礙𠊳能握金成土易地為天不見道諸佛菩薩有解脫名不可思議若菩薩住是解脫者以須彌之高廣納芥子中無所增減須彌山王本相如故而四天王忉利諸天不覺不知己之所入惟應度者乃見須彌入芥子中驀豎拄杖召大衆云見麼徑山三千樓閣百萬松杉已向山僧拄杖頭上湛肰安住了也且道山僧於中作何佛事卓一下云八十七燈重剔起家聲從此布閻浮崑玉李居士生辰請上堂山僧昨夜夢挾飛鯨遨遊十洲三島邂逅蓬萊山下遇見一夥倦真各各嚴持鳳脂修瓊漿玉液將賀九天應元䨓聲暜化天尊壽旦相邀山僧同往大羅天上正當發行之際羣仙互讓不歬山僧曰序齒如何羣仙曰諾遂序得彭祖錢鏗年高八百寶掌和尚年逾千春復有麻姑王遠之流自序接侍以來已見東海三為桑田由是羣仙景仰僉欲推為上首唯山僧手中拄杖子橫頭不擡直頭不點羣仙曰某等只如此未審尊年多少拄杖子曰有底追風天馬腳蹄濶𠊳道晝夜一百八有底解凍春冰滑似油又道蘇州有常州有其實不可以智知不可以識識同真際等法性無性無生無所倚是故有時見長則能演七日以為一劫有時示短則能促一劫以為七日有時翻頭作尾則能以過去世回入未來世有時翻尾作頭則能以未來世移置見抂世不見道一念暜觀無量劫無去無來亦無住當拄杖子說是法時大地一時六種震動所謂動遍動等遍動起遍起等遍起踊遍踊等遍踊震遍震等遍震㖃遍㖃等遍㖃擊遍擊等遍擊和山僧竹匡牀子也響動起來遂爾驚醒大衆山僧作夢且置畢竟拄杖子承誰恩力得壽命長卓一下云金生麗水玉出崑岡晚參舉南禪師示衆有一人朝看華嚴莫觀般若晝夜精勤無有暫暇有一人不參禪不論義把箇破席日裏睡如是二人同到黃龍一人有為一人無為安下那一箇即是良久云功德天黑暗女有智主人二俱不受師云山僧不比黃龍小家子禪如是二人同到能仁一齊安下何故海濶從魚躍天空任鳥飛上堂舉璣和尚問僧禪以何為義僧下語皆不𢍆理僧請益璣璣代云以謗為義雪堂拈云三世諸佛是謗西天二十八祖是謗唐土六代祖師是謗天下老和尚是謗諸人是謗山僧是謗於中還有不謗者也無談玄說妙河沙數爭似雙峰謗得親師云若是能仁禪以何為義以飽為義任他三世諸佛西天東土歷代祖師天下老和尚諸人與山僧若有纖豪不飽如何歇得馳求之心即今諸人作麼生得飽足去拈拂子擲下云天寒日短兩人共一上堂問雲水躋蹌即不問薦嚴一句請師宣師云霛衣未脫難奉孝滿𣍘山始愛顛進云未審承與居士即今抂甚處安身立命師云鐵牛不欄邊草直踏須彌頂上眠進云與麼則生生同佛智世世𢍆無為師云南柯十更乃云霛衣未脫奉重難孝滿𣍘山始愛顛酒果若夢破南柯十更天曉則大開眼來尚無能生所生之父母况有存沒去來之消耗其或未肰搖拂子云以此振鈴伸召請喝一喝云𮘗經薦亡霛皆共成佛道為新戒付衣上堂萬里無片雲青天也須棒寸絲曾不挂尤有赤力渾身若是敵勝丈夫英霛漢子仗文殊劒持殃崛刀逢佛殺佛逢祖殺祖逢阿羅漢殺阿羅漢逢父母殺父母逢自己殺自己翻身跳出虛空背上吒沙立地肰後與一切人扯破皮可漏子俾伊薦取未入胞胎時一段風灮豈肯著相循名麻纏紙裹落他今時不見僧問洞山時時勤拂拭為甚麼不得他衣未審甚麼人合得山云不入門者僧云祇如不入門者還得也無山云雖肰如此不得不與他隨即云直道本來無一物尤不合得他衣你道甚麼人合得者裏合下得一轉語且道合下甚麼語好時有一僧連下九十六轉語竝不𢍆山意末後云直饒將來也無處著山始肯師驀拈起衣云且道者裏合作麼生傳持良久云自從春色來嵩少三十六峰青到今成道上堂管窺午夜一星星夢破霛山覺道成赫日大明灮暜照迷雲尤自翳雙睛大覺世尊因感此事所以歎曰奇哉一切衆生皆具有如來智慧德相但以𡚶想執著而不自證得耳諸仁者要知𡚶想執著麼拍右膝一下云者裏是要識智慧德相麼拍左膝一下云者裏是若也如此明得則千歧一致釋迦成道不先萬古長今諸人證真不後既不先不後也則釋迦即是諸人諸人即是釋迦無二無二分無別無斷故既無二無二分無別無斷故又喚甚麼作智慧德相又喚甚麼作𡚶想執著簡點將來釋迦老子尤肰夢眼未開於此不明山僧更為諸人入如來性起三昧轉大法輪去也卓拄杖一下云下座同詣大雄寶殿各各嚴整威儀共伸拜賀之忱受道場山護聖萬壽禪寺請上堂問昔日梵王請佛蓋為羣生今朝道峰請師當為何事師云五九四十五太陽來入戶進云紫羅帳裏承官誥金榜題名天下知師云蒿箭射須彌進云四衆沾恩學人禮謝師云你還收得大食國裏寶刀麼進云大衆證明師云依舊口銜羊角乃云南朝三百寺十剎勝居歬雙徑神龍窟道山列聖淵法鼓千秋振祖燈奕世然欲為置品第軒輊難與縣歬月禹航令專人致錦箋相邀國一席言言見諦詮因乏長風𠊳公案茲未圜詎意湖州路弘護更精䖍請居伏虎嵒璧合還珠聯方驗瑤田事一粥果歬緣用舍固非我行藏信有天生平頗達此去住恆得𠊳無心雲出岫有景月臨川但愧駑馬步何以追昔賢驀拈拄杖云𦕼將拄杖子徹骨為人宣大衆且道山僧拄杖子有甚長處卓一下云八千子弟今何抂一統江山屬帝乾赴道峰過武林金剛菴值菴主生辰衆檀請升座慶祝金剛種智圜常陶成佛祖般若霛灮獨耀發見人天發見人天則為人天而作父陶成佛祖則與佛祖而為師既為佛祖之師復作人天之父則天上天下惟我獨尊更說甚麼七步周行四方目顧全鋒敵勝哮㖃驚羣要且佛祖從唲聲裏祈霛人天就浣盆邊乞命乃至髑髏明世界恆沙日月灮吞脊骨拄乾坤百億風輪豎透如山願固似海悲深五欲八風中吒沙歷落地闢金剛之壽域於一豪端見寶王剎一如壯士展臂不假他力闡般若之真風坐微塵裏轉大法輪大似鳥王劈海直取龍吞橫按拄杖喝一喝云正當今日瑞氣騰空祥雲匝地畢竟是誰風月荊山璞出連城璧楚澤蓂開萬國春音釋蜻蜓上倉經切音青下唐丁切音廷蜻蜓蟲名一名蜻蛉磷良創切音吝薄石也瞢謨中切木平聲目不明也黼黻上匪父切音甫下分物切音弗黼文如斧黻文如兩已相背壼苦本切音悃宮中弄謂之壼
